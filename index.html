<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>graycor.github.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #4f8ef7;
      --accent-glow: rgba(79, 142, 247, 0.18);
      --text: #e8eaf0;
      --muted: #6b7080;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.15;
    }

    h1 span { color: var(--accent); }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 1.75rem auto;
      border-radius: 2px;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    /* --- Menu grid --- */
    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
    }

    .menu-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      padding: 1.4rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .menu-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
      transform: translateY(-2px);
    }

    .menu-btn .icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">github.io</p>
    <h1>graycor<span>.</span>github<span>.</span>io</h1>
    <div class="divider"></div>
    <p class="tagline">A collection of tools &amp; projects</p>

    <nav class="menu">
      <a href="bookscan.html" class="menu-btn">
        <span class="icon">📚</span>
        BookScan
      </a>
      <a href="carnivorenutrition.html" class="menu-btn">
        <span class="icon">🥩</span>
        Carnivore<br>Nutrition
      </a>
      <!-- Add more buttons here as you expand -->
    </nav>

    <p class="footer">graycor · github pages</p>
  </div>
</body>
</html>
