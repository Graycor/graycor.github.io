}

function renderSideCard(wcc, round, side) {
  const subKeys = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a,b) => a-b);
  // Always show 1,2,3 as placeholder options even if not yet created
  const allSubs = [1,2,3,...subKeys].filter((v,i,a) => a.indexOf(v) === i).sort((a,b) => a-b);
  const maxSub = allSubs.length ? Math.max(...allSubs) : 0;
  const canAddNext = maxSub < 9;
  const nextSubN = Math.max(maxSub + 1, 4); // After the implicit 1-3, the "+" adds 4 onwards

  return h('div', { class: 'side-card' }, [
    h('div', { class: 'side-head' }, [
      h('span', { class: 'side-letter' }, side.letter),
      h('span', { class: 'side-label' }, side.label || ''),
      h('div', { class: 'actions' }, [
        h('button', { class: 'icon-btn', title: 'Edit side', onClick: () => openEditSideModal(wcc.code, round.number, side.letter) }, '✎'),
        h('button', { class: 'icon-btn danger', title: 'Delete side', onClick: () => confirmDelete('Side ' + side.letter, () => { delete round.sides[side.letter]; saveState(); renderBrowse(); }) }, '×'),
      ]),
    ]),
    h('div', { class: 'subside-row' }, [
      ...allSubs.map(n => {
        const sub = side.subSides[String(n)];
        const sections = sub ? sub.sections : [];
        const dots = sections.slice(0, 6).map(s => h('span', { class: 'sub-dot', style: { background: s.color } }));
        if (sections.length > 6) dots.push(h('span', { class: 'sub-dot-more' }, '+' + (sections.length - 6)));
        const pill = h('button', {
          class: 'subside-pill ' + (sub && sections.length ? '' : 'empty'),
          onClick: () => openEditor(wcc.code, round.number, side.letter, n),
        }, [
          h('span', { class: 'sub-id' }, side.letter + n),
          sections.length
            ? h('span', { class: 'sub-dots' }, dots)
            : h('span', { class: 'sub-empty' }, 'empty'),
        ]);
        // Only real (data-backed) subs get a remove button.
        // Phantom 1/2/3 pills don't — there's nothing to delete yet.
        if (!sub) return pill;
        const removeBtn = h('button', {
          class: 'sub-remove',
          title: `Remove ${side.letter}${n}`,
          onClick: (e) => {
            e.stopPropagation();
            const doDelete = () => {
              delete side.subSides[String(n)];
              saveState();
              renderBrowse();
            };
            if (sections.length > 0) {
              confirmDelete(`sub ${side.letter}${n} (${sections.length} section${sections.length===1?'':'s'} of data)`, doDelete);
            } else {
              doDelete();
            }
          },
        }, '×');
        return h('div', { class: 'subside-pill-wrap' }, [pill, removeBtn]);
      }),
      canAddNext ? h('button', {
        class: 'subside-add',
        title: `Add ${side.letter}${nextSubN}`,
        onClick: () => {
          ensureSubSide(wcc.code, round.number, side.letter, nextSubN);
          saveState();
          renderBrowse();
        },
      }, '+ SUB') : null,
    ]),
  ]);
}

// ============== RENDER: EDITOR ==============
function renderEditor() {
  const root = $('#app-root');
  root.innerHTML = '';
  const { wccCode, roundNum, sideLetter, subNum } = UI.editor;
  const strip = ensureSubSide(wccCode, roundNum, sideLetter, subNum);

  const totalAddresses = strip.sections.reduce((acc, s) => acc + s.addresses.length, 0);
  const totalNotches = strip.sections.reduce((acc, s) => acc + sectionNotchCount(s), 0);

  // Build the live preview
  const previewStrip = renderStripDOM(strip, { interactive: true });

  // Inspector
  const selectedSection = strip.sections.find(s => s.id === UI.editor.selectedSectionId);

  const sectionTabs = buildSectionTabs(strip);

  const inspector = selectedSection
    ? renderInspector(strip, selectedSection)
    : h('div', { class: 'inspector-empty' }, [
        h('p', {}, strip.sections.length ? 'SELECT A SECTION ABOVE TO EDIT IT.' : 'NO SECTIONS YET. ADD YOUR FIRST ONE TO START BUILDING THE STRIP.'),
        h('button', { class: 'tbtn primary', onClick: () => {
          const newSec = addSection(strip, { label: '' });
          UI.editor.selectedSectionId = newSec.id;
          renderEditorPreserveScroll();
        }}, '+ ADD FIRST SECTION'),
      ]);

  const stripIdLabel = sideLetter + subNum;
  const page = h('div', { class: 'page' }, [
    h('div', { class: 'editor-header' }, [
      h('button', { class: 'tbtn ghost', onClick: backToBrowse }, '← Back'),
      (() => {
        // Prev/next navigation across the sub-sides of the current side.
        const side = ensureSide(wccCode, roundNum, sideLetter);
        const subs = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
        const pos = subs.indexOf(Number(subNum));
        const prevN = pos > 0 ? subs[pos - 1] : null;
        const nextN = (pos >= 0 && pos < subs.length - 1) ? subs[pos + 1] : null;
        return h('div', { class: 'sub-nav' }, [
          h('button', {
            class: 'tbtn ghost', disabled: prevN === null,
            title: prevN !== null ? `Go to ${sideLetter}${prevN}` : 'No earlier sub-side',
            onClick: () => { if (prevN !== null) openEditor(wccCode, roundNum, sideLetter, prevN); },
          }, '‹ Prev'),
          h('button', {
            class: 'tbtn ghost', disabled: nextN === null,
            title: nextN !== null ? `Go to ${sideLetter}${nextN}` : 'No later sub-side',
            onClick: () => { if (nextN !== null) openEditor(wccCode, roundNum, sideLetter, nextN); },
          }, 'Next ›'),
        ]);
      })(),
      h('div', { class: 'crumbs' }, [
        h('span', {}, 'WCC ' + wccCode), h('span', { class: 'sep' }, '/'),
        h('span', {}, 'RND ' + roundNum), h('span', { class: 'sep' }, '/'),
        h('span', {}, 'Side ' + sideLetter), h('span', { class: 'sep' }, '/'),
        h('span', { class: 'current' }, 'Sub ' + subNum),
      ]),
      h('div', { class: 'actions' }, [
        h('button', { class: 'tbtn ghost', onClick: () => openCopyStripModal(strip, wccCode, roundNum, sideLetter, subNum) }, 'Copy section to…'),
        h('button', { class: 'tbtn', onClick: () => openPrintModal(strip, stripIdLabel, roundNum) }, '⎙ Print'),
      ]),
    ]),

    h('div', { class: 'preview-wrap' }, [
      h('div', { class: 'preview-bar' }, [
        h('div', { class: 'stats' }, [
          h('span', { class: 'stat' }, [h('strong', {}, strip.sections.length), ' SECTIONS']),
          h('span', { class: 'stat' }, [h('strong', {}, totalAddresses), ' ADDRESSES']),
          h('span', { class: 'stat ' + (totalNotches > MAX_NOTCHES ? 'overflow' : (totalNotches >= NEAR_LIMIT ? 'near' : '')) }, [
            h('strong', {}, totalNotches),
            ' NOTCHES',
            totalNotches > MAX_NOTCHES ? h('span', { class: 'over-badge', title: 'Over the 60-notch strip limit' }, ` · ${totalNotches - MAX_NOTCHES} OVER`) : null,
            (totalNotches <= MAX_NOTCHES && totalNotches >= NEAR_LIMIT) ? h('span', { class: 'near-badge', title: 'Near the 60-notch strip limit' }, ` · ${MAX_NOTCHES - totalNotches} LEFT`) : null,
          ]),
          h('span', { class: 'stat' }, [h('strong', {}, `RND_${roundNum} ${stripIdLabel}`), '']),
        ]),
        h('div', { class: 'right' }, [
          h('span', { class: 'mono', style: { fontSize: '10px' } }, 'ZOOM'),
          h('div', { class: 'zoom-control' }, [
            h('button', { onClick: () => { UI.editor.zoom = Math.max(0.5, +(UI.editor.zoom - 0.1).toFixed(2)); renderEditorPreserveScroll(); }}, '−'),
            h('span', { class: 'level' }, Math.round(UI.editor.zoom * 100) + '%'),
            h('button', { onClick: () => { UI.editor.zoom = Math.min(2.0, +(UI.editor.zoom + 0.1).toFixed(2)); renderEditorPreserveScroll(); }}, '+'),
          ]),
        ]),
      ]),
      h('div', { class: 'preview-scroll' }, previewStrip),
    ]),

    sectionTabs,
    inspector,
  ]);
  root.appendChild(page);
  fitNotchNumbers($('.preview-scroll'));
}

function renderStripDOM(strip, opts={}) {
  const { interactive=false, zoom=null } = opts;
  const z = zoom !== null ? zoom : UI.editor.zoom;

  const stripEl = h('div', {
    class: 'strip' + (strip.sections.length === 0 ? ' is-empty' : ''),
    style: interactive ? { transform: `scale(${z})`, transformOrigin: '0 0' } : {},
  });

  if (!strip.sections.length) {
    stripEl.appendChild(document.createTextNode('Empty strip — add a section to begin'));
    return stripEl;
  }

  for (const sec of strip.sections) {
    stripEl.appendChild(renderSectionDOM(sec, interactive));
  }

  // End marker
  const idLabel = UI.editor.sideLetter && UI.editor.subNum
    ? UI.editor.sideLetter + UI.editor.subNum
    : '—';
  const roundLbl = UI.editor.roundNum ? `RND_${UI.editor.roundNum}` : 'RND_____';
  stripEl.appendChild(h('div', { class: 'strip-end' }, [
    h('div', { class: 'rnd' }, roundLbl),
    h('div', { class: 'id' }, idLabel),
  ]));
  return stripEl;
}

function renderSectionDOM(section, interactive) {
  const cells = layoutSection(section);
  const txt = getTextColor(section);
  const isSelected = interactive && section.id === UI.editor.selectedSectionId;
  const notchCount = cells.reduce((s, c) => s + (c.width || 1), 0);

  const numRow = h('div', { class: 'num-row' });
  for (const cell of cells) {
    numRow.appendChild(renderCellDOM(cell, txt));
  }

  // The label centres when it fits and left-aligns when it overflows.
  // Trick: flex parent with justify-content:center, child with max-width:100% +
  // text-align:left + overflow:hidden. When the text fits the child shrinks
  // to its content (centred); when it doesn't, the child clamps to 100% and
  // the visible portion starts from the left.
  const labelRow = h('div', { class: 'label-row' }, [
    h('span', { class: 'label-text' }, section.label || '\u00A0'),
  ]);

  const section_el = h('div', {
    class: 'strip-section' + (isSelected ? ' selected' : ''),
    style: {
      background: section.color,
      color: txt,
      width: `calc(var(--notch-w) * ${notchCount})`,
      flex: `0 0 calc(var(--notch-w) * ${notchCount})`,
    },
    'data-section-id': section.id,
    onClick: interactive ? (e) => {
      e.stopPropagation();
      selectSection(section.id);
    } : null,
  }, [
    numRow,
    labelRow,
  ]);
  return section_el;
}

// Select a section WITHOUT re-rendering the preview (preserves scroll position).
// Only updates the inspector, tabs, and the .selected class on existing nodes.
function selectSection(id) {
  UI.editor.selectedSectionId = id;
  // Update .selected class on preview sections
  $$('.preview-scroll .strip-section').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('data-section-id') === id);
  });
  // Re-render inspector
  const strip = getStrip(UI.editor.wccCode, UI.editor.roundNum, UI.editor.sideLetter, UI.editor.subNum);
  if (!strip) return;
  const section = strip.sections.find(s => s.id === id);
  const inspectorEl = $('.inspector') || $('.inspector-empty');
  const newInspector = section
    ? renderInspector(strip, section)
    : h('div', { class: 'inspector-empty' }, 'Section not found.');
  inspectorEl.replaceWith(newInspector);
  // Re-render section tabs (active state changed)
  refreshTabs(strip);
}

function refreshTabs(strip) {
  const tabsEl = $('.section-tabs');
  if (!tabsEl) return;
  const newTabs = buildSectionTabs(strip);
  tabsEl.replaceWith(newTabs);
}

function buildSectionTabs(strip) {
  return h('div', { class: 'section-tabs' },
    strip.sections.map((s, i) => h('button', {
      class: 'section-tab ' + (s.id === UI.editor.selectedSectionId ? 'active' : ''),
      onClick: () => selectSection(s.id),
    }, [
      h('span', { class: 'dot', style: { background: s.color } }),
      `${i+1}. ${s.label || '(UNTITLED)'}`,
    ])).concat(
      h('button', { class: 'section-tab', onClick: () => {
        const newSec = addSection(strip, { label: '' });
        UI.editor.selectedSectionId = newSec.id;
        renderEditorPreserveScroll();
      }}, '+ SECTION')
    )
  );
}

// Re-render the editor view but preserve horizontal preview scroll.
function renderEditorPreserveScroll() {
  const scroller = $('.preview-scroll');
  const sl = scroller ? scroller.scrollLeft : 0;
  renderEditor();
  const newScroller = $('.preview-scroll');
  if (newScroller) newScroller.scrollLeft = sl;
}

function renderCellDOM(cell, txt) {
  const tier = cell.tier || 'tier-m';
  if (cell.kind === 'pair') {
    const [a, b] = cell.addresses;
    return h('div', { class: 'notch' }, [
      h('div', { class: 'notch-numbers pair ' + tier }, [
        h('span', { class: 'num' }, a.number || '\u00A0'),
        h('span', { class: 'num' }, b.number || '\u00A0'),
      ]),
    ]);
  }
  if (cell.kind === 'single') {
    return h('div', { class: 'notch' }, [
      h('div', { class: 'notch-numbers single ' + tier }, [
        h('span', { class: 'num' }, cell.address.number || '\u00A0'),
      ]),
    ]);
  }
  if (cell.kind === 'apt') {
    // Wide notch: parent number centred across the full segment, with the unit
    // row divided into one cell per unit beneath it.
    const unitsEl = h('div', { class: 'notch-units' },
      cell.units.map(u => {
        if (isEmptyUnit(u)) {
          // Placeholder cell — blank, carries no flags, not a deliverable.
          return h('div', { class: 'unit empty', title: '' }, ' ');
        }
        return h('div', { class: 'unit', title: u.label }, u.label || '·');
      })
    );
    return h('div', {
      class: 'notch notch-apt',
      style: {
        width: `calc(var(--notch-w) * ${cell.width})`,
        flex: `0 0 calc(var(--notch-w) * ${cell.width})`,
      },
    }, [
      h('div', { class: 'notch-numbers apt ' + tier }, [
        h('span', { class: 'num' }, cell.address.number || '\u00A0'),
      ]),
      unitsEl,
    ]);
  }
  return h('div', { class: 'notch' });
}

// v0.6: guarantee every number group fits on one line within its notch.
// CSS tiers give a conservative starting size; this shrinks the font further
// (down to a 4px floor) whenever content still overflows, so paired numbers
// never layer or clip. Runs only on screen (print relies on the static CSS
// tiers, since hidden print DOM can't be measured).
function fitNotchNumbers(scope) {
  const groups = $$('.notch-numbers', scope || document);
  for (const g of groups) {
    const nums = $$('.num', g);
    if (!nums.length) continue;
    nums.forEach(n => { n.style.fontSize = ''; }); // re-measure from CSS tier
    let guard = 0;
    while (g.scrollWidth > g.clientWidth + 0.5 && guard < 48) {
      for (const n of nums) {
        const cur = parseFloat(getComputedStyle(n).fontSize) || 12;
        if (cur <= 4) { guard = 48; break; }
        n.style.fontSize = (cur - 0.5) + 'px';
      }
      guard++;
    }
  }
}

function flagDotsForAddresses(addresses) {
  // Surface address-level flags AND any descendant unit flags (so an apt
  // address with one commercial unit shows the com dot).
  let com = false, njm = false;
  for (const a of addresses) {
    if (!a) continue;
    if (a.isCommercial) com = true;
    if (a.noJunkMail)   njm = true;
    for (const u of a.units || []) {
      if (u.isCommercial) com = true;
      if (u.noJunkMail)   njm = true;
    }
  }
  const dots = [];
  if (com) dots.push(h('span', { class: 'notch-flag com', title: 'COMMERCIAL' }));
  if (njm) dots.push(h('span', { class: 'notch-flag njm', title: 'NO JUNK MAIL' }));
  if (!dots.length) return null;
  return h('div', { class: 'notch-flags' }, dots);
}

// ============== INSPECTOR (section detail editor) ==============
function renderInspector(strip, section) {
  const wrap = h('div', { class: 'inspector' });

  wrap.appendChild(h('h3', {}, section.label || '(UNTITLED SECTION)'));
  wrap.appendChild(h('div', { class: 'subtitle' }, `SECTION · ${section.addresses.length} ADDRESSES · ${sectionNotchCount(section)} NOTCHES · ${section.notchMode === 'double' ? '2 PER NOTCH' : '1 PER NOTCH'}`));

  // --- Label + color + mode ---
  const labelInput = h('input', {
    class: 'input',
    type: 'text',
    value: section.label,
    placeholder: 'e.g. CALLABONNA ST  /  VET HOSPITAL',
    onInput: (e) => { section.label = e.target.value.toUpperCase(); saveState(); refreshPreview(strip); refreshHeader(section); },
  });

  const hexInput = h('input', {
    class: 'input hex-input mono',
    type: 'text',
    value: section.color.toUpperCase(),
    maxlength: 7,
    onInput: (e) => {
      const v = e.target.value.trim();
      if (/^#?[0-9A-Fa-f]{6}$/.test(v)) {
        section.color = v[0] === '#' ? v : '#' + v;
        saveState();
        refreshPreview(strip);
        refreshPaletteSelection(wrap, section);
      }
    },
  });

  const paletteEl = h('div', { class: 'palette' },
    DEFAULT_PALETTE.map(p => h('div', {
      class: 'swatch' + (p.bg.toLowerCase() === section.color.toLowerCase() ? ' selected' : ''),
      style: { background: p.bg },
      title: p.name,
      onClick: () => {
        section.color = p.bg;
        saveState();
        refreshPreview(strip);
        renderInspector_inplace(strip, section, wrap);
      },
    }, [
      h('span', { class: 'check', style: { color: autoTextColor(p.bg) } },
        p.bg.toLowerCase() === section.color.toLowerCase() ? '✓' : '')
    ]))
    .concat([hexInput])
  );

  const modeToggle = h('div', { class: 'toggle-group' }, [
    h('button', {
      class: section.notchMode === 'double' ? 'active' : '',
      onClick: () => {
        if (section.notchMode === 'double') return;
        section.notchMode = 'double';
        // Switching to double shrinks the strip, so no limit-check needed.
        saveState(); refreshPreview(strip); refreshHeader(section);
      },
    }, '2 per notch'),
    h('button', {
      class: section.notchMode === 'single' ? 'active' : '',
      onClick: () => {
        if (section.notchMode === 'single') return;
        // Probe: switching to single may roughly double this section's notch count.
        const prev = section.notchMode;
        section.notchMode = 'single';
        const projected = stripNotchCount(strip);
        if (projected > MAX_NOTCHES) {
          section.notchMode = prev;
          toast(`Single mode would push this strip to ${projected} notches — over the 60-notch limit. Move some sections off first.`, 'danger');
          return;
        }
        saveState(); refreshPreview(strip); refreshHeader(section);
      },
    }, '1 per notch'),
  ]);

  const textToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: section.textColor === 'auto' ? 'active' : '', onClick: () => { section.textColor = 'auto'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'Auto'),
    h('button', { class: section.textColor === '#000' ? 'active' : '', onClick: () => { section.textColor = '#000'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'Black'),
    h('button', { class: section.textColor === '#fff' ? 'active' : '', onClick: () => { section.textColor = '#fff'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'White'),
  ]);

  wrap.appendChild(h('div', { class: 'form-row' }, [
    h('div', { class: 'field grow' }, [
      h('label', {}, 'Label (street or business)'),
      labelInput,
    ]),
    h('div', { class: 'field' }, [
      h('label', {}, 'Notch density'),
      modeToggle,
    ]),
    h('div', { class: 'field' }, [
      h('label', {}, 'Text color'),
      textToggle,
    ]),
  ]));

  wrap.appendChild(h('div', { class: 'form-row' }, [
    h('div', { class: 'field grow' }, [
      h('label', {}, 'Background color'),
      paletteEl,
    ]),
  ]));

  // --- Address list ---
  wrap.appendChild(h('div', { class: 'section-eyebrow' }, 'Addresses (driving order)'));
  wrap.appendChild(renderAddressList(strip, section));

  // --- Section actions ---
  wrap.appendChild(h('div', { class: 'form-row', style: { marginTop: '18px', paddingTop: '16px', borderTop: '1px solid var(--border)' } }, [
    h('button', { class: 'tbtn ghost', onClick: () => { moveSection(strip, section.id, -1); renderEditorPreserveScroll(); }}, '← Shift left'),
    h('button', { class: 'tbtn ghost', onClick: () => { moveSection(strip, section.id, +1); renderEditorPreserveScroll(); }}, 'Shift right →'),
    h('button', { class: 'tbtn ghost', onClick: () => {
      // Probe: would duplicating this section push the strip over 60?
      const dupNotches = sectionNotchCount(section);
      if (stripNotchCount(strip) + dupNotches > MAX_NOTCHES) {
        toast(`Duplicating would add ${dupNotches} notches — over the 60-notch limit. Move some sections off first.`, 'danger');
        return;
      }
      const c = duplicateSection(strip, section.id);
      UI.editor.selectedSectionId = c.id;
      renderEditorPreserveScroll();
    }}, '⎘ Duplicate to end'),
    h('div', { style: { flex: 1 } }),
    h('button', { class: 'tbtn danger', onClick: () => {
      confirmDelete(`section "${section.label || 'untitled'}"`, () => {
        deleteSection(strip, section.id);
        UI.editor.selectedSectionId = null;
        renderEditorPreserveScroll();
      });
    }}, 'Delete section'),
  ]));

  return wrap;
}

function renderInspector_inplace(strip, section, oldEl) {
  const newEl = renderInspector(strip, section);
  oldEl.replaceWith(newEl);
}

function refreshPreview(strip) {
  const scroller = $('.preview-scroll');
  if (!scroller) return;
  scroller.innerHTML = '';
  scroller.appendChild(renderStripDOM(strip, { interactive: true }));
  fitNotchNumbers(scroller);
}

function refreshHeader(section) {
  // Re-render the inspector header bits & section tabs without nuking focus inputs
  const strip = getStrip(UI.editor.wccCode, UI.editor.roundNum, UI.editor.sideLetter, UI.editor.subNum);
  if (!strip) return;
  refreshTabs(strip);
  // Update header h3 + subtitle
  const insp = $('.inspector');
  if (insp) {
    const h3 = insp.querySelector('h3');
    if (h3) h3.textContent = section.label || '(UNTITLED SECTION)';
    const sub = insp.querySelector('.subtitle');
    if (sub) sub.textContent = `SECTION · ${section.addresses.length} ADDRESSES · ${sectionNotchCount(section)} NOTCHES · ${section.notchMode === 'double' ? '2 PER NOTCH' : '1 PER NOTCH'}`;
  }
}

function refreshPaletteSelection(wrap, section) {
  const swatches = wrap.querySelectorAll('.swatch');
  swatches.forEach(sw => {
    const isSel = sw.style.background.includes(section.color) || rgbToHex(sw.style.background).toLowerCase() === section.color.toLowerCase();
    sw.classList.toggle('selected', isSel);
  });
}
function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m) return '#000000';
  return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

// ============== ADDRESS EDITOR ==============
function renderAddressList(strip, section) {
  const wrap = h('div', { class: 'addr-table-wrap' });

  if (!section.addresses.length) {
    wrap.appendChild(h('div', { style: { padding: '14px', color: 'var(--text-muted)', fontSize: '13px' } }, 'NO ADDRESSES YET — ADD SOME BELOW.'));
  } else {
    const table = h('table', { class: 'addr-table' }, [
      h('thead', {}, h('tr', {}, [
        h('th', { class: 'col-drag' }, ''),
        h('th', { class: 'col-num' }, 'Number'),
        h('th', { class: 'col-flags' }, 'Flags'),
        h('th', { class: 'col-units' }, 'Apartments / Units'),
        h('th', { class: 'col-actions' }, ''),
      ])),
      h('tbody', { class: 'addr-tbody' }, section.addresses.map((a, idx) => renderAddressRow(strip, section, a, idx))),
    ]);
    wrap.appendChild(table);
  }

  // Add row
  let newNumInput;
  let bulkInput;
  const quickAdd = () => {
    const v = newNumInput.value.trim();
    if (!v) return;
    // Probe: would adding push the strip over 60 notches?
    const before = stripNotchCount(strip);
    addAddress(section, v, []);
    if (stripNotchCount(strip) > MAX_NOTCHES) {
      section.addresses.pop();
      saveState();
      toast(`60-notch limit reached (currently ${before}). Move some sections to another strip first.`, 'danger');
      return;
    }
    newNumInput.value = '';
    renderInspector_inplace(strip, section, $('.inspector'));
    refreshPreview(strip);
    refreshHeader(section);
    setTimeout(() => {
      const newInput = $('.addr-add-row .input[data-quick]');
      if (newInput) newInput.focus();
    }, 0);
  };
  newNumInput = h('input', {
    class: 'input mono',
    type: 'text',
    placeholder: 'HOUSE # (e.g. 40 OR 12A)',
    'data-quick': '1',
    style: { flex: '0 0 180px' },
    onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); quickAdd(); } },
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
    },
  });

  bulkInput = h('input', {
    class: 'input mono',
    type: 'text',
    placeholder: 'BULK: 40-32, 30, 28A  ·  1-9 (odd)  ·  12-18 (even)  ·  33-25 (descending)',
    style: { flex: 1 },
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
    },
    onKeydown: (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = bulkInput.value.trim();
        if (!v) return;
        const parts = parseBulkRanges(v);
        let added = 0;
        let blocked = false;
        for (const p of parts) {
          addAddress(section, p, []);
          if (stripNotchCount(strip) > MAX_NOTCHES) {
            section.addresses.pop();
            saveState();
            blocked = true;
            break;
          }
          added++;
        }
        bulkInput.value = '';
        renderInspector_inplace(strip, section, $('.inspector'));
        refreshPreview(strip);
        refreshHeader(section);
        if (blocked) {
          toast(`Added ${added} of ${parts.length} — stopped at the 60-notch limit`, 'warn');
        } else {
          toast(`Added ${parts.length} address${parts.length===1?'':'es'}`, 'good');
        }
      }
    },
  });

  wrap.appendChild(h('div', { class: 'addr-add-row' }, [
    newNumInput,
    h('button', { class: 'tbtn primary', onClick: quickAdd }, '+ Add'),
    bulkInput,
    h('span', { class: 'kbd', style: { alignSelf: 'center' } }, '↵'),
  ]));

  return wrap;
}

function renderAddressRow(strip, section, addr, idx) {
  const hasUnits = addr.units && addr.units.length > 0;

  // number input — force uppercase, immediately reflects in the strip
  const numInput = h('input', {
    class: 'input mono small',
    type: 'text',
    value: addr.number,
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
      addr.number = upper;
      saveState();
      refreshPreview(strip);
    },
  });

  // Address-level flag buttons. When the address has units they act as a
  // "set on every unit" bulk toggle instead of an address-level value.
  const njmBtn = h('button', {
    class: 'flag-toggle',
    title: hasUnits
      ? 'Toggle "No junk mail" on every unit of this address'
      : 'Toggle "No junk mail" — exclude this address from junk-mail count',
  }, 'NO JUNK MAIL');
  const comBtn = h('button', {
    class: 'flag-toggle com',
    title: hasUnits
      ? 'Toggle "Commercial" on every unit of this address'
      : 'Toggle "Commercial" — mark as business / commercial premises',
  }, 'COMMERCIAL');

  const refreshAddrLevelButtons = () => {
    if (hasUnits) {
      const allNjm = addr.units.length > 0 && addr.units.every(u => u.noJunkMail);
      const someNjm = addr.units.some(u => u.noJunkMail);
      const allCom = addr.units.length > 0 && addr.units.every(u => u.isCommercial);
      const someCom = addr.units.some(u => u.isCommercial);
      njmBtn.classList.toggle('active',  allNjm);
      njmBtn.classList.toggle('partial', !allNjm && someNjm);
      comBtn.classList.toggle('active',  allCom);
      comBtn.classList.toggle('partial', !allCom && someCom);
    } else {
      njmBtn.classList.toggle('active', !!addr.noJunkMail);
      njmBtn.classList.remove('partial');
      comBtn.classList.toggle('active', !!addr.isCommercial);
      comBtn.classList.remove('partial');
    }
  };

  njmBtn.onclick = () => {
    if (hasUnits) {
      const allOn = addr.units.every(u => u.noJunkMail);
      for (const u of addr.units) u.noJunkMail = !allOn;
    } else {
      addr.noJunkMail = !addr.noJunkMail;
    }
    saveState();
    refreshAddrLevelButtons();
    refreshUnits();
    refreshPreview(strip);
  };
  comBtn.onclick = () => {
    if (hasUnits) {
      const allOn = addr.units.every(u => u.isCommercial);
      for (const u of addr.units) u.isCommercial = !allOn;
    } else {
      addr.isCommercial = !addr.isCommercial;
    }
    saveState();
    refreshAddrLevelButtons();
    refreshUnits();
    refreshPreview(strip);
  };

  // Per-unit chips with their own flag toggles
  const unitsWrap = h('div', { class: 'unit-chips' });
  const refreshUnits = () => {
    unitsWrap.innerHTML = '';
    for (const u of addr.units) {
      const blank = isEmptyUnit(u);
      const chip = h('span', { class: 'unit-chip' + (blank ? ' empty' : '') + (u.noJunkMail ? ' njm' : '') + (u.isCommercial ? ' com' : '') }, [
        h('span', { class: 'unit-label', style: blank ? { fontStyle: 'italic', opacity: '0.75' } : null },
          blank ? '(no unit)' : u.label),
        h('button', {
          class: 'unit-flag-btn njm-btn' + (u.noJunkMail ? ' active' : ''),
          title: 'Toggle no junk mail for unit ' + u.label,
          onClick: (e) => {
            e.stopPropagation();
            u.noJunkMail = !u.noJunkMail;
            saveState();
            chip.classList.toggle('njm', u.noJunkMail);
            e.currentTarget.classList.toggle('active', u.noJunkMail);
            refreshAddrLevelButtons();
            refreshPreview(strip);
          },
        }, 'NJM'),
        h('button', {
          class: 'unit-flag-btn com-btn' + (u.isCommercial ? ' active' : ''),
          title: 'Toggle commercial for unit ' + u.label,
          onClick: (e) => {
            e.stopPropagation();
            u.isCommercial = !u.isCommercial;
            saveState();
            chip.classList.toggle('com', u.isCommercial);
            e.currentTarget.classList.toggle('active', u.isCommercial);
            refreshAddrLevelButtons();
            refreshPreview(strip);
          },
        }, 'COM'),
        h('button', { class: 'unit-remove', title: 'Remove unit', onClick: (e) => {
          e.stopPropagation();
          const i = addr.units.indexOf(u);
          if (i >= 0) addr.units.splice(i, 1);
          saveState();
          renderInspector_inplace(strip, section, $('.inspector'));
          refreshPreview(strip);
          refreshHeader(section);
        }}, '×'),
      ]);
      unitsWrap.appendChild(chip);
    }
    // input to add (range-aware)
    const ui = h('input', {
      class: 'input small mono',
      type: 'text',
      placeholder: '+ UNIT (A, B  ·  1-10  ·  1, 3, 5)',
      style: { width: '230px' },
      onInput: (e) => {
        const upper = e.target.value.toUpperCase();
        if (e.target.value !== upper) {
          const pos = e.target.selectionStart;
          e.target.value = upper;
          try { e.target.setSelectionRange(pos, pos); } catch(_) {}
        }
      },
      onKeydown: (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const v = ui.value.trim();
          if (!v) return;
          const parts = parseBulkRanges(v);
          const beforeUnits = addr.units.length;
          let added = 0;
          let blocked = false;
          for (const p of parts) {
            addr.units.push({ id: uid('u'), label: p.toUpperCase(), noJunkMail: false, isCommercial: false });
            if (stripNotchCount(strip) > MAX_NOTCHES) {
              addr.units.pop();
              blocked = true;
              break;
            }
            added++;
          }
          saveState();
          ui.value = '';
          renderInspector_inplace(strip, section, $('.inspector'));
          refreshPreview(strip);
          refreshHeader(section);
          if (blocked) {
            toast(`Added ${added} of ${parts.length} units — stopped at the 60-notch limit`, 'warn');
          }
        }
      },
    });
    unitsWrap.appendChild(ui);
    // "+ empty" — adds a blank placeholder sub-cell (used to shape an apt notch
    // to match the physical strip). Not counted as a deliverable.
    const emptyBtn = h('button', {
      class: 'tbtn ghost', style: { padding: '3px 8px', fontSize: '11px' },
      title: 'Add a blank placeholder sub-cell (not counted as mail)',
      onClick: (e) => {
        e.stopPropagation();
        addr.units.push({ id: uid('u'), label: '_', _empty: true, noJunkMail: false, isCommercial: false });
        if (stripNotchCount(strip) > MAX_NOTCHES) {
          addr.units.pop();
          toast('Cannot add — would exceed the 60-notch limit', 'warn');
          return;
        }
        saveState();
        renderInspector_inplace(strip, section, $('.inspector'));
        refreshPreview(strip);
        refreshHeader(section);
      },
    }, '+ empty');
    unitsWrap.appendChild(emptyBtn);
  };
  refreshUnits();
  refreshAddrLevelButtons();

  // Drag-and-drop. We only flip the row to draggable while the user is
  // mousing the handle — this stops accidental drags when they're editing.
  const tr = h('tr', { class: 'addr-row', 'data-idx': String(idx) });
  const handle = h('span', { class: 'drag-handle', title: 'Drag to reorder',
    onMousedown: () => { tr.draggable = true; },
    onMouseup:   () => { tr.draggable = false; },
  }, '⋮⋮');
  tr.addEventListener('dragstart', (e) => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    tr.classList.add('dragging');
  });
  tr.addEventListener('dragend', () => {
    tr.draggable = false;
    tr.classList.remove('dragging');
    $$('.addr-row.drag-over').forEach(el => el.classList.remove('drag-over', 'drag-over-above', 'drag-over-below'));
  });
  tr.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = tr.getBoundingClientRect();
    const above = (e.clientY - rect.top) < (rect.height / 2);
    tr.classList.add('drag-over');
    tr.classList.toggle('drag-over-above', above);
    tr.classList.toggle('drag-over-below', !above);
  });
  tr.addEventListener('dragleave', () => {
    tr.classList.remove('drag-over', 'drag-over-above', 'drag-over-below');
  });
  tr.addEventListener('drop', (e) => {
    e.preventDefault();
    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
    tr.classList.remove('drag-over', 'drag-over-above', 'drag-over-below');
    if (isNaN(fromIdx) || fromIdx === idx) return;
    const rect = tr.getBoundingClientRect();
    const above = (e.clientY - rect.top) < (rect.height / 2);
    let toIdx = above ? idx : idx + 1;
    if (fromIdx < toIdx) toIdx--;
    const [moved] = section.addresses.splice(fromIdx, 1);
    section.addresses.splice(toIdx, 0, moved);
    saveState();
    renderInspector_inplace(strip, section, $('.inspector'));
    refreshPreview(strip);
  });

  tr.appendChild(h('td', { class: 'col-drag' }, [handle]));
  tr.appendChild(h('td', { class: 'col-num' }, [numInput]));
  tr.appendChild(h('td', { class: 'col-flags' }, [h('div', { class: 'flag-toggle-row' }, [njmBtn, comBtn])]));
  tr.appendChild(h('td', { class: 'col-units' }, [unitsWrap]));
  tr.appendChild(h('td', { class: 'col-actions' }, [
    h('button', { class: 'icon-btn', title: 'Shift up', onClick: () => {
      if (idx <= 0) return;
      [section.addresses[idx-1], section.addresses[idx]] = [section.addresses[idx], section.addresses[idx-1]];
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
    }}, '↑'),
    h('button', { class: 'icon-btn', title: 'Shift down', onClick: () => {
      if (idx >= section.addresses.length - 1) return;
      [section.addresses[idx], section.addresses[idx+1]] = [section.addresses[idx+1], section.addresses[idx]];
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
    }}, '↓'),
    h('button', { class: 'icon-btn danger', title: 'Delete', onClick: () => {
      section.addresses.splice(idx, 1);
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
      refreshHeader(section);
    }}, '×'),
  ]));
  return tr;
}

  document.body.appendChild(back);

}

function openAddRoundModal(presetWcc='') {
  let wccInput, roundInput, labelInput, sidesInput, subsInput, wccHint;

  // Resolve whatever the user typed (a code OR a label) to a registry code.
  const resolveWcc = (raw) => {
    const hit = lookupWccByText(raw);
    return hit ? hit.code : String(raw || '').trim();
  };

  const submit = () => {
    const wcc = resolveWcc(wccInput.value);
    const rnd = roundInput.value.trim();
    const label = labelInput.value.trim().toUpperCase();
    if (!wcc || !rnd) { toast('WCC and Round are required', 'warn'); return; }
    if (!label) { toast('Suburb label is required — e.g. "GIRALANG / KALEEN"', 'warn'); labelInput.focus(); return; }
    const sides = sidesInput.value.split(',').map(x => x.trim().toUpperCase()).filter(x => /^[A-D]$/.test(x));
    const subs = subsInput.value.split(',').map(x => parseInt(x.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 9);
    if (!sides.length) { toast('At least one side letter (A-D)', 'warn'); return; }
    if (!subs.length) { toast('At least one sub-side number', 'warn'); return; }
    const round = ensureRound(wcc, rnd);
    round.label = label;
    const rndInt = parseInt(rnd, 10);
    for (const sl of sides) {
      const side = ensureSide(wcc, rnd, sl);
      // Auto-set the side label as (round + 1 for A, + 2 for B, etc.)
      if (!side.label && !isNaN(rndInt)) {
        const sideIndex = sl.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
        side.label = String(rndInt + sideIndex);
      }
      for (const sn of subs) ensureSubSide(wcc, rnd, sl, sn);
    }
    saveState();
    closeModal();
    renderBrowse();
    toast(`Created RND ${rnd}`, 'good');
  };

  const modal = h('div', { class: 'modal' }, [
    h('h2', {}, 'New round'),
    h('p', { class: 'subtle' }, 'Side labels auto-increment from the round number (RND 1120 → A=1121, B=1122). The suburb label is required so the report knows which patch this round delivers.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'WCC  · type code or name'),
        wccInput = h('input', { class: 'input mono', type: 'text', value: presetWcc, placeholder: '281586 or MITCHELL PARCELS',
          list: 'wcc-options', autocomplete: 'off',
          onInput: (e) => {
            const hit = lookupWccByText(e.target.value);
            wccHint.textContent = hit ? `→ ${hit.code}${hit.label ? ' · ' + hit.label : ''}` : '';
          },
        }),
        h('datalist', { id: 'wcc-options' },
          Object.values(wccRegistry()).sort((a, b) => a.code.localeCompare(b.code))
            .map(w => h('option', { value: w.code }, w.label ? `${w.code} — ${w.label}` : w.code))
        ),
        wccHint = h('div', { class: 'page-subtitle', style: { marginTop: '4px', minHeight: '14px' } }, ''),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Round number (4 digits)'),
        roundInput = h('input', { class: 'input mono', type: 'text', placeholder: '1120', maxlength: 4 }),
      ]),
    ]),
    h('div', { class: 'field', style: { marginTop: '4px' } }, [
      h('label', {}, 'Suburb(s) covered  · required'),
      labelInput = h('input', { class: 'input', type: 'text', placeholder: 'e.g. GIRALANG / KALEEN',
        onInput: (e) => { e.target.value = e.target.value.toUpperCase(); }
      }),
    ]),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Sides'),
        sidesInput = h('input', { class: 'input mono', type: 'text', value: 'A, B', placeholder: 'A, B' }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Sub-sides'),
        subsInput = h('input', { class: 'input mono', type: 'text', value: '1, 2, 3', placeholder: '1, 2, 3' }),
      ]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Create'),
    ]),
  ]);

  wccInput && (wccInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); });
  openModal(modal);
}

function openAddSideModal(wccCode, roundNum) {
  let letterInput, labelInput, subsInput;
  const computeSuggestedLabel = (letter) => {
    if (!/^[A-D]$/.test(letter)) return '';
    const rndInt = parseInt(roundNum, 10);
    if (isNaN(rndInt)) return '';
    const idx = letter.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
    return String(rndInt + idx);
  };
  const submit = () => {
    const letter = letterInput.value.trim().toUpperCase();
    const label = labelInput.value.trim().toUpperCase();
    const subs = subsInput.value.split(',').map(x => parseInt(x.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 9);
    if (!/^[A-D]$/.test(letter)) { toast('Side must be A-D', 'warn'); return; }
    const s = ensureSide(wccCode, roundNum, letter);
    s.label = label || computeSuggestedLabel(letter);
    for (const sn of subs) ensureSubSide(wccCode, roundNum, letter, sn);
    saveState();
    closeModal();
    renderBrowse();
  };
  const modal = h('div', { class: 'modal' }, [
    h('h2', {}, 'Add side to round ' + roundNum),
    h('p', { class: 'subtle' }, 'The label auto-fills as (round + side index), e.g. RND 1120 → A=1121, B=1122. Override if you need to.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [
        h('label', {}, 'Letter'),
        letterInput = h('input', { class: 'input mono', type: 'text', placeholder: 'A', maxlength: 1, style: { width: '70px' },
          onInput: (e) => {
            e.target.value = e.target.value.toUpperCase();
            const suggested = computeSuggestedLabel(e.target.value);
            if (suggested && !labelInput.value) labelInput.value = suggested;
          },
        }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Label (auto)'),
        labelInput = h('input', { class: 'input mono', type: 'text', placeholder: 'e.g. 1121',
          onInput: (e) => { e.target.value = e.target.value.toUpperCase(); }
        }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Sub-sides'),
        subsInput = h('input', { class: 'input mono', type: 'text', value: '1, 2, 3' }),
      ]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Save'),
    ]),
  ]);
  openModal(modal);
}

        h('th', {}, 'Contact email'),

          onInput: (e) => { e.target.value = e.target.value.toUpperCase(); w.label = e.target.value; saveState(); } });
