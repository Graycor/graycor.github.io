// Pick the unifying colour for all same-named streets in a round. Offers each
// clashing colour as a button, plus a free colour picker.
function openColorFixModal(wccCode, roundNum, conflict) {
  const round = State.wccs[wccCode] && State.wccs[wccCode].rounds[roundNum];
  if (!round) return;

  const apply = (color) => {
    snapshotUndo(`unify colour of "${conflict.label}" (RND ${roundNum})`);
    const n = applyLabelColor(round, conflict.label, color);
    closeModal();
    toast(`Painted ${n} "${conflict.label}" section${n === 1 ? '' : 's'} ${color}. Roll back available.`, 'good');
    renderReview();
  };

  // Hexagonal colour wheel, seeded with the first clashing colour.
  let wheelHex = conflict.colors[0] || '#888888';
  const wheel = buildColorWheel(wheelHex, (hex) => { wheelHex = hex; });

  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, `Unify colour - ${conflict.label}`),
    h('p', { class: 'subtle' }, `This street is drawn in ${conflict.colors.length} different colours within RND ${roundNum}. Pick the one to use everywhere (this round only - other rounds and WCCs are untouched).`),
    h('div', { class: 'color-choice-grid' }, conflict.colors.map(c =>
      h('button', { class: 'color-choice', title: 'Use ' + c, onClick: () => apply(c) }, [
        h('span', { class: 'cc-swatch', style: { background: c } }),
        h('span', { class: 'cc-hex mono' }, c.toUpperCase()),
      ])
    )),
    h('div', { class: 'color-custom-row' }, [
      h('div', {}, [h('div', { class: 'cw-title' }, 'Or pick a new colour'), wheel]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: () => apply(wheelHex) }, 'Use wheel colour'),
    ]),
  ]));
}

// Destructive-action confirmation for auto-optimise.
function openOptimiseConfirm(wccCode, roundNum, sideLetter) {
  const side = ensureSide(wccCode, roundNum, sideLetter);
  const subCount = Object.keys(side.subSides).length;
  const totalNotches = flattenSideSections(side).reduce((n, s) => n + sectionNotchCount(s), 0);
  const projected = Math.max(1, Math.ceil(totalNotches / MAX_NOTCHES));

  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, `Auto-optimise side ${sideLetter}?`),
    h('div', { class: 'optimise-warn' }, [
      h('strong', {}, '⚠ This rewrites the entire side.'),
      h('p', {}, `Side ${sideLetter} currently has ${subCount} sub${subCount === 1 ? '' : 's'} holding ${totalNotches} notches in total. Auto-optimise will redistribute every address into ${projected} sub${projected === 1 ? '' : 's'}, filling each to 60 notches and leaving the remainder in the last. Streets may be split across subs, and the subs will be renumbered 1…${projected}.`),
      h('p', { class: 'subtle' }, 'A one-step roll back is offered immediately after. For real safety, export a JSON backup first (Menu → Export JSON).'),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn danger', onClick: () => {
        snapshotUndo(`auto-optimise side ${sideLetter} (RND ${roundNum})`);
        const res = optimiseSide(wccCode, roundNum, sideLetter);
        closeModal();
        toast(`Optimised side ${sideLetter}: ${res.beforeSubs} → ${res.afterSubs} sub${res.afterSubs === 1 ? '' : 's'}. Roll back available.`, 'good');
        renderReview();
      } }, '⚙ Optimise - I understand'),
    ]),
  ]));
}

// ============== BULK-CREATE A SIDE ==============
// Enter many sections (label + addresses) for a NEW side; the tool splits them
// into subs automatically via the pack engine.
function openBulkCreateSideModal(preset = {}) {
  const wccCodes = Object.keys(State.wccs).sort();

  let wccInput, roundInput, sideSel, rowsWrap;
  const rows = []; // { labelInput, addrInput }

  const addRow = (label = '', addrs = '') => {
    const labelInput = h('input', { class: 'input', type: 'text', placeholder: 'STREET / LABEL (e.g. CALLABONNA ST)', value: label,
      onInput: (e) => { e.target.value = e.target.value.toUpperCase(); } });
    const addrInput = h('textarea', { class: 'input', rows: '2', placeholder: 'Addresses - bulk syntax: 1-9, 11, 13-21, 28A  ·  named entries keep spaces',
      style: { resize: 'vertical', fontFamily: 'var(--ff-mono)' },
      onInput: (e) => { e.target.value = e.target.value.toUpperCase(); } });
    const row = h('div', { class: 'bulk-sec-row' }, [
      h('div', { class: 'bsr-fields' }, [labelInput, addrInput]),
      h('button', { class: 'icon-btn danger', title: 'Remove this section', onClick: () => {
        const i = rows.findIndex(r => r.row === row);
        if (i >= 0) { rows.splice(i, 1); row.remove(); }
      } }, '×'),
    ]);
    const rec = { row, labelInput, addrInput };
    rows.push(rec);
    if (rowsWrap) rowsWrap.appendChild(row);
    return rec;
  };

  wccInput = h('input', { class: 'input mono', type: 'text', placeholder: 'WCC code', list: 'bulk-wcc-list',
    value: preset.wcc || '',
    onInput: (e) => { e.target.value = e.target.value.toUpperCase(); } });
  const wccList = h('datalist', { id: 'bulk-wcc-list' }, wccCodes.map(c => h('option', { value: c })));
  roundInput = h('input', { class: 'input mono', type: 'text', placeholder: 'Round #', value: preset.round || '',
    onInput: (e) => { e.target.value = e.target.value.toUpperCase(); } });
  sideSel = h('select', { class: 'select input' }, ['A', 'B', 'C', 'D'].map(l => h('option', { value: l }, 'Side ' + l)));
  rowsWrap = h('div', { class: 'bulk-sec-list' });
  addRow(); addRow();

  const go = () => {
    const wcc = String(wccInput.value || '').trim().toUpperCase();
    const rnd = String(roundInput.value || '').trim().toUpperCase();
    const sideLetter = sideSel.value;
    const mode = 'double';
    if (!wcc || !rnd) { toast('WCC and Round are required', 'warn'); return; }

    // Build flat sections from the rows.
    const flat = [];
    for (const r of rows) {
      const label = String(r.labelInput.value || '').trim().toUpperCase();
      const raw = String(r.addrInput.value || '').trim();
      if (!raw) continue;
      const nums = parseBulkRanges(raw);
      if (!nums.length) continue;
      flat.push({
        label,
        color: CB_PALETTE[flat.length % CB_PALETTE.length],
        textColor: 'auto',
        notchMode: mode,
        addresses: nums.map(n => ({ id: uid('a'), number: String(n).toUpperCase(), units: [], noJunkMail: false, isCommercial: false })),
      });
    }
    if (!flat.length) { toast('Add at least one section with addresses', 'warn'); return; }

    const side = ensureSide(wcc, rnd, sideLetter);
    const existing = flattenSideSections(side).some(s => (s.addresses || []).length);
    const doIt = () => {
      snapshotUndo(`bulk-create side ${sideLetter} (RND ${rnd})`);
      // Tag the side label off the round number, like new-round creation does
      // (RND 1120 -> A=1121, B=1122, ...).
      const rndInt = parseInt(rnd, 10);
      if (!side.label && !isNaN(rndInt)) {
        side.label = String(rndInt + (sideLetter.charCodeAt(0) - 'A'.charCodeAt(0) + 1));
      }
      const packed = packSectionsIntoSubs(flat);
      side.subSides = {};
      packed.forEach((sub, i) => { side.subSides[String(i + 1)] = { number: i + 1, sections: sub.sections }; });
      saveState();
      closeModal();
      toast(`Built side ${sideLetter}: ${flat.length} section${flat.length === 1 ? '' : 's'} → ${packed.length} sub${packed.length === 1 ? '' : 's'}. Roll back available.`, 'good');
      goReview();
    };

    if (existing) {
      // Side already has content - bulk-create replaces it, so confirm.
      openModal(h('div', { class: 'modal' }, [
        h('h2', {}, `Side ${sideLetter} already has content`),
        h('div', { class: 'optimise-warn' }, [
          h('strong', {}, '⚠ This will replace every existing sub on the side.'),
          h('p', { class: 'subtle' }, 'A one-step roll back is offered after. Export a JSON backup first if this matters.'),
        ]),
        h('div', { class: 'modal-actions' }, [
          h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
          h('button', { class: 'tbtn danger', onClick: doIt }, 'Replace & build'),
        ]),
      ]));
    } else {
      doIt();
    }
  };

  // Guard against losing input by clicking off / pressing Escape.
  const hasContent = () => wccInput.value.trim() || roundInput.value.trim()
    || rows.some(r => r.labelInput.value.trim() || r.addrInput.value.trim());
  const showCloseGuard = () => {
    if (!UI.modal || UI.modal.querySelector('.bulk-guard')) return;
    const guard = h('div', { class: 'bulk-guard' }, [
      h('div', { class: 'bulk-guard-card' }, [
        h('h3', {}, 'Keep your sections?'),
        h('p', { class: 'subtle' }, 'You have unsaved sections. Build the side now, or keep editing - nothing is lost unless you discard.'),
        h('div', { class: 'modal-actions' }, [
          h('button', { class: 'tbtn danger', onClick: () => closeModal() }, 'Discard'),
          h('button', { class: 'tbtn ghost', onClick: () => guard.remove() }, 'Keep editing'),
          h('button', { class: 'tbtn primary', onClick: () => { guard.remove(); go(); } }, 'Save & build'),
        ]),
      ]),
    ]);
    UI.modal.appendChild(guard);
  };
  const onDismiss = () => { if (hasContent()) showCloseGuard(); else closeModal(); };

  openModal(h('div', { class: 'modal wide bulk-modal' }, [
    h('h2', {}, 'Bulk-create a side'),
    h('p', { class: 'subtle' }, 'Enter every section for a side in delivery order; the tool splits them into subs filled to 60 notches (the last sub keeps the remainder). Best for a brand-new side - it replaces any existing subs on that side.'),
    wccList,
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [h('label', {}, 'WCC'), wccInput]),
      h('div', { class: 'field' }, [h('label', {}, 'Round'), roundInput]),
      h('div', { class: 'field' }, [h('label', {}, 'Side'), sideSel]),
    ]),
    h('div', { class: 'field' }, [h('label', {}, 'Sections (in order)'), rowsWrap]),
    h('button', { class: 'tbtn ghost', onClick: () => addRow() }, '+ Add section'),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: go }, 'Build side'),
    ]),
  ]), { onDismiss });
}

// ============== NAV ==============
function openEditor(wcc, rnd, side, sub) {
  UI.view = 'editor';
  UI.editor.wccCode = wcc;
  UI.editor.roundNum = rnd;
  UI.editor.sideLetter = side;
  UI.editor.subNum = sub;
  UI.editor.selectedSectionId = null;
  ensureSubSide(wcc, rnd, side, sub);
  saveState();
  setActiveNav('editor');
  renderEditor();
}

function backToBrowse() {
  UI.view = 'browse';
  setActiveNav('browse');
  renderBrowse();
}

function goReview() {
  UI.view = 'review';
  setActiveNav('review');
  renderReview();
}

// Toggle the highlighted top-nav button.
function setActiveNav(view) {
  const b = $('#btn-browse'), r = $('#btn-review');
  if (b) b.classList.toggle('active', view === 'browse');
  if (r) r.classList.toggle('active', view === 'review');
}

// ============== INIT ==============
function init() {
  // Apply the saved colour theme (dark by default).
  applyTheme(appSettings().theme);

  // Home button + brand both return to the library / dashboard.
  $('#btn-browse').addEventListener('click', backToBrowse);
  $('#btn-review').addEventListener('click', goReview);
  $('#btn-home-brand').addEventListener('click', backToBrowse);

  // Top-right kebab menu
  const menu = $('#menu-dropdown');
  const menuBtn = $('#btn-menu');
  const closeMenu = () => { menu.hidden = true; menuBtn.setAttribute('aria-expanded', 'false'); };
  const toggleMenu = () => {
    const willOpen = menu.hidden;
    menu.hidden = !willOpen;
    menuBtn.setAttribute('aria-expanded', String(willOpen));
  };
  menuBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
  document.addEventListener('click', (e) => {
    if (!menu.hidden && !menu.contains(e.target) && e.target !== menuBtn) closeMenu();
  });
  $('#mi-export').addEventListener('click', () => { closeMenu(); exportJSON(); });
  $('#mi-import').addEventListener('click', () => { closeMenu(); $('#file-import').click(); });
  $('#mi-advprint').addEventListener('click', () => { closeMenu(); openAdvancedPrintModal(); });
  $('#mi-settings').addEventListener('click', () => { closeMenu(); openSettingsModal(); });
  $('#mi-theme').addEventListener('click', () => { closeMenu(); toggleTheme(); });
  $('#mi-changelog').addEventListener('click', () => { closeMenu(); openChangelogModal(); });
  $('#file-import').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importJSON(f);
    e.target.value = '';
  });

  // Escape closes modals
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && UI.modal) requestCloseModal();
  });

  // After every print, clean up the dynamic page-size CSS and printing-mode attr
  // so the next print doesn't inherit the wrong page size or visible root.
  window.addEventListener('afterprint', () => {
    document.body.removeAttribute('data-printing');
    const dyn = document.getElementById('dynamic-page-style');
    if (dyn) dyn.remove();
    const pr = $('#print-root');   if (pr) pr.innerHTML = '';
    const rr = $('#report-root');  if (rr) rr.innerHTML = '';
  });

  renderBrowse();
}

// ============== AUTH GATE ==============
// IMPORTANT: this is a client-side DETERRENT, not real security. The whole app
// and this hash ship to the browser, so anyone who views source or opens
// devtools can bypass it. It only stops casual visitors from using the tool on
// a public URL (e.g. GitHub Pages). Your actual data never leaves the browser -
// it lives in localStorage and in the JSON you export/import.
//
// To change the password: open the page, open the browser console, run
//   setStripmakerPassword('your-new-password')
// then paste the printed hash in below as AUTH_HASH and re-upload the file.
const AUTH_HASH = '9efcb7b58b6f42f76534ac72e1b1b12055f901c103e16a80063c5134241c9e99';

async function sha256hex(str) {
  const bytes = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}
// Console helper to generate a new hash.
window.setStripmakerPassword = async (pw) => {
  const hex = await sha256hex(pw);
  console.log('Set AUTH_HASH to:\n' + hex);
  return hex;
};

function revealApp() {
  const gate = document.getElementById('auth-gate');
  if (gate) gate.remove();
  init();
}

function startApp() {
  // Already unlocked this browser session?
  if (sessionStorage.getItem('sm_authed') === '1') { revealApp(); return; }
  const form = document.getElementById('auth-form');
  const input = document.getElementById('auth-input');
  const err = document.getElementById('auth-err');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    const hex = await sha256hex(input.value);
    if (hex === AUTH_HASH) {
      sessionStorage.setItem('sm_authed', '1');
      revealApp();
    } else {
      err.textContent = 'Incorrect password.';
      input.select();
    }
  });
  setTimeout(() => input && input.focus(), 50);
}

startApp();
</script>
