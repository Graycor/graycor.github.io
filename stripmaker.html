<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STRIPMAKER · Sequence Strip Builder · v0.21</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   STRIPMAKER · v0.5
   Single-file web app for building Australia Post sequence strips.
   ========================================================================= */

:root {
  --bg:           #0b0b0c;
  --surface:      #141416;
  --surface-2:    #1b1b1f;
  --surface-3:    #232328;
  --surface-4:    #2c2c32;
  --border:       #2a2a30;
  --border-strong:#3a3a42;
  --input-border: #6a6a75;   /* >=3:1 on --bg for form-control boundaries (WCAG 1.4.11) */
  --text:         #ececec;
  --text-muted:   #9396a0;
  --text-dim:     #8e8e98;    /* lifted to >=4.5:1 on dark for small text (WCAG 1.4.3) */
  --accent:       #e5302b;
  --accent-soft:  rgba(229,48,43,0.14);
  --accent-strong:#ff423c;
  --good:         #4ade80;
  --warn:         #f59e0b;
  --danger:       #ef4444;

  --paper:        #f3eee0;
  --paper-text:   #1d1a14;
  --paper-line:   #b8ad94;
  --paper-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.06);

  --ff-sans: 'Funnel Sans', system-ui, -apple-system, sans-serif;
  --ff-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

  --notch-w: 32px;
  --strip-h: 78px;
  --strip-num-h: 36px;
  --strip-unit-h: 18px;
  --strip-label-h: 24px;

  --radius: 6px;
  --radius-sm: 4px;
  --shadow: 0 4px 18px rgba(0,0,0,0.35);
}

/* Light theme - opt-in via data-theme="light" on <html>. Dark stays the default.
   The "paper" strip colours are intentionally unchanged (they represent the
   physical strip, not the app chrome). */
:root[data-theme="light"] {
  --bg:           #f4f4f6;
  --surface:      #ffffff;
  --surface-2:    #f1f1f4;
  --surface-3:    #e6e6ea;
  --surface-4:    #d9d9e0;
  --border:       #d7d7dd;
  --border-strong:#bcbcc6;
  --input-border: #8a8a94;   /* >=3:1 on light --bg */
  --text:         #1a1a1e;
  --text-muted:   #54565d;   /* >=4.5:1 on light */
  --text-dim:     #6b6b75;   /* >=4.5:1 on light */
  --accent-soft:  rgba(229,48,43,0.12);
  --paper-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.10);
  --shadow: 0 4px 18px rgba(0,0,0,0.16);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--ff-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overflow-x: hidden;
}

button {
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* -------------------------------------------------------------------------
   TOPBAR
   ------------------------------------------------------------------------- */
.topbar {
  display: flex;
  align-items: center;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  gap: 22px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--ff-mono);
  user-select: none;
}
.brand-mark {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: -0.05em;
}
.brand-name {
  font-weight: 600;
  letter-spacing: 0.08em;
  font-size: 13px;
}
.brand-version {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.topnav {
  display: flex;
  gap: 2px;
  margin-left: 12px;
}
.topnav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: background 0.12s, color 0.12s;
}
.topnav button:hover {
  color: var(--text);
  background: var(--surface-2);
}
.topnav button.active {
  color: var(--text);
  background: var(--surface-3);
}

.topactions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.tbtn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.tbtn:hover {
  background: var(--surface-3);
  border-color: var(--border-strong);
}
.tbtn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.tbtn.primary:hover {
  background: var(--accent-strong);
  border-color: var(--accent-strong);
}
.tbtn.danger {
  background: transparent;
  border-color: var(--border);
  color: var(--danger);
}
.tbtn.danger:hover {
  background: rgba(239,68,68,0.1);
  border-color: var(--danger);
}
.tbtn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.tbtn.ghost:hover {
  color: var(--text);
  background: var(--surface-2);
}
.tbtn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* -------------------------------------------------------------------------
   PAGE LAYOUT
   ------------------------------------------------------------------------- */
.page {
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px 18px 64px;
}

.page-header {
  margin-bottom: 18px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.page-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
.page-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  margin: 2px 0 0;
  font-family: var(--ff-mono);
}

.section-eyebrow {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin: 0 0 10px;
}

/* -------------------------------------------------------------------------
   BROWSE VIEW
   ------------------------------------------------------------------------- */
.browse-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
}
.browse-toolbar .spacer { flex: 1; }

.browse-empty {
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 56px 24px;
  text-align: center;
  color: var(--text-muted);
}
.browse-empty h2 {
  color: var(--text);
  font-size: 18px;
  margin: 0 0 6px;
}
.browse-empty p { margin: 0 0 18px; }

.wcc-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.wcc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.wcc-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.wcc-code {
  font-family: var(--ff-mono);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
}
.wcc-label {
  color: var(--text-muted);
  font-size: 13px;
}
.wcc-head .actions { margin-left: auto; display: flex; gap: 6px; }
.wcc-card.collapsed .wcc-head { border-bottom: 0; }
.wcc-caret {
  background: transparent; border: 0; color: var(--text-muted);
  width: 22px; height: 24px; font-size: 12px; cursor: pointer; border-radius: var(--radius-sm);
}
.wcc-caret:hover { background: var(--surface-3); color: var(--text); }
.wcc-counts { color: var(--text-dim); font-size: 12px; font-family: var(--ff-mono); }
.pin-star {
  background: transparent; border: 0; color: var(--warn); cursor: pointer;
  font-size: 15px; width: 24px; height: 24px; border-radius: var(--radius-sm); line-height: 1;
}
.pin-star:hover { background: var(--surface-3); }

/* search + pinned bar */
.browse-search { margin: 4px 0 14px; }
.browse-search .input { width: 100%; }
.pin-bar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  margin: 4px 0 12px; padding: 8px 10px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
}
.pin-bar.empty { color: var(--text-dim); font-size: 12px; }
.pin-hint { color: var(--text-dim); font-size: 12px; }
.pin-lead { font-size: 11px; font-family: var(--ff-mono); color: var(--warn); letter-spacing: 0.05em; text-transform: uppercase; }
.pin-chip { display: inline-flex; align-items: center; background: var(--surface-3); border: 1px solid var(--border-strong); border-radius: 999px; overflow: hidden; }
.pin-go { background: transparent; border: 0; color: var(--text); padding: 5px 4px 5px 12px; font-size: 12px; font-family: var(--ff-mono); cursor: pointer; }
.pin-go:hover { color: var(--accent-strong); }
.pin-x { background: transparent; border: 0; color: var(--text-dim); padding: 4px 9px; cursor: pointer; font-size: 13px; }
.pin-x:hover { color: var(--danger); }

/* team groups within a WCC */
.wcc-body { display: flex; flex-direction: column; }
.team-group { border-bottom: 1px solid var(--border); }
.team-group:last-child { border-bottom: 0; }
.team-head {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: var(--surface-3);
  font-size: 12px;
}
.team-name { font-family: var(--ff-mono); font-weight: 700; letter-spacing: 0.04em; }
.team-leader { color: var(--text-muted); }
.team-leader.missing { color: var(--warn); }
.team-link { color: var(--accent); text-decoration: none; }
.team-group .round-list { padding-left: 6px; }

.round-list {
  display: flex;
  flex-direction: column;
}
.round-block {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.round-block:last-child { border-bottom: 0; }
.round-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.round-num {
  font-family: var(--ff-mono);
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.round-label { color: var(--text-muted); font-size: 13px; }
.round-head .actions { margin-left: auto; display: flex; gap: 4px; }

.sides-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}

.side-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.side-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.side-letter {
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-family: var(--ff-mono);
  font-weight: 700;
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.side-label {
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--ff-mono);
}
.side-head .actions { margin-left: auto; display: flex; gap: 4px; }

.subside-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.subside-pill-wrap {
  position: relative;
  display: inline-flex;
}
.sub-remove {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border-strong);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  z-index: 2;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.subside-pill-wrap:hover .sub-remove { display: inline-flex; }
.sub-remove:hover {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}
.subside-add {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.subside-add:hover {
  background: var(--surface-3);
  color: var(--text);
  border-color: var(--border-strong);
}
.subside-pill {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 9px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--text);
  transition: background 0.12s, border-color 0.12s;
}
.subside-pill:hover {
  background: var(--surface-4);
  border-color: var(--border-strong);
}
.subside-pill .sub-id {
  font-weight: 600;
  color: var(--text);
}
.subside-pill.empty {
  color: var(--text-dim);
  border-style: dashed;
}
.subside-pill .sub-empty {
  color: var(--text-dim);
  font-style: italic;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sub-dots {
  display: inline-flex;
  gap: 2px;
  align-items: center;
}
.sub-dot {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  border: 0.5px solid rgba(0,0,0,0.25);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
}
.sub-dot-more {
  font-size: 9px;
  color: var(--text-dim);
  margin-left: 2px;
}

.wcc-contact {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--ff-mono);
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: 11px;
  margin-left: 6px;
  text-decoration: none;
  border: 1px solid transparent;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
a.wcc-contact:hover {
  background: var(--surface-4);
  color: var(--text);
  border-color: var(--border);
}
.wcc-contact .mail-icon { color: var(--accent); font-size: 11px; }

.round-pdo {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--ff-mono);
  letter-spacing: 0.02em;
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: 11px;
  margin-left: 4px;
}
.round-pdo .pdo-icon { color: var(--accent); font-size: 9px; }

/* -------------------------------------------------------------------------
   EDITOR VIEW
   ------------------------------------------------------------------------- */
.editor-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--ff-mono);
  font-size: 13px;
  color: var(--text-muted);
}
.crumbs .sep { color: var(--text-dim); }
.sub-nav { display: inline-flex; gap: 4px; }
.crumbs .current { color: var(--text); font-weight: 600; }
.editor-header .actions { margin-left: auto; display: flex; gap: 6px; }

.zoom-control {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}
.zoom-control button {
  background: transparent;
  border: 0;
  color: var(--text-muted);
  width: 24px; height: 24px;
  border-radius: 3px;
  font-size: 14px;
}
.zoom-control button:hover { background: var(--surface-3); color: var(--text); }
.zoom-control .level {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--text-muted);
  padding: 0 6px;
  min-width: 42px;
  text-align: center;
}

/* -------------------------------------------------------------------------
   STRIP PREVIEW
   ------------------------------------------------------------------------- */
.preview-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 22px;
  overflow: hidden;
}
.preview-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.preview-bar .stats { display: flex; gap: 16px; }
.preview-bar .stat strong { color: var(--text); font-weight: 600; }
.preview-bar .stat.overflow strong { color: var(--danger); }
.preview-bar .stat.near strong { color: var(--warn); }
.preview-bar .over-badge {
  color: var(--danger);
  font-weight: 700;
  margin-left: 2px;
}
.preview-bar .near-badge {
  color: var(--warn);
  font-weight: 600;
  margin-left: 2px;
}
.preview-bar .stat.incomplete { color: var(--warn); }
.preview-bar .stat.incomplete strong { color: var(--warn); font-weight: 700; }

/* v0.10: persistent over-cap banner in the editor */
.overcap-banner {
  display: flex; align-items: center; gap: 12px;
  background: rgba(239,68,68,0.10);
  border: 1px solid rgba(239,68,68,0.5);
  border-radius: var(--radius);
  padding: 10px 14px; margin: 0 0 12px;
  font-size: 13px; color: var(--text);
}
.overcap-banner .ocb-icon { color: var(--danger); font-size: 18px; line-height: 1; }
.overcap-banner strong { color: var(--danger); }

/* dashboard over-cap flags */
.subside-pill.overcap { border-color: var(--danger); box-shadow: inset 0 0 0 1px rgba(239,68,68,0.45); }
.sub-overcap-flag { color: var(--danger); font-size: 11px; margin-right: 2px; }
.round-overcap-flag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(239,68,68,0.12); color: var(--danger);
  border: 1px solid rgba(239,68,68,0.5); border-radius: 999px;
  font-family: var(--ff-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  padding: 2px 9px; cursor: pointer;
}
.round-overcap-flag:hover { background: rgba(239,68,68,0.2); }

/* ---- REVIEW page (v0.8) ---- */
.review-warning {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: rgba(245,158,11,0.10);
  border: 1px solid rgba(245,158,11,0.45);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 18px;
}
.review-warning .rw-icon { color: var(--warn); font-size: 22px; line-height: 1; }
.review-warning .rw-body { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.review-list { display: flex; flex-direction: column; gap: 14px; }
.review-round-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.review-round-card .rr-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  font-family: var(--ff-mono); font-size: 13px;
}
.review-round-card .rr-code { font-weight: 700; }
.review-round-card .rr-num { color: var(--accent); font-weight: 600; }
.review-round-card .rr-label { color: var(--text-muted); }
.issue-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.issue-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text);
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 999px; padding: 3px 10px 3px 4px;
}
.issue-chip .ic-tag {
  font-family: var(--ff-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
  padding: 2px 6px; border-radius: 999px; color: #0b0b0c;
}
.issue-chip.incomplete .ic-tag { background: var(--warn); }
.issue-chip.overcap .ic-tag   { background: var(--danger); color: #fff; }
.issue-chip.empty .ic-tag     { background: var(--text-dim); color: #fff; }
.issue-chip.untitled .ic-tag  { background: var(--accent); color: #fff; }
.review-side-actions { display: flex; flex-wrap: wrap; gap: 8px; }

/* colour-conflict rows on a review card */
.conflict-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.conflict-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px;
}
.conflict-swatches { display: inline-flex; gap: 3px; }
.conflict-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.25); }
.conflict-text strong { font-family: var(--ff-mono); }

/* colour-fix modal */
.color-choice-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
.color-choice {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 6px 12px 6px 8px; color: var(--text);
  transition: background 0.12s, border-color 0.12s;
}
.color-choice:hover { background: var(--surface-3); border-color: var(--accent); }
.color-choice .cc-swatch { width: 22px; height: 22px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); }
.color-choice .cc-hex { font-size: 12px; }
.color-custom-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }

/* hexagonal colour wheel */
.cw-wrap { display: flex; gap: 18px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
.cw-title { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.cw-stage { position: relative; width: 168px; height: 168px; }
.cw-canvas {
  width: 168px; height: 168px; cursor: crosshair;
  clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
  border-radius: 4px;
}
.cw-canvas:focus-visible { outline: 3px solid var(--accent-strong); outline-offset: 3px; }
.cw-marker {
  position: absolute; width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%); pointer-events: none;
}
.cw-controls { display: flex; flex-direction: column; gap: 8px; min-width: 150px; }
.cw-lab { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.cw-val { width: 100%; }
.cw-hexrow { display: flex; align-items: center; gap: 8px; }
.cw-swatch { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--border-strong); }
.cw-hex { width: 100px; }

/* destructive-action warning block (optimise / replace) */
.optimise-warn {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.4);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 6px 0 4px;
}
.optimise-warn strong { color: var(--danger); }
.optimise-warn p { margin: 8px 0 0; font-size: 13px; }

/* bulk-create section rows */
.bulk-sec-list {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;
  max-height: 40vh; overflow-y: auto; padding-right: 6px;  /* scroll long lists */
}
.bulk-sec-row { display: flex; gap: 8px; align-items: flex-start; }
.bulk-sec-row .bsr-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
/* keep the whole bulk modal within the viewport even with many rows */
.modal.bulk-modal { max-height: calc(100vh - 40px); overflow-y: auto; }
/* close-guard overlay shown when dismissing the bulk modal with unsaved input */
.bulk-guard {
  position: absolute; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
}
.bulk-guard-card {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 20px; max-width: 360px; margin: 16px;
}
.bulk-guard-card h3 { margin: 0 0 6px; }
.preview-bar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

.preview-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 22px 18px;
  background:
    radial-gradient(ellipse at top, rgba(255,255,255,0.018), transparent 60%),
    var(--surface);
}

.strip {
  display: inline-flex;
  align-items: stretch;
  min-height: var(--strip-h);
  background: var(--paper);
  border-radius: 2px;
  box-shadow: var(--paper-shadow);
  color: var(--paper-text);
  position: relative;
  overflow: hidden;
}
.strip.is-empty {
  min-width: 600px;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: repeating-linear-gradient(
    45deg,
    var(--paper) 0,
    var(--paper) 12px,
    rgba(0,0,0,0.04) 12px,
    rgba(0,0,0,0.04) 24px
  );
}

.strip-section {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: outline-color 0.12s;
  outline: 2px solid transparent;
  outline-offset: -2px;
}
.strip-section:hover { outline-color: rgba(0,0,0,0.18); }
.strip-section.selected {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  z-index: 2;
}

.strip-section .num-row {
  display: flex;
  flex: 1;
  min-height: var(--strip-num-h);
  align-items: stretch;
}

.notch {
  width: var(--notch-w);
  border-right: 1px solid var(--paper-line);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  position: relative;
  font-family: var(--ff-mono);
  flex-shrink: 0;
  overflow: hidden;
}
.notch:last-child { border-right: 0; }
.notch-numbers {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  line-height: 1;
  padding: 4px 2px 0;
  letter-spacing: -0.01em;
  /* Anchor numbers near the TOP so non-unit notches align with unit-bearing notches' parent number */
  height: 22px;
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}
.notch-numbers .num {
  text-align: center;
  white-space: nowrap;
}

/* Single-address notch: font scales with digit count.
   1-digit "8" is large; 4-digit "1234" still legible. */
/* v0.11: cap lone (un-paired) single addresses at the pair size (11px) so a big
   "9" or "36" no longer towers over its 12|10 / 8|6 neighbours - the whole
   street reads at one consistent scale. */
.notch-numbers.single.tier-s  { font-size: 11px; }
.notch-numbers.single.tier-m  { font-size: 11px; }
.notch-numbers.single.tier-l  { font-size: 11px; }
.notch-numbers.single.tier-xl { font-size: 9px;  }

/* Pair notch: two numbers side-by-side with a faint divider.
   Smaller font than singles since two numbers must fit. */
.notch-numbers.pair {
  justify-content: space-around;
  padding: 4px 2px 0;
  gap: 4px;
}
.notch-numbers.pair .num {
  position: relative;
}
/* faint vertical separator between paired numbers */
.notch-numbers.pair .num + .num::before {
  content: '';
  position: absolute;
  left: -3px;
  top: 5%;
  height: 90%;
  width: 1px;
  background: currentColor;
  opacity: 0.22;
}
/* v0.9: cap single-digit pairs (e.g. 8|6) at the two-digit pair size (12|10) so
   the number scale stays consistent along a street - they no longer render larger
   than their 2-digit neighbours. */
.notch-numbers.pair.tier-s  .num { font-size: 11px; }
.notch-numbers.pair.tier-m  .num { font-size: 11px; }

/* v0.6: paired numbers ALWAYS stay on one line (never stacked/layered).
   These tiers are conservative starting sizes; fitNotchNumbers() then shrinks
   the font further at runtime if a notch is still too narrow, guaranteeing
   both numbers fit side-by-side without overlap. Digits must never clip. */
.notch-numbers.pair {
  flex-wrap: nowrap;
  overflow: hidden;
}
.notch-numbers.pair.tier-l  .num { font-size: 9px; letter-spacing: -0.02em; }
.notch-numbers.pair.tier-xl .num { font-size: 7px; letter-spacing: -0.04em; }

/* Apartment parent number: matches pair-tier sizes so it visually harmonises
   with nearby paired numbers on the strip rather than appearing oversized. */
.notch-numbers.apt {
  font-weight: 700;
}
/* v0.16: cap the apartment house-number at the paired-number size too, so a
   1-digit apt number (e.g. "4" with one unit) matches its neighbours. */
.notch-numbers.apt.tier-s  { font-size: 11px; }
.notch-numbers.apt.tier-m  { font-size: 11px; }
.notch-numbers.apt.tier-l  { font-size: 9px;  }
.notch-numbers.apt.tier-xl { font-size: 8px;  }

.notch-units {
  display: flex;
  align-items: center;
  height: var(--strip-unit-h);
  border-top: 1px solid rgba(0,0,0,0.18);
  /* No row-level fill: each real unit paints its own light cell, so a blank
     "house number" cell shows the section colour through (matching the strip). */
  background: transparent;
  color: #000;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.01em;
  margin-top: auto;
}
.notch-units .unit {
  flex: 1;
  text-align: center;
  border-right: 1px solid rgba(0,0,0,0.18);
  padding: 1px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  position: relative;
  background: rgba(255,255,255,0.42);
}
.notch-units .unit:last-child { border-right: 0; }
/* Blank "house number" cell - plain, shows the section colour, no fill/hatch. */
.notch-units .unit.empty { background: transparent; }
/* per-unit flag indicators: thin top stripe on the unit cell */
.notch-units .unit.com { box-shadow: inset 0 2px 0 #1e88e5; }
.notch-units .unit.njm { box-shadow: inset 0 2px 0 #424242; }
.notch-units .unit.com.njm {
  box-shadow: inset 2px 2px 0 0 #1e88e5, inset -2px 2px 0 0 #424242;
}

/* Wide notch for an apartment block segment */
.notch-apt {
  /* width set inline */
  border-right: 1px solid var(--paper-line);
}

/* tiny corner flags on a notch (address-level summary) */
.notch-flags {
  position: absolute;
  top: 2px;
  left: 2px;
  display: flex;
  gap: 2px;
  z-index: 1;
}
.notch-flag {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  border: 0.5px solid rgba(0,0,0,0.35);
}
.notch-flag.com { background: #1e88e5; }
.notch-flag.njm { background: #424242; }

.strip-section .label-row {
  height: var(--strip-label-h);
  border-top: 1px solid rgba(0,0,0,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 0 6px;
  overflow: hidden;
  /* min-width:0 lets flex children shrink so the section stays at its natural notch-count width */
  min-width: 0;
}
.strip-section .label-row .label-text {
  /* Centers when it fits; clamps to 100% and shows left side first when overflowing. */
  min-width: 0;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-align: left;
}

.strip-end {
  width: 70px;
  background: var(--paper);
  border-left: 2px solid var(--paper-line);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--paper-text);
  padding: 4px;
  flex-shrink: 0;
}
.strip-end .rnd { font-weight: 600; letter-spacing: 0.04em; }
.strip-end .id  { font-size: 12px; font-weight: 700; margin-top: 2px; color: var(--accent); }

/* -------------------------------------------------------------------------
   INSPECTOR (section editor + addresses)
   ------------------------------------------------------------------------- */
.inspector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.inspector h3 {
  margin: 0 0 4px;
  font-size: 16px;
  font-weight: 600;
}
.inspector .subtitle {
  color: var(--text-muted);
  font-size: 12px;
  margin-bottom: 16px;
  font-family: var(--ff-mono);
  letter-spacing: 0.02em;
}

.inspector-empty {
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  color: var(--text-muted);
}
.inspector-empty p { margin: 0 0 14px; }

.form-row {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.field.grow { flex: 1; min-width: 200px; }
.field label {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.input, .select, .textarea {
  background: var(--surface-2);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 10px;
  font-size: 14px;
  transition: border-color 0.12s, background 0.12s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: 0;
  border-color: var(--accent);
  background: var(--surface-3);
}
.input.mono { font-family: var(--ff-mono); letter-spacing: 0.02em; }
.input.small { padding: 4px 8px; font-size: 13px; }

.toggle-group {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}
.toggle-group button {
  background: transparent;
  border: 0;
  padding: 5px 12px;
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
}
.toggle-group button.active {
  background: var(--surface-4);
  color: var(--text);
}
.toggle-group button:hover:not(.active) {
  color: var(--text);
}

/* Color palette */
.palette {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.swatch {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.1s, border-color 0.12s;
  position: relative;
}
.swatch:hover { transform: scale(1.08); }
.swatch.selected {
  border-color: var(--text);
  box-shadow: 0 0 0 1px var(--bg);
}
.swatch .check {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
}

.hex-input {
  width: 88px;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  font-size: 12px;
}

/* Address list */
.addr-table-wrap {
  margin-top: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.addr-table-wrap.scroll-x { overflow-x: auto; }
.team-table { min-width: 780px; }
.wcc-table { min-width: 820px; }
.col-binlead { width: 34px; }
.addr-table {
  width: 100%;
  border-collapse: collapse;
}
.addr-table th {
  background: var(--surface-2);
  text-align: left;
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.addr-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.addr-table tr:last-child td { border-bottom: 0; }
.addr-table tr:hover td { background: rgba(255,255,255,0.015); }
.addr-table .col-drag { width: 28px; text-align: center; }
.addr-table .col-num { width: 110px; }
.addr-table .col-units { }
.addr-table .col-flags { width: 270px; }
.addr-table .col-actions { width: 96px; text-align: right; white-space: nowrap; }

.drag-handle {
  display: inline-flex;
  width: 24px;
  height: 24px;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  cursor: grab;
  font-size: 14px;
  letter-spacing: -2px;
  user-select: none;
  border-radius: 4px;
}
.drag-handle:hover { color: var(--text); background: var(--surface-3); }
.drag-handle:active { cursor: grabbing; }
.addr-row.dragging { opacity: 0.4; }
.addr-row.drag-over-above { box-shadow: inset 0 2px 0 var(--accent); }
.addr-row.drag-over-below { box-shadow: inset 0 -2px 0 var(--accent); }

.flag-toggle-row {
  display: inline-flex;
  gap: 4px;
}
.flag-toggle {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 4px 9px;
  border-radius: 11px;
  transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
}
.flag-toggle:hover { color: var(--text); border-color: var(--border-strong); }
.flag-toggle.active {
  background: #424242;
  border-color: #5a5a5a;
  color: #f8f8f8;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 12px rgba(150,150,150,0.18);
}
.flag-toggle.com.active {
  background: #1e88e5;
  border-color: #1976d2;
  color: white;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 14px rgba(30,136,229,0.45);
}
/* partial = some units have the flag, others don't */
.flag-toggle.partial {
  background: linear-gradient(135deg, var(--surface-2) 50%, #424242 50%);
  border-color: #5a5a5a;
  color: #e0e0e0;
}
.flag-toggle.com.partial {
  background: linear-gradient(135deg, var(--surface-2) 50%, #1e88e5 50%);
  border-color: #1976d2;
  color: white;
}

/* unit chips redesigned to hold per-unit flag toggles */
.unit-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.unit-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 4px 2px 9px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
}
.unit-chip.njm { border-color: #5a5a5a; box-shadow: inset 0 0 0 1px #424242; }
.unit-chip.com { border-color: #1976d2; box-shadow: inset 0 0 0 1px #1e88e5; }
.unit-chip.com.njm { box-shadow: inset 0 0 0 1px #1e88e5, inset 0 0 0 2px rgba(66,66,66,0.4); }
.unit-chip .unit-label {
  font-weight: 600;
  color: var(--text);
}
.unit-flag-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 8px;
  min-height: 24px;       /* WCAG 2.5.8 target size */
  display: inline-flex;
  align-items: center;
  line-height: 1;
}
.unit-flag-btn:hover { color: var(--text); background: var(--surface-4); }
.unit-flag-btn.njm-btn.active {
  background: #424242;
  border-color: #5a5a5a;
  color: white;
}
.unit-flag-btn.com-btn.active {
  background: #1e88e5;
  border-color: #1976d2;
  color: white;
}
.unit-remove {
  background: transparent;
  border: 0;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.unit-remove:hover { color: var(--danger); background: var(--surface-4); }

.addr-table input.input { background: var(--bg); }
.addr-table input.input:focus { background: var(--surface-2); }

.unit-add {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.unit-add .input { width: 50px; font-size: 11px; padding: 3px 6px; }

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.icon-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border); }
.icon-btn.danger:hover { color: var(--danger); border-color: rgba(239,68,68,0.4); }

.addr-add-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
}
.addr-add-row .input { background: var(--bg); }
.addr-add-row .input { min-width: 0; }

.section-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.section-tab {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.section-tab .dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  border: 1px solid rgba(0,0,0,0.2);
}
.section-tab:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
.section-tab.active {
  background: var(--surface-4);
  color: var(--text);
  border-color: var(--accent);
}

/* -------------------------------------------------------------------------
   MODAL
   ------------------------------------------------------------------------- */
.modal-back {
  position: fixed;

  display: flex;
  align-items: center;
  justify-content: center;

}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 480px;

  animation: pop 0.16s ease-out;
}
.modal.wide { max-width: 720px; }
.modal.xwide { max-width: 960px; }
@keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* -------------------------------------------------------------------------
   TOAST
   ------------------------------------------------------------------------- */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  box-shadow: var(--shadow);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.good { border-color: var(--good); }
.toast.warn { border-color: var(--warn); }
.toast.danger { border-color: var(--danger); }
.toast::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  opacity: 0.6;
}
.toast.good::before { background: var(--good); opacity: 1; }
.toast.warn::before { background: var(--warn); opacity: 1; }
.toast.danger::before { background: var(--danger); opacity: 1; }

/* -------------------------------------------------------------------------
   PRINT
   ------------------------------------------------------------------------- */

/* Default @page; overridden dynamically at print time via injected style tag. */
@page {
  size: A4 portrait;
  margin: 15mm;
}

@media print {
  html, body { background: white; }
  /* Default: hide both print roots */
  body > *:not(.print-root):not(.report-root) { display: none !important; }
  .print-root, .report-root { display: none !important; }

  /* When printing a strip */
  body[data-printing="strip"] .print-root { display: block !important; }
  body[data-printing="strip"] .print-root .strip {
    box-shadow: none;
    border-radius: 0;
  }

  /* When printing a report */
  body[data-printing="report"] .report-root { display: block !important; }
}

.print-root, .report-root {
  display: none;
}

/* Print-only sizing (confirmed against physical strip 2026-05-28):
     each notch 14.5mm wide, strip 21mm tall, full strip holder 920mm wide,
     2-notch (29mm) round-end marker (may overhang the holder),
     MAX_NOTCHES = 60 sequence cells (user-imposed cap). */
.print-root .strip {
  --notch-w: 14.5mm;
  --strip-h: 21mm;
  --strip-num-h: 13.5mm;
  --strip-unit-h: 4.5mm;
  --strip-label-h: 7.5mm;
}
.print-root .strip .notch-numbers { height: 9mm; padding: 1mm 0.5mm 0; }
/* v0.11: lone single addresses capped at the pair size (4.8mm) - see screen note. */
.print-root .strip .notch-numbers.single.tier-s  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.single.tier-m  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.single.tier-l  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.single.tier-xl { font-size: 4mm;   }
/* v0.9: cap single-digit pairs at the two-digit pair size (see screen note). */
.print-root .strip .notch-numbers.pair.tier-s  .num { font-size: 4.8mm; }
.print-root .strip .notch-numbers.pair.tier-m  .num { font-size: 4.8mm; }
/* v0.6: one-line pairs - sized so two numbers + separator fit inside 14.5mm. */
.print-root .strip .notch-numbers.pair.tier-l  .num { font-size: 3.2mm; letter-spacing: -0.05mm; }
.print-root .strip .notch-numbers.pair.tier-xl .num { font-size: 2.5mm; letter-spacing: -0.1mm; }
.print-root .strip .notch-numbers.pair .num + .num::before { left: -1.5mm; width: 0.2mm; }
.print-root .strip .notch-numbers.apt.tier-s  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.apt.tier-m  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.apt.tier-l  { font-size: 4mm;   }
.print-root .strip .notch-numbers.apt.tier-xl { font-size: 3.4mm; }
.print-root .strip .notch-units { font-size: 3mm; }
.print-root .strip .label-row { font-size: 4mm; }
.print-root .strip-end { width: 29mm; font-size: 3mm; }
.print-root .strip-end .id { font-size: 4.4mm; }

/* v0.6: tiled (cut-section) printing for A4/A3. The strip is broken into
   page-width rows that stack tightly down each sheet, separated only by a thin
   black cut line (no gaps - saves paper and eases cutting). Each piece carries
   a 10mm blank tail at its end for overlap during physical installation. */
.print-root .strip-sheet { break-after: page; page-break-after: always; }
.print-root .strip-sheet:last-child { break-after: auto; page-break-after: auto; }
.print-root .tile-row {
  display: block;
  position: relative;
  margin: 0;
  padding: 0;
}
/* v0.8: the cut line is drawn as an overlaid bar (not a border) so it always
   sits ON TOP of the adjacent strip colours, and is thicker (0.8mm) for an
   unmistakable, easy-to-follow cut guide. */
.print-root .tile-row::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -0.4mm;
  height: 0.8mm;
  background: #000;
  z-index: 5;
  pointer-events: none;
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}
.print-root .tile-row:last-child::after { display: none; }
.print-root .tile-row .strip { box-shadow: none; border-radius: 0; }
/* fixed 10mm blank tail at the trailing end of every printed strip piece */
.print-root .tile-end-pad { flex: 0 0 10mm; width: 10mm; align-self: stretch; }
/* v0.7: bulk print packs several whole strips per page. Each strip is one block
   that should not be split across a page boundary, with a thin caption above. */
.print-root .tile-strip-block { break-inside: avoid; page-break-inside: avoid; margin-bottom: 4mm; }
.print-root .tile-strip-cap {
  font-family: var(--ff-mono);
  font-size: 3mm;
  font-weight: 700;
  color: #000;
  padding: 0 0 1mm 0;
  letter-spacing: 0.04em;
}

  {

// Convert hex to HSL for color-distance calculations
function hexToHsl(hex) {
  if (!hex || hex[0] !== '#') return [0, 0, 0];
  const c = hex.replace('#', '');
  const fc = c.length === 3 ? c.split('').map(x => x + x).join('') : c.padEnd(6, '0').slice(0, 6);
  const r = parseInt(fc.slice(0,2), 16) / 255;
  const g = parseInt(fc.slice(2,4), 16) / 255;
  const b = parseInt(fc.slice(4,6), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const l = (max + min) / 2;
  let h, s;
  if (max === min) { h = 0; s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: h = ((b - r) / d + 2); break;
      case b: h = ((r - g) / d + 4); break;
    }
    h *= 60;
  }
  return [h, s, l];
}

function colorDistance(a, b) {
  const [h1, s1, l1] = hexToHsl(a);
  const [h2, s2, l2] = hexToHsl(b);
  // Hue is circular
  let dh = Math.abs(h1 - h2);
  if (dh > 180) dh = 360 - dh;
  return dh * 1.0 + Math.abs(s1 - s2) * 60 + Math.abs(l1 - l2) * 40;
}

// Pick a color for a new section: prefer something unused on the strip
// and visually distant from the previous section (so adjacent sections differ).
function pickColorForNewSection(strip) {
  // v0.12: draw new-section colours from the colour-blind-friendly palette and
  // pick the one most distinct (CB-aware) from the previous section.
  const pal = (typeof CB_PALETTE !== 'undefined') ? CB_PALETTE : DEFAULT_PALETTE.map(p => p.bg);
  const used = new Set(strip.sections.map(s => String(s.color).toLowerCase()));
  const prev = strip.sections.length ? strip.sections[strip.sections.length - 1].color : null;
  const unused = pal.filter(c => !used.has(c.toLowerCase()));
  const pool = unused.length ? unused : pal;
  if (!prev) return pool[0];
  let best = pool[0], bestD = -1;
  for (const c of pool) {
    const d = (typeof cbDistance === 'function') ? cbDistance(c, prev) : colorDistance(c, prev);
    if (d > bestD) { bestD = d; best = c; }
  }
  return best;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && typeof s === 'object' && s.wccs) return migrate(s);
    }
  } catch (e) { console.warn('load failed', e); }
  return { version: VERSION, wccs: {}, wccRegistry: {}, pins: [], settings: { defaultSides: 2, defaultSubs: 6, theme: 'dark' } };
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(State));
  } catch (e) {
    toast('Could not save - storage may be full', 'danger');
  }
}

// Migrate older state objects so newer fields exist with sensible defaults.
function migrate(s) {
  s.version = VERSION;
  // v0.11: app settings (defaults for new rounds).
  if (!s.settings || typeof s.settings !== 'object') s.settings = {};
  if (s.settings.defaultSides == null) s.settings.defaultSides = 2;
  if (s.settings.defaultSubs == null)  s.settings.defaultSubs  = 6;
  // v0.6: standalone WCC registry (a local index of known WCCs, independent of
  // whether any rounds exist yet). Back-fill it from existing round data.
  if (!s.wccRegistry || typeof s.wccRegistry !== 'object') s.wccRegistry = {};
  for (const reg of Object.values(s.wccRegistry)) {
    if (reg.escalationEmail === undefined) reg.escalationEmail = '';
  }
  // v0.18: pinned favourites (top-bar quick access).
  if (!Array.isArray(s.pins)) s.pins = [];
  for (const wcc of Object.values(s.wccs || {})) {
    if (wcc.contactEmail === undefined) wcc.contactEmail = '';
    if (wcc.escalationEmail === undefined) wcc.escalationEmail = '';
    if (!s.wccRegistry[wcc.code]) {
      s.wccRegistry[wcc.code] = { code: wcc.code, label: wcc.label || '', contactEmail: wcc.contactEmail || '', escalationEmail: wcc.escalationEmail || '' };
    }
    if (s.wccRegistry[wcc.code].escalationEmail === undefined) s.wccRegistry[wcc.code].escalationEmail = '';
    // v0.18: Teams sit between WCC and Round. Auto-create "TEAM 1" and assign
    // every existing round to it.
    if (!wcc.teams || typeof wcc.teams !== 'object') wcc.teams = {};
    let hasTeam = Object.keys(wcc.teams).length > 0;
    if (!hasTeam && Object.keys(wcc.rounds || {}).length) {
      wcc.teams['team1'] = { id: 'team1', name: 'TEAM 1', leaderName: '', leaderEmail: '', leaderMobile: '' };
      hasTeam = true;
    }
    const firstTeamId = Object.keys(wcc.teams)[0] || null;
    for (const t of Object.values(wcc.teams)) {
      if (t.leaderName === undefined) t.leaderName = '';
      if (t.leaderEmail === undefined) t.leaderEmail = '';
      if (t.leaderMobile === undefined) t.leaderMobile = '';
    }
    for (const r of Object.values(wcc.rounds || {})) {
      if (r.pdoName === undefined) r.pdoName = '';
      if (r.pdoAps === undefined)  r.pdoAps  = '';
      if (r.auditDate === undefined) r.auditDate = '';   // v0.21: last sequence audit
      if (!r.teamId || !wcc.teams[r.teamId]) r.teamId = firstTeamId;
      for (const side of Object.values(r.sides || {})) {
        for (const sub of Object.values(side.subSides || {})) {
          for (const sec of sub.sections || []) {
            // v0.15: notch mode removed - every section is double (2 per notch).
            sec.notchMode = 'double';
            for (const a of sec.addresses || []) {
              if (a.noJunkMail === undefined)  a.noJunkMail  = false;
              if (a.isCommercial === undefined) a.isCommercial = false;
              // v0.3: per-unit flags
              for (const u of a.units || []) {
                if (u.noJunkMail === undefined)  u.noJunkMail  = false;
                if (u.isCommercial === undefined) u.isCommercial = false;
              }
            }
          }
        }
      }
    }
  }
  return s;
}

function uid(prefix='id') {

function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return Array.from(root.querySelectorAll(sel)); }

function h(tag, attrs={}, children=[]) {
  if (typeof attrs === 'string' || Array.isArray(attrs) || attrs instanceof Node) {
    children = attrs; attrs = {};
  }
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v === null || v === undefined || v === false) continue;
    if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'dataset' && typeof v === 'object') Object.assign(el.dataset, v);
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), v);
    } else {
      el.setAttribute(k, v === true ? '' : String(v));
    }
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') {
      el.appendChild(document.createTextNode(String(c)));
    } else if (c instanceof Node) {
      el.appendChild(c);
    }
  }
  return el;
}

// Accessibility: programmatically associate each <label> with its form control
// (WCAG 1.3.1 / 3.3.2 / 4.1.2). Labels in this app sit just before their input
// inside a `.field`; for button groups (no single control) we instead label the
// group with role="group" + aria-label. Safe to run on a detached subtree.
let _a11ySeq = 0;
function associateLabels(scope) {
  if (!scope || !scope.querySelectorAll) return;
  scope.querySelectorAll('label:not([for])').forEach(lab => {
    // Find the first form control among the label's following siblings.
    let ctrl = null, sib = lab.nextElementSibling;
    while (sib && !ctrl) {
      if (sib.matches && sib.matches('input, select, textarea')) ctrl = sib;
      else if (sib.querySelector) ctrl = sib.querySelector('input, select, textarea');
      sib = sib.nextElementSibling;
    }
    if (ctrl && ctrl.type !== 'hidden') {
      if (!ctrl.id) ctrl.id = 'a11y_f' + (++_a11ySeq);
      lab.setAttribute('for', ctrl.id);
      return;
    }
    // No single control - if the next sibling is a button group, label the group.
    const grp = lab.nextElementSibling;
    if (grp && grp.classList && grp.classList.contains('toggle-group')) {
      grp.setAttribute('role', 'group');
      grp.setAttribute('aria-label', lab.textContent.trim());
    }
  });
}

// Pick black or white text based on background luminance
function autoTextColor(hex) {
  if (!hex || hex[0] !== '#') return '#000';
  const c = hex.replace('#', '');
  const fc = c.length === 3
    ? c.split('').map(x => x + x).join('')
    : c.padEnd(6, '0').slice(0, 6);
  const r = parseInt(fc.slice(0,2), 16) / 255;
  const g = parseInt(fc.slice(2,4), 16) / 255;
  const b = parseInt(fc.slice(4,6), 16) / 255;
  const lin = (v) => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  const L = 0.2126*lin(r) + 0.7152*lin(g) + 0.0722*lin(b);
  return L > 0.55 ? '#000' : '#fff';
}

function getTextColor(section) {
  if (section.textColor && section.textColor !== 'auto') return section.textColor;
  return autoTextColor(section.color);
}

function toast(msg, kind='') {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast show ' + kind;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast ' + kind; }, 2200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

const DEFAULT_SETTINGS = { defaultSides: 2, defaultSubs: 6, theme: 'dark' };
function appSettings() {
  if (!State.settings || typeof State.settings !== 'object') State.settings = {};
  for (const k in DEFAULT_SETTINGS) {
    const dv = DEFAULT_SETTINGS[k];
    if (State.settings[k] == null) State.settings[k] = dv;

// Apply / toggle the colour theme. Dark is the default; light is opt-in.
function applyTheme(theme) {
  const t = theme === 'light' ? 'light' : 'dark';
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const item = document.getElementById('mi-theme');
  if (item) {
    const ic = item.querySelector('.mi-ic'), tx = item.querySelector('.mi-tx');
    if (ic) ic.textContent = t === 'light' ? '🌙' : '☀️';
    if (tx) tx.textContent = t === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
  }
}
function toggleTheme() {
  const S = appSettings();
  S.theme = (S.theme === 'light') ? 'dark' : 'light';
  saveState();
  applyTheme(S.theme);
}

// ---- WCC registry (local index of known WCCs) ----
function wccRegistry() {
  if (!State.wccRegistry) State.wccRegistry = {};
  return State.wccRegistry;
}
function registerWcc(code, label = '', contactEmail = '', escalationEmail = '') {
  const reg = wccRegistry();
  if (!reg[code]) reg[code] = { code, label, contactEmail, escalationEmail };
  else {
    if (label) reg[code].label = label;
    if (contactEmail) reg[code].contactEmail = contactEmail;
    if (escalationEmail) reg[code].escalationEmail = escalationEmail;
    if (reg[code].escalationEmail === undefined) reg[code].escalationEmail = '';
  }
  return reg[code];
}
function lookupWccByText(text) {
  const q = String(text || '').trim().toUpperCase();
  if (!q) return null;
  const reg = wccRegistry();
  if (reg[q]) return reg[q];                              // exact code
  const byLabel = Object.values(reg).find(w => (w.label || '').toUpperCase() === q);
  return byLabel || null;
}

function ensureWcc(code) {
  if (!State.wccs[code]) {
    // Pull label/email from the registry if this WCC is already known.
    const reg = wccRegistry()[code];
    State.wccs[code] = {
      code,
      label: reg ? (reg.label || '') : '',
      contactEmail: reg ? (reg.contactEmail || '') : '',
      escalationEmail: reg ? (reg.escalationEmail || '') : '',
      teams: {},
      rounds: {},
    };
  }
  if (!State.wccs[code].teams) State.wccs[code].teams = {};
  // Keep the registry in sync.
  registerWcc(code, State.wccs[code].label, State.wccs[code].contactEmail, State.wccs[code].escalationEmail);
  return State.wccs[code];
}

// ---- Teams (sit between WCC and Round) ----
// Ensure a WCC has at least one team; return its default (first) team id.
function ensureDefaultTeam(wccCode) {
  const w = ensureWcc(wccCode);
  if (!Object.keys(w.teams).length) {
    w.teams['team1'] = { id: 'team1', name: 'TEAM 1', leaderName: '', leaderEmail: '', leaderMobile: '' };
  }

}
function addTeam(wccCode, name = '') {

  w.teams[id] = { id, name: String(name || '').trim().toUpperCase() || ('TEAM ' + (Object.keys(w.teams).length + 1)), leaderName: '', leaderEmail: '', leaderMobile: '' };
  saveState();

}
function teamsOf(wcc) {
  return Object.values(wcc.teams || {});
}
function teamLabel(wcc, teamId) {
  const t = wcc.teams && wcc.teams[teamId];
  return t ? (t.name || 'TEAM') : 'No team';
}

// ---- Pinned favourites (top-bar quick access) ----
function pins() { if (!Array.isArray(State.pins)) State.pins = []; return State.pins; }
function pinKey(p) { return p.round != null ? `${p.wcc}|${p.round}` : `${p.wcc}`; }
function isPinned(wcc, round) { return pins().some(p => pinKey(p) === pinKey({ wcc, round })); }
function togglePin(wcc, round) {
  const k = pinKey({ wcc, round });
  const arr = pins();
  const i = arr.findIndex(p => pinKey(p) === k);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(round != null ? { wcc, round } : { wcc });
  saveState();
}
function ensureRound(wccCode, roundNum) {
  const w = ensureWcc(wccCode);
  if (!w.rounds[roundNum]) {
    w.rounds[roundNum] = { number: roundNum, label: '', pdoName: '', pdoAps: '', auditDate: '', teamId: ensureDefaultTeam(wccCode), sides: {} };
  }
  if (!w.rounds[roundNum].teamId || !w.teams[w.rounds[roundNum].teamId]) {
    w.rounds[roundNum].teamId = ensureDefaultTeam(wccCode);
  }

}
function ensureSide(wccCode, roundNum, letter) {
  const r = ensureRound(wccCode, roundNum);
  if (!r.sides[letter]) {
    r.sides[letter] = { letter, label: '', subSides: {} };
  }
  return r.sides[letter];
}
function ensureSubSide(wccCode, roundNum, letter, subNum) {
  const s = ensureSide(wccCode, roundNum, letter);
  const k = String(subNum);
  if (!s.subSides[k]) {
    s.subSides[k] = { number: subNum, sections: [] };
  }
  return s.subSides[k];
}

function getStrip(wcc, rnd, side, sub) {
  return State.wccs?.[wcc]?.rounds?.[rnd]?.sides?.[side]?.subSides?.[String(sub)];
}

function addSection(strip, opts={}) {
  const s = {
    id: uid('sec'),
    label: opts.label || '',
    color: opts.color || pickColorForNewSection(strip),
    textColor: opts.textColor || 'auto',
    notchMode: opts.notchMode || 'double',
    addresses: opts.addresses || [],
  };
  strip.sections.push(s);
  saveState();
  return s;
}

function addAddress(section, number, units=[]) {
  const a = {
    id: uid('a'),
    number: String(number || '').trim().toUpperCase(),
    units: units.map(u => ({ id: uid('u'), label: String(u).trim().toUpperCase(), noJunkMail: false, isCommercial: false })),
    noJunkMail: false,
    isCommercial: false,

  section.addresses.push(a);
  saveState();
  return a;
