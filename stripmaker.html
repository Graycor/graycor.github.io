function renderSideCard(wcc, round, side) {
  const subKeys = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a,b) => a-b);
  // Always show 1,2,3 as placeholder options even if not yet created
  const allSubs = [1,2,3,...subKeys].filter((v,i,a) => a.indexOf(v) === i).sort((a,b) => a-b);
  const maxSub = allSubs.length ? Math.max(...allSubs) : 0;
  const canAddNext = maxSub < 9;
  const nextSubN = Math.max(maxSub + 1, 4); // After the implicit 1-3, the "+" adds 4 onwards

  return h('div', { class: 'side-card' }, [
    h('div', { class: 'side-head' }, [
      h('span', { class: 'side-letter' }, side.letter),
      h('span', { class: 'side-label' }, side.label || ''),
      h('div', { class: 'actions' }, [
        h('button', { class: 'icon-btn', title: 'Edit side', onClick: () => openEditSideModal(wcc.code, round.number, side.letter) }, '✎'),
        h('button', { class: 'icon-btn danger', title: 'Delete side', onClick: () => confirmDelete('Side ' + side.letter, () => { delete round.sides[side.letter]; saveState(); renderBrowse(); }) }, '×'),
      ]),
    ]),
    h('div', { class: 'subside-row' }, [
      ...allSubs.map(n => {
        const sub = side.subSides[String(n)];
        const sections = sub ? sub.sections : [];
        const overCap = sub ? stripNotchCount(sub) > MAX_NOTCHES : false;
        const dots = sections.slice(0, 6).map(s => h('span', { class: 'sub-dot', style: { background: s.color } }));
        if (sections.length > 6) dots.push(h('span', { class: 'sub-dot-more' }, '+' + (sections.length - 6)));
        const pill = h('button', {
          class: 'subside-pill ' + (sub && sections.length ? '' : 'empty') + (overCap ? ' overcap' : ''),
          title: overCap ? `Over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(sub)}). Open Review to auto-optimise.` : undefined,
          onClick: () => openEditor(wcc.code, round.number, side.letter, n),
        }, [
          overCap ? h('span', { class: 'sub-overcap-flag', title: `Over cap (${stripNotchCount(sub)}/${MAX_NOTCHES})` }, '⚠') : null,
          h('span', { class: 'sub-id' }, side.letter + n),
          sections.length
            ? h('span', { class: 'sub-dots' }, dots)
            : h('span', { class: 'sub-empty' }, 'empty'),
        ]);
        // Only real (data-backed) subs get a remove button.
        // Phantom 1/2/3 pills don't - there's nothing to delete yet.
        if (!sub) return pill;
        const removeBtn = h('button', {
          class: 'sub-remove',
          title: `Remove ${side.letter}${n}`,
          onClick: (e) => {
            e.stopPropagation();
            const doDelete = () => {
              delete side.subSides[String(n)];
              saveState();
              renderBrowse();
            };
            if (sections.length > 0) {
              confirmDelete(`sub ${side.letter}${n} (${sections.length} section${sections.length===1?'':'s'} of data)`, doDelete);
            } else {
              doDelete();
            }
          },
        }, '×');
        return h('div', { class: 'subside-pill-wrap' }, [pill, removeBtn]);
      }),
      canAddNext ? h('button', {
        class: 'subside-add',
        title: `Add ${side.letter}${nextSubN}`,
        onClick: () => {
          ensureSubSide(wcc.code, round.number, side.letter, nextSubN);
          saveState();
          renderBrowse();
        },
      }, '+ SUB') : null,
    ]),
  ]);
}

// ============== RENDER: EDITOR ==============
function renderEditor() {
  const root = $('#app-root');
  root.innerHTML = '';
  const { wccCode, roundNum, sideLetter, subNum } = UI.editor;
  const strip = ensureSubSide(wccCode, roundNum, sideLetter, subNum);

  const totalAddresses = strip.sections.reduce((acc, s) => acc + s.addresses.length, 0);
  const totalNotches = strip.sections.reduce((acc, s) => acc + sectionNotchCount(s), 0);

  // Completion check: every sub EXCEPT the last of its side should be filled to
  // the 60-notch cap (the last sub naturally holds whatever's left over). Warn
  // in the header when an earlier sub is short of the cap so strips don't ship
  // half-empty by accident.
  const _navSide = ensureSide(wccCode, roundNum, sideLetter);
  const _allSubNums = Object.keys(_navSide.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
  const isLastSub = _allSubNums.length > 0 && _allSubNums[_allSubNums.length - 1] === Number(subNum);
  const isIncomplete = !isLastSub && totalNotches > 0 && totalNotches < MAX_NOTCHES;

  // Build the live preview
  const previewStrip = renderStripDOM(strip, { interactive: true });

  // Inspector
  const selectedSection = strip.sections.find(s => s.id === UI.editor.selectedSectionId);

  const sectionTabs = buildSectionTabs(strip);

  const inspector = selectedSection
    ? renderInspector(strip, selectedSection)
    : h('div', { class: 'inspector-empty' }, [
        h('p', {}, strip.sections.length ? 'SELECT A SECTION ABOVE TO EDIT IT.' : 'NO SECTIONS YET. ADD YOUR FIRST ONE TO START BUILDING THE STRIP.'),
        h('button', { class: 'tbtn primary', onClick: () => {
          const newSec = addSection(strip, { label: '' });
          UI.editor.selectedSectionId = newSec.id;
          renderEditorPreserveScroll();
        }}, '+ ADD FIRST SECTION'),
      ]);

  const stripIdLabel = sideLetter + subNum;
  const page = h('div', { class: 'page' }, [
    h('div', { class: 'editor-header' }, [
      h('button', { class: 'tbtn ghost', onClick: backToBrowse }, '← Back'),
      (() => {
        // Prev/next navigation across the sub-sides of the current side.
        const side = ensureSide(wccCode, roundNum, sideLetter);
        const subs = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
        const pos = subs.indexOf(Number(subNum));
        const prevN = pos > 0 ? subs[pos - 1] : null;
        const nextN = (pos >= 0 && pos < subs.length - 1) ? subs[pos + 1] : null;
        return h('div', { class: 'sub-nav' }, [
          h('button', {
            class: 'tbtn ghost', disabled: prevN === null,
            title: prevN !== null ? `Go to ${sideLetter}${prevN}` : 'No earlier sub-side',
            onClick: () => { if (prevN !== null) openEditor(wccCode, roundNum, sideLetter, prevN); },
          }, '‹ Prev'),
          h('button', {
            class: 'tbtn ghost', disabled: nextN === null,
            title: nextN !== null ? `Go to ${sideLetter}${nextN}` : 'No later sub-side',
            onClick: () => { if (nextN !== null) openEditor(wccCode, roundNum, sideLetter, nextN); },
          }, 'Next ›'),
        ]);
      })(),
      h('div', { class: 'crumbs' }, [
        h('span', {}, 'WCC ' + wccCode), h('span', { class: 'sep' }, '/'),
        h('span', {}, 'RND ' + roundNum), h('span', { class: 'sep' }, '/'),
        h('span', {}, 'Side ' + sideLetter), h('span', { class: 'sep' }, '/'),
        h('span', { class: 'current' }, 'Sub ' + subNum),
      ]),
      h('div', { class: 'actions' }, [
        h('button', { class: 'tbtn ghost', onClick: () => openCopyStripModal(strip, wccCode, roundNum, sideLetter, subNum) }, 'Copy section to…'),
        h('button', { class: 'tbtn', onClick: () => openPrintModal(strip, stripIdLabel, roundNum) }, '⎙ Print'),
      ]),
    ]),

    // v0.10: the 60-notch cap is advisory. When a strip runs over, show a
    // persistent banner here (it stays until the overflow is reconciled).
    totalNotches > MAX_NOTCHES ? h('div', { class: 'overcap-banner' }, [
      h('span', { class: 'ocb-icon' }, '⚠'),
      h('span', {}, [
        h('strong', {}, `Over the ${MAX_NOTCHES}-notch cap - ${totalNotches} notches (${totalNotches - MAX_NOTCHES} over).`),
        ' This strip won\'t fit one physical holder. Use Auto-optimise to split this side into properly filled subs.',
      ]),
      h('button', { class: 'tbtn', style: { marginLeft: 'auto' }, onClick: () => goReview() }, 'Open Review →'),
    ]) : null,

    h('div', { class: 'preview-wrap' }, [
      h('div', { class: 'preview-bar' }, [
        h('div', { class: 'stats' }, [
          h('span', { class: 'stat' }, [h('strong', {}, strip.sections.length), ' SECTIONS']),
          h('span', { class: 'stat' }, [h('strong', {}, totalAddresses), ' ADDRESSES']),
          h('span', { class: 'stat ' + (totalNotches > MAX_NOTCHES ? 'overflow' : (totalNotches >= NEAR_LIMIT ? 'near' : '')) }, [
            h('strong', {}, totalNotches),
            ' NOTCHES',
            totalNotches > MAX_NOTCHES ? h('span', { class: 'over-badge', title: 'Over the 60-notch strip limit' }, ` · ${totalNotches - MAX_NOTCHES} OVER`) : null,
            (totalNotches <= MAX_NOTCHES && totalNotches >= NEAR_LIMIT) ? h('span', { class: 'near-badge', title: 'Near the 60-notch strip limit' }, ` · ${MAX_NOTCHES - totalNotches} LEFT`) : null,
          ]),
          h('span', { class: 'stat' }, [h('strong', {}, `RND_${roundNum} ${stripIdLabel}`), '']),
          isIncomplete ? h('span', { class: 'stat incomplete', title: `Sub ${stripIdLabel} is below the 60-notch cap. Only the last sub of a side is meant to be partial - top this one up or move addresses in.` }, [
            h('strong', {}, '⚠ INCOMPLETE'),
            ` · ${MAX_NOTCHES - totalNotches} TO FILL`,
          ]) : null,
        ]),
        h('div', { class: 'right' }, [
          h('span', { class: 'mono', style: { fontSize: '10px' } }, 'ZOOM'),
          h('div', { class: 'zoom-control' }, [
            h('button', { onClick: () => { UI.editor.zoom = Math.max(0.5, +(UI.editor.zoom - 0.1).toFixed(2)); renderEditorPreserveScroll(); }}, '−'),
            h('span', { class: 'level' }, Math.round(UI.editor.zoom * 100) + '%'),
            h('button', { onClick: () => { UI.editor.zoom = Math.min(2.0, +(UI.editor.zoom + 0.1).toFixed(2)); renderEditorPreserveScroll(); }}, '+'),
          ]),
        ]),
      ]),
      h('div', { class: 'preview-scroll' }, previewStrip),
    ]),

    sectionTabs,
    inspector,
  ]);
  root.appendChild(page);
  fitNotchNumbers($('.preview-scroll'));
}

function renderStripDOM(strip, opts={}) {
  const { interactive=false, zoom=null } = opts;
  const z = zoom !== null ? zoom : UI.editor.zoom;

  const stripEl = h('div', {
    class: 'strip' + (strip.sections.length === 0 ? ' is-empty' : ''),
    style: interactive ? { transform: `scale(${z})`, transformOrigin: '0 0' } : {},
  });

  if (!strip.sections.length) {
    stripEl.appendChild(document.createTextNode('Empty strip - add a section to begin'));
    return stripEl;
  }

  for (const sec of strip.sections) {
    stripEl.appendChild(renderSectionDOM(sec, interactive));
  }

  // End marker
  const idLabel = UI.editor.sideLetter && UI.editor.subNum
    ? UI.editor.sideLetter + UI.editor.subNum
    : '-';
  const roundLbl = UI.editor.roundNum ? `RND_${UI.editor.roundNum}` : 'RND_____';
  stripEl.appendChild(h('div', { class: 'strip-end' }, [
    h('div', { class: 'rnd' }, roundLbl),
    h('div', { class: 'id' }, idLabel),
  ]));
  return stripEl;
}

function renderSectionDOM(section, interactive) {
  const cells = layoutSection(section);
  const txt = getTextColor(section);
  const isSelected = interactive && section.id === UI.editor.selectedSectionId;
  const notchCount = cells.reduce((s, c) => s + (c.width || 1), 0);

  const numRow = h('div', { class: 'num-row' });
  for (const cell of cells) {
    numRow.appendChild(renderCellDOM(cell, txt));
  }

  // The label centres when it fits and left-aligns when it overflows.
  // Trick: flex parent with justify-content:center, child with max-width:100% +
  // text-align:left + overflow:hidden. When the text fits the child shrinks
  // to its content (centred); when it doesn't, the child clamps to 100% and
  // the visible portion starts from the left.
  const labelRow = h('div', { class: 'label-row' }, [
    h('span', { class: 'label-text' }, section.label || '\u00A0'),
  ]);

  const section_el = h('div', {
    class: 'strip-section' + (isSelected ? ' selected' : ''),
    style: {
      background: section.color,
      color: txt,
      width: `calc(var(--notch-w) * ${notchCount})`,
      flex: `0 0 calc(var(--notch-w) * ${notchCount})`,
    },
    'data-section-id': section.id,
    onClick: interactive ? (e) => {
      e.stopPropagation();
      selectSection(section.id);
    } : null,
  }, [
    numRow,
    labelRow,
  ]);
  return section_el;
}

// Custom colour wheel for a single section's background (general sub editing).
function openSectionColorWheel(strip, section, inspectorWrap) {
  let hex = section.color || '#888888';
  const wheel = buildColorWheel(hex, (hx) => {
    hex = hx;
    section.color = hx;
    saveState();
    refreshPreview(strip);   // live update on the strip
  });
  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, 'Colour wheel'),
    h('p', { class: 'subtle' }, `Background colour for "${section.label || 'this section'}". Changes preview live.`),
    wheel,
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn primary', onClick: () => {
        closeModal();
        renderInspector_inplace(strip, section, inspectorWrap || $('.inspector'));
      } }, 'Done'),
    ]),
  ]));
}

// Select a section WITHOUT re-rendering the preview (preserves scroll position).
// Only updates the inspector, tabs, and the .selected class on existing nodes.
function selectSection(id) {
  UI.editor.selectedSectionId = id;
  // Update .selected class on preview sections
  $$('.preview-scroll .strip-section').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('data-section-id') === id);
  });
  // Re-render inspector
  const strip = getStrip(UI.editor.wccCode, UI.editor.roundNum, UI.editor.sideLetter, UI.editor.subNum);
  if (!strip) return;
  const section = strip.sections.find(s => s.id === id);
  const inspectorEl = $('.inspector') || $('.inspector-empty');
  const newInspector = section
    ? renderInspector(strip, section)
    : h('div', { class: 'inspector-empty' }, 'Section not found.');
  inspectorEl.replaceWith(newInspector);
  // Re-render section tabs (active state changed)
  refreshTabs(strip);
}

function refreshTabs(strip) {
  const tabsEl = $('.section-tabs');
  if (!tabsEl) return;
  const newTabs = buildSectionTabs(strip);
  tabsEl.replaceWith(newTabs);
}

function buildSectionTabs(strip) {
  return h('div', { class: 'section-tabs' },
    strip.sections.map((s, i) => h('button', {
      class: 'section-tab ' + (s.id === UI.editor.selectedSectionId ? 'active' : ''),
      onClick: () => selectSection(s.id),
    }, [
      h('span', { class: 'dot', style: { background: s.color } }),
      `${i+1}. ${s.label || '(UNTITLED)'}`,
    ])).concat(
      h('button', { class: 'section-tab', onClick: () => {
        const newSec = addSection(strip, { label: '' });
        UI.editor.selectedSectionId = newSec.id;
        renderEditorPreserveScroll();
      }}, '+ SECTION')
    )
  );
}

// Re-render the editor view but preserve horizontal preview scroll.
function renderEditorPreserveScroll() {
  const scroller = $('.preview-scroll');
  const sl = scroller ? scroller.scrollLeft : 0;
  renderEditor();
  const newScroller = $('.preview-scroll');
  if (newScroller) newScroller.scrollLeft = sl;
}

function renderCellDOM(cell, txt) {
  const tier = cell.tier || 'tier-m';
  if (cell.kind === 'pair') {
    const [a, b] = cell.addresses;
    return h('div', { class: 'notch' }, [
      h('div', { class: 'notch-numbers pair ' + tier }, [
        h('span', { class: 'num' }, a.number || '\u00A0'),
        h('span', { class: 'num' }, b.number || '\u00A0'),
      ]),
    ]);
  }
  if (cell.kind === 'single') {
    return h('div', { class: 'notch' }, [
      h('div', { class: 'notch-numbers single ' + tier }, [
        h('span', { class: 'num' }, cell.address.number || '\u00A0'),
      ]),
    ]);
  }
  if (cell.kind === 'apt') {
    // Wide notch: parent number centred across the full segment, with the unit
    // row divided into one cell per unit beneath it.
    const unitsEl = h('div', { class: 'notch-units' },
      cell.units.map(u => {
        if (isEmptyUnit(u)) {
          // Placeholder cell - blank, carries no flags, not a deliverable.
          return h('div', { class: 'unit empty', title: '' }, ' ');
        }
        return h('div', { class: 'unit', title: u.label }, u.label || '·');
      })
    );
    return h('div', {
      class: 'notch notch-apt',
      style: {
        width: `calc(var(--notch-w) * ${cell.width})`,
        flex: `0 0 calc(var(--notch-w) * ${cell.width})`,
      },
    }, [
      h('div', { class: 'notch-numbers apt ' + tier }, [
        h('span', { class: 'num' }, cell.address.number || '\u00A0'),
      ]),
      unitsEl,
    ]);
  }
  return h('div', { class: 'notch' });
}

// v0.6: guarantee every number group fits on one line within its notch.
// CSS tiers give a conservative starting size; this shrinks the font further
// (down to a 4px floor) whenever content still overflows, so paired numbers
// never layer or clip. Runs only on screen (print relies on the static CSS
// tiers, since hidden print DOM can't be measured).
function fitNotchNumbers(scope) {
  const groups = $$('.notch-numbers', scope || document);
  for (const g of groups) {
    const nums = $$('.num', g);
    if (!nums.length) continue;
    nums.forEach(n => { n.style.fontSize = ''; }); // re-measure from CSS tier
    let guard = 0;
    while (g.scrollWidth > g.clientWidth + 0.5 && guard < 48) {
      for (const n of nums) {
        const cur = parseFloat(getComputedStyle(n).fontSize) || 12;
        if (cur <= 4) { guard = 48; break; }
        n.style.fontSize = (cur - 0.5) + 'px';
      }
      guard++;
    }
  }
}

function flagDotsForAddresses(addresses) {
  // Surface address-level flags AND any descendant unit flags (so an apt
  // address with one commercial unit shows the com dot).
  let com = false, njm = false;
  for (const a of addresses) {
    if (!a) continue;
    if (a.isCommercial) com = true;
    if (a.noJunkMail)   njm = true;
    for (const u of a.units || []) {
      if (u.isCommercial) com = true;
      if (u.noJunkMail)   njm = true;
    }
  }
  const dots = [];
  if (com) dots.push(h('span', { class: 'notch-flag com', title: 'COMMERCIAL' }));
  if (njm) dots.push(h('span', { class: 'notch-flag njm', title: 'NO JUNK MAIL' }));
  if (!dots.length) return null;
  return h('div', { class: 'notch-flags' }, dots);
}

// ============== INSPECTOR (section detail editor) ==============
function renderInspector(strip, section) {
  const wrap = h('div', { class: 'inspector' });

  wrap.appendChild(h('h3', {}, section.label || '(UNTITLED SECTION)'));
  wrap.appendChild(h('div', { class: 'subtitle' }, `SECTION · ${section.addresses.length} ADDRESSES · ${sectionNotchCount(section)} NOTCHES`));

  // --- Section actions (placed up top: just under the street-name tabs and
  // above the section's own fields) ---
  wrap.appendChild(h('div', { class: 'form-row section-actions', style: { marginBottom: '14px', paddingBottom: '14px', borderBottom: '1px solid var(--border)' } }, [
    h('button', { class: 'tbtn ghost', onClick: () => { moveSection(strip, section.id, -1); renderEditorPreserveScroll(); }}, '← Shift left'),
    h('button', { class: 'tbtn ghost', onClick: () => { moveSection(strip, section.id, +1); renderEditorPreserveScroll(); }}, 'Shift right →'),
    h('button', { class: 'tbtn ghost', title: 'Add an empty copy of this section (same name & colour, no addresses) at the end of the strip', onClick: () => {
      const c = duplicateSection(strip, section.id);
      UI.editor.selectedSectionId = c.id;
      renderEditorPreserveScroll();
    }}, '⎘ Duplicate (empty) to end'),
    h('div', { style: { flex: 1 } }),
    h('button', { class: 'tbtn danger', onClick: () => {
      confirmDelete(`section "${section.label || 'untitled'}"`, () => {
        deleteSection(strip, section.id);
        UI.editor.selectedSectionId = null;
        renderEditorPreserveScroll();
      });
    }}, 'Delete section'),
  ]));

  // --- Label + color + mode ---
  const labelInput = h('input', {
    class: 'input',
    type: 'text',
    value: section.label,
    placeholder: 'e.g. CALLABONNA ST  /  VET HOSPITAL',
    onInput: (e) => { section.label = e.target.value.toUpperCase(); saveState(); refreshPreview(strip); refreshHeader(section); },
  });

  const hexInput = h('input', {
    class: 'input hex-input mono',
    type: 'text',
    value: section.color.toUpperCase(),
    maxlength: 7,
    onInput: (e) => {
      const v = e.target.value.trim();
      if (/^#?[0-9A-Fa-f]{6}$/.test(v)) {
        section.color = v[0] === '#' ? v : '#' + v;
        saveState();
        refreshPreview(strip);
        refreshPaletteSelection(wrap, section);
      }
    },
  });

  const paletteEl = h('div', { class: 'palette' },
    DEFAULT_PALETTE.map(p => h('div', {
      class: 'swatch' + (p.bg.toLowerCase() === section.color.toLowerCase() ? ' selected' : ''),
      style: { background: p.bg },
      title: p.name,
      onClick: () => {
        section.color = p.bg;
        saveState();
        refreshPreview(strip);
        renderInspector_inplace(strip, section, wrap);
      },
    }, [
      h('span', { class: 'check', style: { color: autoTextColor(p.bg) } },
        p.bg.toLowerCase() === section.color.toLowerCase() ? '✓' : '')
    ]))
    .concat([hexInput])
  );

  const textToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: section.textColor === 'auto' ? 'active' : '', onClick: () => { section.textColor = 'auto'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'Auto'),
    h('button', { class: section.textColor === '#000' ? 'active' : '', onClick: () => { section.textColor = '#000'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'Black'),
    h('button', { class: section.textColor === '#fff' ? 'active' : '', onClick: () => { section.textColor = '#fff'; saveState(); refreshPreview(strip); refreshHeader(section); }}, 'White'),
  ]);

  wrap.appendChild(h('div', { class: 'form-row' }, [
    h('div', { class: 'field grow' }, [
      h('label', {}, 'Label (street or business)'),
      labelInput,
    ]),
    h('div', { class: 'field' }, [
      h('label', {}, 'Text color'),
      textToggle,
    ]),
  ]));

  wrap.appendChild(h('div', { class: 'form-row' }, [
    h('div', { class: 'field grow' }, [
      h('label', {}, 'Background color'),
      paletteEl,
      h('button', { class: 'tbtn ghost', style: { marginTop: '6px' }, title: 'Pick a custom colour on the wheel',
        onClick: () => openSectionColorWheel(strip, section, wrap) }, '🎨 Colour wheel…'),
    ]),
  ]));

  // --- Address list ---
  wrap.appendChild(h('div', { class: 'section-eyebrow' }, 'Addresses (driving order)'));
  wrap.appendChild(renderAddressList(strip, section));

  associateLabels(wrap);
  return wrap;
}

function renderInspector_inplace(strip, section, oldEl) {
  const newEl = renderInspector(strip, section);
  oldEl.replaceWith(newEl);
}

function refreshPreview(strip) {
  const scroller = $('.preview-scroll');
  if (!scroller) return;
  scroller.innerHTML = '';
  scroller.appendChild(renderStripDOM(strip, { interactive: true }));
  fitNotchNumbers(scroller);
}

function refreshHeader(section) {
  // Re-render the inspector header bits & section tabs without nuking focus inputs
  const strip = getStrip(UI.editor.wccCode, UI.editor.roundNum, UI.editor.sideLetter, UI.editor.subNum);
  if (!strip) return;
  refreshTabs(strip);
  // Update header h3 + subtitle
  const insp = $('.inspector');
  if (insp) {
    const h3 = insp.querySelector('h3');
    if (h3) h3.textContent = section.label || '(UNTITLED SECTION)';
    const sub = insp.querySelector('.subtitle');
    if (sub) sub.textContent = `SECTION · ${section.addresses.length} ADDRESSES · ${sectionNotchCount(section)} NOTCHES`;
  }
}

function refreshPaletteSelection(wrap, section) {
  const swatches = wrap.querySelectorAll('.swatch');
  swatches.forEach(sw => {
    const isSel = sw.style.background.includes(section.color) || rgbToHex(sw.style.background).toLowerCase() === section.color.toLowerCase();
    sw.classList.toggle('selected', isSel);
  });
}
function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m) return '#000000';
  return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

// ============== ADDRESS EDITOR ==============
function renderAddressList(strip, section) {
  const wrap = h('div', { class: 'addr-table-wrap' });

  if (!section.addresses.length) {
    wrap.appendChild(h('div', { style: { padding: '14px', color: 'var(--text-muted)', fontSize: '13px' } }, 'NO ADDRESSES YET - ADD SOME BELOW.'));
  } else {
    const table = h('table', { class: 'addr-table' }, [
      h('thead', {}, h('tr', {}, [
        h('th', { class: 'col-drag' }, ''),
        h('th', { class: 'col-num' }, 'Number'),
        h('th', { class: 'col-flags' }, 'Flags'),
        h('th', { class: 'col-units' }, 'Apartments / Units'),
        h('th', { class: 'col-actions' }, ''),
      ])),
      h('tbody', { class: 'addr-tbody' }, section.addresses.map((a, idx) => renderAddressRow(strip, section, a, idx))),
    ]);
    wrap.appendChild(table);
  }

  // Add row
  let newNumInput;
  let bulkInput;
  const quickAdd = () => {
    const v = newNumInput.value.trim();
    if (!v) return;
    // v0.10: the 60-notch cap is no longer enforced on entry - overflow is
    // allowed and surfaced as a warning (here, in the editor banner, and on the
    // dashboard). Use Review → Auto-optimise to reconcile.
    addAddress(section, v, []);
    if (stripNotchCount(strip) > MAX_NOTCHES) {
      toast(`Over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(strip)}). Use Review → Auto-optimise to split this side.`, 'warn');
    }
    newNumInput.value = '';
    renderInspector_inplace(strip, section, $('.inspector'));
    refreshPreview(strip);
    refreshHeader(section);
    setTimeout(() => {
      const newInput = $('.addr-add-row .input[data-quick]');
      if (newInput) newInput.focus();
    }, 0);
  };
  newNumInput = h('input', {
    class: 'input mono',
    type: 'text',
    placeholder: 'HOUSE # (e.g. 40 OR 12A)',
    'data-quick': '1',
    style: { flex: '0 0 180px' },
    onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); quickAdd(); } },
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
    },
  });

  bulkInput = h('input', {
    class: 'input mono',
    type: 'text',
    placeholder: 'BULK: 40-32, 30, 28A  ·  1-9 (odd)  ·  12-18 (even)  ·  33-25 (descending)',
    style: { flex: 1 },
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
    },
    onKeydown: (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = bulkInput.value.trim();
        if (!v) return;
        const parts = parseBulkRanges(v);
        for (const p of parts) addAddress(section, p, []);
        bulkInput.value = '';
        renderInspector_inplace(strip, section, $('.inspector'));
        refreshPreview(strip);
        refreshHeader(section);
        const over = stripNotchCount(strip) > MAX_NOTCHES;
        if (over) {
          toast(`Added ${parts.length} - now over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(strip)}). Reconcile via Review → Auto-optimise.`, 'warn');
        } else {
          toast(`Added ${parts.length} address${parts.length===1?'':'es'}`, 'good');
        }
      }
    },
  });

  wrap.appendChild(h('div', { class: 'addr-add-row' }, [
    newNumInput,
    h('button', { class: 'tbtn primary', onClick: quickAdd }, '+ Add'),
    bulkInput,
    h('span', { class: 'kbd', style: { alignSelf: 'center' } }, '↵'),
  ]));

  return wrap;
}

function renderAddressRow(strip, section, addr, idx) {
  const hasUnits = addr.units && addr.units.length > 0;

  // number input - force uppercase, immediately reflects in the strip
  const numInput = h('input', {
    class: 'input mono small',
    type: 'text',
    value: addr.number,
    onInput: (e) => {
      const upper = e.target.value.toUpperCase();
      if (e.target.value !== upper) {
        const pos = e.target.selectionStart;
        e.target.value = upper;
        try { e.target.setSelectionRange(pos, pos); } catch(_) {}
      }
      addr.number = upper;
      saveState();
      refreshPreview(strip);
    },
  });

  // Address-level flag buttons. When the address has units they act as a
  // "set on every unit" bulk toggle instead of an address-level value.
  const njmBtn = h('button', {
    class: 'flag-toggle',
    title: hasUnits
      ? 'Toggle "No junk mail" on every unit of this address'
      : 'Toggle "No junk mail" - exclude this address from junk-mail count',
  }, 'NO JUNK MAIL');
  const comBtn = h('button', {
    class: 'flag-toggle com',
    title: hasUnits
      ? 'Toggle "Commercial" on every unit of this address'
      : 'Toggle "Commercial" - mark as business / commercial premises',
  }, 'COMMERCIAL');

  const refreshAddrLevelButtons = () => {
    if (hasUnits) {
      const allNjm = addr.units.length > 0 && addr.units.every(u => u.noJunkMail);
      const someNjm = addr.units.some(u => u.noJunkMail);
      const allCom = addr.units.length > 0 && addr.units.every(u => u.isCommercial);
      const someCom = addr.units.some(u => u.isCommercial);
      njmBtn.classList.toggle('active',  allNjm);
      njmBtn.classList.toggle('partial', !allNjm && someNjm);
      comBtn.classList.toggle('active',  allCom);
      comBtn.classList.toggle('partial', !allCom && someCom);
    } else {
      njmBtn.classList.toggle('active', !!addr.noJunkMail);
      njmBtn.classList.remove('partial');
      comBtn.classList.toggle('active', !!addr.isCommercial);
      comBtn.classList.remove('partial');
    }
  };

  njmBtn.onclick = () => {
    if (hasUnits) {
      const allOn = addr.units.every(u => u.noJunkMail);
      for (const u of addr.units) u.noJunkMail = !allOn;
    } else {
      addr.noJunkMail = !addr.noJunkMail;
    }
    saveState();
    refreshAddrLevelButtons();
    refreshUnits();
    refreshPreview(strip);
  };
  comBtn.onclick = () => {
    if (hasUnits) {
      const allOn = addr.units.every(u => u.isCommercial);
      for (const u of addr.units) u.isCommercial = !allOn;
    } else {
      addr.isCommercial = !addr.isCommercial;
    }
    saveState();
    refreshAddrLevelButtons();
    refreshUnits();
    refreshPreview(strip);
  };

  // Per-unit chips with their own flag toggles
  const unitsWrap = h('div', { class: 'unit-chips' });
  const refreshUnits = () => {
    unitsWrap.innerHTML = '';
    for (const u of addr.units) {
      const blank = isEmptyUnit(u);
      const chip = h('span', { class: 'unit-chip' + (blank ? ' empty' : '') + (u.noJunkMail ? ' njm' : '') + (u.isCommercial ? ' com' : '') }, [
        h('span', { class: 'unit-label', style: blank ? { fontStyle: 'italic', opacity: '0.75' } : null },
          blank ? '(no unit)' : u.label),
        h('button', {
          class: 'unit-flag-btn njm-btn' + (u.noJunkMail ? ' active' : ''),
          title: 'Toggle no junk mail for unit ' + u.label,
          onClick: (e) => {
            e.stopPropagation();
            u.noJunkMail = !u.noJunkMail;
            saveState();
            chip.classList.toggle('njm', u.noJunkMail);
            e.currentTarget.classList.toggle('active', u.noJunkMail);
            refreshAddrLevelButtons();
            refreshPreview(strip);
          },
        }, 'NJM'),
        h('button', {
          class: 'unit-flag-btn com-btn' + (u.isCommercial ? ' active' : ''),
          title: 'Toggle commercial for unit ' + u.label,
          onClick: (e) => {
            e.stopPropagation();
            u.isCommercial = !u.isCommercial;
            saveState();
            chip.classList.toggle('com', u.isCommercial);
            e.currentTarget.classList.toggle('active', u.isCommercial);
            refreshAddrLevelButtons();
            refreshPreview(strip);
          },
        }, 'COM'),
        h('button', { class: 'unit-remove', title: 'Remove unit', onClick: (e) => {
          e.stopPropagation();
          const i = addr.units.indexOf(u);
          if (i >= 0) addr.units.splice(i, 1);
          saveState();
          renderInspector_inplace(strip, section, $('.inspector'));
          refreshPreview(strip);
          refreshHeader(section);
        }}, '×'),
      ]);
      unitsWrap.appendChild(chip);
    }
    // input to add (range-aware)
    const ui = h('input', {
      class: 'input small mono',
      type: 'text',
      placeholder: '+ UNIT (A, B  ·  1-10  ·  1, 3, 5)',
      style: { width: '230px' },
      onInput: (e) => {
        const upper = e.target.value.toUpperCase();
        if (e.target.value !== upper) {
          const pos = e.target.selectionStart;
          e.target.value = upper;
          try { e.target.setSelectionRange(pos, pos); } catch(_) {}
        }
      },
      onKeydown: (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const v = ui.value.trim();
          if (!v) return;
          const parts = parseBulkRanges(v);
          for (const p of parts) {
            addr.units.push({ id: uid('u'), label: p.toUpperCase(), noJunkMail: false, isCommercial: false });
          }
          saveState();
          ui.value = '';
          renderInspector_inplace(strip, section, $('.inspector'));
          refreshPreview(strip);
          refreshHeader(section);
          if (stripNotchCount(strip) > MAX_NOTCHES) {
            toast(`Added ${parts.length} units - now over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(strip)}). Reconcile via Review → Auto-optimise.`, 'warn');
          }
        }
      },
    });
    unitsWrap.appendChild(ui);
    // "+ empty" - adds a blank placeholder sub-cell (used to shape an apt notch
    // to match the physical strip). Not counted as a deliverable.
    const emptyBtn = h('button', {
      class: 'tbtn ghost', style: { padding: '3px 8px', fontSize: '11px' },
      title: 'Add a blank placeholder sub-cell (not counted as mail)',
      onClick: (e) => {
        e.stopPropagation();
        addr.units.push({ id: uid('u'), label: '_', _empty: true, noJunkMail: false, isCommercial: false });
        saveState();
        renderInspector_inplace(strip, section, $('.inspector'));
        refreshPreview(strip);
        refreshHeader(section);
        if (stripNotchCount(strip) > MAX_NOTCHES) {
          toast(`Over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(strip)}). Reconcile via Review → Auto-optimise.`, 'warn');
        }
      },
    }, '+ empty');
    unitsWrap.appendChild(emptyBtn);
  };
  refreshUnits();
  refreshAddrLevelButtons();

  // Drag-and-drop. We only flip the row to draggable while the user is
  // mousing the handle - this stops accidental drags when they're editing.
  const tr = h('tr', { class: 'addr-row', 'data-idx': String(idx) });
  const handle = h('span', { class: 'drag-handle', title: 'Drag to reorder',
    onMousedown: () => { tr.draggable = true; },
    onMouseup:   () => { tr.draggable = false; },
  }, '⋮⋮');
  tr.addEventListener('dragstart', (e) => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    tr.classList.add('dragging');
  });
  tr.addEventListener('dragend', () => {
    tr.draggable = false;
    tr.classList.remove('dragging');
    $$('.addr-row.drag-over').forEach(el => el.classList.remove('drag-over', 'drag-over-above', 'drag-over-below'));
  });
  tr.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = tr.getBoundingClientRect();
    const above = (e.clientY - rect.top) < (rect.height / 2);
    tr.classList.add('drag-over');
    tr.classList.toggle('drag-over-above', above);
    tr.classList.toggle('drag-over-below', !above);
  });
  tr.addEventListener('dragleave', () => {
    tr.classList.remove('drag-over', 'drag-over-above', 'drag-over-below');
  });
  tr.addEventListener('drop', (e) => {
    e.preventDefault();
    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
    tr.classList.remove('drag-over', 'drag-over-above', 'drag-over-below');
    if (isNaN(fromIdx) || fromIdx === idx) return;
    const rect = tr.getBoundingClientRect();
    const above = (e.clientY - rect.top) < (rect.height / 2);
    let toIdx = above ? idx : idx + 1;
    if (fromIdx < toIdx) toIdx--;
    const [moved] = section.addresses.splice(fromIdx, 1);
    section.addresses.splice(toIdx, 0, moved);
    saveState();
    renderInspector_inplace(strip, section, $('.inspector'));
    refreshPreview(strip);
  });

  tr.appendChild(h('td', { class: 'col-drag' }, [handle]));
  tr.appendChild(h('td', { class: 'col-num' }, [numInput]));
  tr.appendChild(h('td', { class: 'col-flags' }, [h('div', { class: 'flag-toggle-row' }, [njmBtn, comBtn])]));
  tr.appendChild(h('td', { class: 'col-units' }, [unitsWrap]));
  tr.appendChild(h('td', { class: 'col-actions' }, [
    h('button', { class: 'icon-btn', title: 'Shift up', onClick: () => {
      if (idx <= 0) return;
      [section.addresses[idx-1], section.addresses[idx]] = [section.addresses[idx], section.addresses[idx-1]];
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
    }}, '↑'),
    h('button', { class: 'icon-btn', title: 'Shift down', onClick: () => {
      if (idx >= section.addresses.length - 1) return;
      [section.addresses[idx], section.addresses[idx+1]] = [section.addresses[idx+1], section.addresses[idx]];
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
    }}, '↓'),
    h('button', { class: 'icon-btn danger', title: 'Delete', onClick: () => {
      section.addresses.splice(idx, 1);
      saveState();
      renderInspector_inplace(strip, section, $('.inspector'));
      refreshPreview(strip);
      refreshHeader(section);
    }}, '×'),
  ]));
  return tr;
}

// ============== MODALS ==============
// opts.onDismiss: called instead of closing when the user clicks the backdrop or
// presses Escape (lets a form guard against losing unsaved input).
function openModal(content, opts = {}) {
  closeModal();
  const back = h('div', { class: 'modal-back', onClick: (e) => { if (e.target === back) requestCloseModal(); } }, [content]);
  document.body.appendChild(back);
  associateLabels(back);
  UI.modal = back;
  UI.modalDismiss = (typeof opts.onDismiss === 'function') ? opts.onDismiss : null;
  // focus first input
  setTimeout(() => {
    const inp = back.querySelector('input, textarea, select');
    if (inp) inp.focus();
  }, 50);
}
// A dismiss attempt (backdrop click / Escape). Honours an onDismiss guard.
function requestCloseModal() {
  if (UI.modalDismiss) { UI.modalDismiss(); return; }
  closeModal();
}
function closeModal() {
  if (UI.modal) UI.modal.remove();
  UI.modal = null;
  UI.modalDismiss = null;
}

function openAddRoundModal(presetWcc='') {
  let wccInput, roundInput, labelInput, sideCountInput, subCountInput, wccHint, teamInput;
  const S = appSettings();

  // Resolve whatever the user typed (a code OR a label) to a registry code.
  const resolveWcc = (raw) => {
    const hit = lookupWccByText(raw);
    return hit ? hit.code : String(raw || '').trim();
  };

  const submit = () => {
    const wcc = resolveWcc(wccInput.value);
    const rnd = roundInput.value.trim();
    const label = labelInput.value.trim().toUpperCase();
    if (!wcc || !rnd) { toast('WCC and Round are required', 'warn'); return; }
    if (!label) { toast('Suburb label is required - e.g. "GIRALANG / KALEEN"', 'warn'); labelInput.focus(); return; }
    // v0.11: ask for COUNTS, not specific letters/numbers. Sides become A,B,…
    // (max 4) and sub-sides become 1..N (max 9).
    const nSides = Math.max(1, Math.min(4, parseInt(sideCountInput.value, 10) || S.defaultSides));
    const nSubs  = Math.max(1, Math.min(9, parseInt(subCountInput.value, 10)  || S.defaultSubs));
    const sides = Array.from({ length: nSides }, (_, i) => String.fromCharCode(65 + i));
    const subs  = Array.from({ length: nSubs }, (_, i) => i + 1);
    const round = ensureRound(wcc, rnd);
    round.label = label;
    round.teamId = resolveTeamId(wcc, teamInput.value);
    const rndInt = parseInt(rnd, 10);
    for (const sl of sides) {
      const side = ensureSide(wcc, rnd, sl);
      // Auto-set the side label as (round + 1 for A, + 2 for B, etc.)
      if (!side.label && !isNaN(rndInt)) {
        const sideIndex = sl.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
        side.label = String(rndInt + sideIndex);
      }
      for (const sn of subs) ensureSubSide(wcc, rnd, sl, sn);
    }
    saveState();
    closeModal();
    renderBrowse();
    toast(`Created RND ${rnd}`, 'good');
  };

  const modal = h('div', { class: 'modal' }, [
    h('h2', {}, 'New round'),
    h('p', { class: 'subtle' }, 'Side labels auto-increment from the round number (RND 1120 → A=1121, B=1122). The suburb label is required so the report knows which patch this round delivers.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'WCC  · type code or name'),
        wccInput = h('input', { class: 'input mono', type: 'text', value: presetWcc, placeholder: '281586 or MITCHELL PARCELS',
          list: 'wcc-options', autocomplete: 'off',
          onInput: (e) => {
            const hit = lookupWccByText(e.target.value);
            wccHint.textContent = hit ? `→ ${hit.code}${hit.label ? ' · ' + hit.label : ''}` : '';
          },
        }),
        h('datalist', { id: 'wcc-options' },
          Object.values(wccRegistry()).sort((a, b) => a.code.localeCompare(b.code))
            .map(w => h('option', { value: w.code }, w.label ? `${w.code} - ${w.label}` : w.code))
        ),
        wccHint = h('div', { class: 'page-subtitle', style: { marginTop: '4px', minHeight: '14px' } }, ''),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Round number (4 digits)'),
        roundInput = h('input', { class: 'input mono', type: 'text', placeholder: '1120', maxlength: 4 }),
      ]),
    ]),
    h('div', { class: 'field', style: { marginTop: '4px' } }, [
      h('label', {}, 'Suburb(s) covered  · required'),
      labelInput = h('input', { class: 'input', type: 'text', placeholder: 'e.g. GIRALANG / KALEEN',
        onInput: (e) => { e.target.value = e.target.value.toUpperCase(); }
      }),
    ]),
    h('div', { class: 'field', style: { marginTop: '4px' } }, [
      h('label', {}, 'Team'),
      teamInput = h('input', { class: 'input', type: 'text', value: 'TEAM 1', list: 'team-options', placeholder: 'e.g. TEAM 1',
        onInput: (e) => { e.target.value = e.target.value.toUpperCase(); } }),
      h('datalist', { id: 'team-options' }, (() => {
        const codeNow = resolveWcc(presetWcc);
        const w = State.wccs[codeNow];
        return w ? teamsOf(w).map(t => h('option', { value: t.name })) : [];
      })()),
    ]),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'How many sides? (A–D)'),
        sideCountInput = h('input', { class: 'input mono', type: 'number', min: '1', max: '4', value: String(S.defaultSides) }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'How many sub-sides each? (1–9)'),
        subCountInput = h('input', { class: 'input mono', type: 'number', min: '1', max: '9', value: String(S.defaultSubs) }),
      ]),
    ]),
    h('p', { class: 'subtle', style: { marginTop: '2px' } }, `Defaults are ${S.defaultSides} sides and ${S.defaultSubs} sub-sides (change them in Menu → Settings). Sides are created as A, B, … and sub-sides as 1…N.`),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Create'),
    ]),
  ]);

  wccInput && (wccInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); });
  openModal(modal);
}

function openAddSideModal(wccCode, roundNum) {
  let letterInput, labelInput, subsInput;
  const computeSuggestedLabel = (letter) => {
    if (!/^[A-D]$/.test(letter)) return '';
    const rndInt = parseInt(roundNum, 10);
    if (isNaN(rndInt)) return '';
    const idx = letter.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
    return String(rndInt + idx);
  };
  const submit = () => {
    const letter = letterInput.value.trim().toUpperCase();
    const label = labelInput.value.trim().toUpperCase();
    const subs = subsInput.value.split(',').map(x => parseInt(x.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 9);
    if (!/^[A-D]$/.test(letter)) { toast('Side must be A-D', 'warn'); return; }
    const s = ensureSide(wccCode, roundNum, letter);
    s.label = label || computeSuggestedLabel(letter);
    for (const sn of subs) ensureSubSide(wccCode, roundNum, letter, sn);
    saveState();
    closeModal();
    renderBrowse();
  };
  const modal = h('div', { class: 'modal' }, [
    h('h2', {}, 'Add side to round ' + roundNum),
    h('p', { class: 'subtle' }, 'The label auto-fills as (round + side index), e.g. RND 1120 → A=1121, B=1122. Override if you need to.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [
        h('label', {}, 'Letter'),
        letterInput = h('input', { class: 'input mono', type: 'text', placeholder: 'A', maxlength: 1, style: { width: '70px' },
          onInput: (e) => {
            e.target.value = e.target.value.toUpperCase();
            const suggested = computeSuggestedLabel(e.target.value);
            if (suggested && !labelInput.value) labelInput.value = suggested;
          },
        }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Label (auto)'),
        labelInput = h('input', { class: 'input mono', type: 'text', placeholder: 'e.g. 1121',
          onInput: (e) => { e.target.value = e.target.value.toUpperCase(); }
        }),
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Sub-sides'),
        subsInput = h('input', { class: 'input mono', type: 'text', value: '1, 2, 3' }),
      ]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Save'),
    ]),
  ]);
  openModal(modal);
}

function openEditWccModal(code) {
  const wcc = State.wccs[code];
  let labelInput, emailInput, escalationInput;
  const submit = () => {

// v0.6: manage the local WCC registry - add / edit / remove WCC entries.
// The WCC code is the identifier and is read-only once created; the label and
// contact email are editable. These entries feed the autofill in the Round
// dialog and are mirrored onto round data when a round is created.
// Find a team in a WCC by name (case-insensitive); create it if missing.
function resolveTeamId(wccCode, name) {
  const w = ensureWcc(wccCode);
  const nm = String(name || '').trim().toUpperCase();
  if (!nm) return ensureDefaultTeam(wccCode);
  const found = Object.values(w.teams).find(t => (t.name || '').toUpperCase() === nm);
  return found ? found.id : addTeam(wccCode, nm).id;
}

function openCopyStripModal(strip, srcWcc, srcRnd, srcSide, srcSub) {
  // Pick a section, then pick a destination
  if (!strip.sections.length) { toast('No sections to copy', 'warn'); return; }
  let selectedSectionId = strip.sections[0].id;
  let destWcc, destRnd, destSide, destSub;

  const sectionPicker = h('select', { class: 'select input', onChange: (e) => { selectedSectionId = e.target.value; } },
    strip.sections.map(s => h('option', { value: s.id }, `${s.label || 'untitled'} - ${s.addresses.length} addr`))
  );

  // Build destination options
  const allStrips = [];
  for (const w of Object.values(State.wccs)) {
    for (const r of Object.values(w.rounds)) {
      for (const sd of Object.values(r.sides)) {
        for (const su of Object.values(sd.subSides)) {
          if (w.code === srcWcc && r.number === srcRnd && sd.letter === srcSide && su.number === srcSub) continue;
          allStrips.push({ wcc: w.code, rnd: r.number, side: sd.letter, sub: su.number });
        }
      }
    }
  }

  const destPicker = h('select', { class: 'select input', onChange: (e) => {
    const [w, r, sd, su] = e.target.value.split('|');
    destWcc = w; destRnd = r; destSide = sd; destSub = parseInt(su, 10);
  } },
    [h('option', { value: '' }, '- pick destination -')].concat(
      allStrips.map(s => h('option', { value: `${s.wcc}|${s.rnd}|${s.side}|${s.sub}` }, `WCC ${s.wcc} / RND ${s.rnd} / ${s.side}${s.sub}`))
    )
  );

  const submit = () => {
    if (!destWcc) { toast('Pick a destination strip', 'warn'); return; }
    const section = strip.sections.find(s => s.id === selectedSectionId);
    if (!section) return;
    const destStrip = ensureSubSide(destWcc, destRnd, destSide, destSub);
    const copy = JSON.parse(JSON.stringify(section));
    copy.id = uid('sec');
    copy.addresses.forEach(a => { a.id = uid('a'); a.units.forEach(u => u.id = uid('u')); });
    destStrip.sections.push(copy);
    saveState();
    closeModal();
    if (stripNotchCount(destStrip) > MAX_NOTCHES) {
      toast(`Copied to ${destSide}${destSub} - now over the ${MAX_NOTCHES}-notch cap (${stripNotchCount(destStrip)}). Reconcile via Review → Auto-optimise.`, 'warn');
    } else {
      toast(`Copied to ${destSide}${destSub}`, 'good');
    }
  };

  openModal(h('div', { class: 'modal wide' }, [
    h('h2', {}, 'Copy section to another strip'),
    h('p', { class: 'subtle' }, 'For rebalancing routes. The section (including all addresses and units) is duplicated to the destination - the source remains intact.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Section'),
        sectionPicker,
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Destination'),
        destPicker,
      ]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Copy'),
    ]),
  ]));
}

// ============== EXPORT / IMPORT ==============
function exportJSON() {
  const blob = new Blob([JSON.stringify(State, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
  a.href = url;
  a.download = `stripmaker_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  toast('Exported JSON backup', 'good');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.wccs || typeof data.wccs !== 'object') throw new Error('Not a valid Stripmaker JSON');
      migrate(data); // ensure new v0.2 fields exist before merge/replace
      openModal(h('div', { class: 'modal' }, [
        h('h2', {}, 'Import database'),
        h('p', { class: 'subtle' }, 'How would you like to import? Replace wipes your current data; merge appends sections.'),
        h('div', { class: 'modal-actions' }, [
          h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
          h('button', { class: 'tbtn', onClick: () => { mergeImport(data); closeModal(); } }, 'Merge'),
          h('button', { class: 'tbtn danger', onClick: () => { State = data; saveState(); closeModal(); renderBrowse(); toast('Replaced from file', 'good'); } }, 'Replace'),
        ]),
      ]));
    } catch (e) {
      toast('Bad file: ' + e.message, 'danger');
    }
  };
  reader.readAsText(file);
}
function mergeImport(data) {
  // Merge the WCC registry first so labels/emails are available.
  for (const [code, w] of Object.entries(data.wccRegistry || {})) {
    registerWcc(code, w.label || '', w.contactEmail || '', w.escalationEmail || '');
  }
  for (const [code, wcc] of Object.entries(data.wccs || {})) {
    const dest = ensureWcc(code);
    if (wcc.label) dest.label = wcc.label;
    if (wcc.contactEmail) dest.contactEmail = wcc.contactEmail;
    if (wcc.escalationEmail) dest.escalationEmail = wcc.escalationEmail;
    for (const [rn, r] of Object.entries(wcc.rounds || {})) {
      const dr = ensureRound(code, rn);
      if (r.label) dr.label = r.label;
      if (r.pdoName) dr.pdoName = r.pdoName;
      if (r.pdoAps)  dr.pdoAps  = r.pdoAps;
      for (const [letter, side] of Object.entries(r.sides || {})) {
        const ds = ensureSide(code, rn, letter);
        if (side.label) ds.label = side.label;
        for (const [k, sub] of Object.entries(side.subSides || {})) {
          const dsub = ensureSubSide(code, rn, letter, parseInt(k, 10));
          // Append sections rather than overwrite (safer for merges)
          for (const sec of sub.sections || []) {
            const copy = JSON.parse(JSON.stringify(sec));
            copy.id = uid('sec');
            (copy.addresses || []).forEach(a => {
              a.id = uid('a');
              if (a.noJunkMail === undefined) a.noJunkMail = false;
              if (a.isCommercial === undefined) a.isCommercial = false;
              (a.units || []).forEach(u => u.id = uid('u'));
            });
            dsub.sections.push(copy);
          }
        }
      }
    }
  }
  saveState();
  renderBrowse();
  toast('Merged from file', 'good');
}

// ============== PRINT ==============
// Dynamic page-size injection so we can support different paper sizes
// (920mm × 23mm for strips - fits the 60-notch cap (60 × 14.5mm) plus the
// 29mm round-end marker, which is allowed to overhang the physical strip
// holder - and A4 portrait for reports) from one app.
function printWithPageSize(sizeRule, mode, marginCss) {
  // Remove any prior dynamic style
  const existing = document.getElementById('dynamic-page-style');
  if (existing) existing.remove();
  const style = document.createElement('style');
  style.id = 'dynamic-page-style';
  const margin = marginCss != null ? marginCss : (mode === 'report' ? '15mm' : '0');
  style.textContent = `@page { ${sizeRule} margin: ${margin}; }`;
  document.head.appendChild(style);
  document.body.setAttribute('data-printing', mode);
  // Give the layout a tick before firing the print dialog
  setTimeout(() => window.print(), 60);
}

const NOTCH_MM = 14.5;      // physical notch width
const ROW_BLOCK_MM = 22;    // vertical space one strip row consumes (21mm strip + cut line)
const PRINT_MARGIN_MM = 8;  // page margin used for tiling maths
const END_MARKER_MM = 29;   // round-end marker width

const PAPER_SIZES = {
  A4: { w: 210, h: 297 },
  A3: { w: 297, h: 420 },
};

// Flatten the whole strip into a single sequence of {sec, cell} notches so we
// can re-chunk it into page-width rows regardless of section boundaries.
function buildStripCells(strip) {
  const flat = [];
  for (const sec of strip.sections) {
    for (const cell of layoutSection(sec)) flat.push({ sec, cell });
  }
  return flat;
}

// Render one page-width row from a list of {sec, cell}, grouping consecutive
// cells of the same section so colour + label render correctly.
function renderRowStrip(items, endMarker) {
  const stripEl = h('div', { class: 'strip' });
  let i = 0;
  while (i < items.length) {
    const sec = items[i].sec;
    const group = [];
    while (i < items.length && items[i].sec === sec) { group.push(items[i].cell); i++; }
    const txt = getTextColor(sec);
    const notchCount = group.reduce((s, c) => s + (c.width || 1), 0);
    const numRow = h('div', { class: 'num-row' });
    for (const c of group) numRow.appendChild(renderCellDOM(c, txt));
    const labelRow = h('div', { class: 'label-row' }, [h('span', { class: 'label-text' }, sec.label || ' ')]);
    stripEl.appendChild(h('div', {
      class: 'strip-section',
      style: { background: sec.color, color: txt, width: `calc(var(--notch-w) * ${notchCount})`, flex: `0 0 calc(var(--notch-w) * ${notchCount})` },
    }, [numRow, labelRow]));
  }
  if (endMarker) {
    stripEl.appendChild(h('div', { class: 'strip-end' }, [
      h('div', { class: 'rnd' }, endMarker.rnd),
      h('div', { class: 'id' }, endMarker.id),
    ]));
  }
  // 10mm blank tail at the end of every piece, for overlap on install.
  stripEl.appendChild(h('div', { class: 'tile-end-pad' }));
  return stripEl;
}

// Continuous single-strip print (original behaviour): one 920mm-wide page.
function printContinuous(strip, stripIdLabel, roundNum) {
  const root = $('#print-root');
  root.innerHTML = '';
  const printStripEl = h('div', { class: 'strip' });
  for (const sec of strip.sections) printStripEl.appendChild(renderSectionDOM(sec, false));
  printStripEl.appendChild(h('div', { class: 'strip-end' }, [
    h('div', { class: 'rnd' }, 'RND_' + roundNum),
    h('div', { class: 'id' }, stripIdLabel),
  ]));
  printStripEl.appendChild(h('div', { class: 'tile-end-pad' })); // 10mm install tail
  root.appendChild(printStripEl);
  printWithPageSize('size: 930mm 23mm;', 'strip');
}

// How many notches / stacked rows fit on a page for the given paper+orientation.
function tilingGeometry(paper, orientation) {
  const dims = PAPER_SIZES[paper] || PAPER_SIZES.A4;
  const pageW = orientation === 'landscape' ? dims.h : dims.w;
  const pageH = orientation === 'landscape' ? dims.w : dims.h;
  const usableW = pageW - 2 * PRINT_MARGIN_MM;
  const usableH = pageH - 2 * PRINT_MARGIN_MM;
  // Reserve the 10mm end tail so a row never exceeds the printable width.
  const notchesPerRow = Math.max(1, Math.floor((usableW - 10) / NOTCH_MM));
  const rowsPerPage = Math.max(1, Math.floor(usableH / ROW_BLOCK_MM));
  return { notchesPerRow, rowsPerPage };
}

// Break one strip into a list of .tile-row elements (page-width pieces stacked
// tightly, the round-end marker on the last). Shared by single-strip and bulk
// printing.
function buildStripRowEls(strip, stripIdLabel, roundNum, notchesPerRow) {
  const flat = buildStripCells(strip);
  const rows = [];
  let cur = [], curN = 0;
  for (const it of flat) {
    const w = it.cell.width || 1;
    if (curN + w > notchesPerRow && cur.length) { rows.push(cur); cur = []; curN = 0; }
    cur.push(it); curN += w;
  }
  if (cur.length) rows.push(cur);
  if (!rows.length) rows.push([]); // always emit at least one (for the end marker)

  // The last piece also carries the round-end marker (~2 notches) plus the 10mm
  // tail (~1 notch). If the final row is too full to fit them, give the marker
  // its own final row so nothing clips.
  const lastCount = rows[rows.length - 1].reduce((s, it) => s + (it.cell.width || 1), 0);
  if (lastCount + 3 > notchesPerRow) rows.push([]);

  const totalRows = rows.length;
  return rows.map((rowItems, idx) => {
    const isLast = idx === totalRows - 1;
    const endMarker = isLast ? { rnd: 'RND_' + roundNum, id: stripIdLabel } : null;
    return h('div', { class: 'tile-row' }, [renderRowStrip(rowItems, endMarker)]);
  });
}

// Build the A4/A3 sheets for one strip: break it into page-width rows stacked
// tightly down each sheet (separated by a black cut line). Returns an array of
// .strip-sheet elements (each is one printed page).
function buildTiledSheets(strip, stripIdLabel, roundNum, paper, orientation) {
  const { notchesPerRow, rowsPerPage } = tilingGeometry(paper, orientation);
  const rowEls = buildStripRowEls(strip, stripIdLabel, roundNum, notchesPerRow);

  const sheets = [];
  let sheet = h('div', { class: 'strip-sheet' });
  rowEls.forEach((rowEl, idx) => {
    if (idx > 0 && idx % rowsPerPage === 0) {
      sheets.push(sheet);
      sheet = h('div', { class: 'strip-sheet' });
    }
    sheet.appendChild(rowEl);
  });
  sheets.push(sheet);
  return sheets;
}

// Bulk layout: pack as many whole strips onto each sheet as will fit, keeping
// each strip's rows together (no mid-strip page break unless the strip alone is
// taller than a page). A thin caption identifies each strip. Returns an array of
// .strip-sheet elements.
function buildPackedSheets(stripDescriptors, paper, orientation) {
  const { notchesPerRow, rowsPerPage } = tilingGeometry(paper, orientation);
  const sheets = [];
  let sheet = h('div', { class: 'strip-sheet' });
  let rowsOnSheet = 0;
  let blocksOnSheet = 0; // strips placed on the current sheet

  for (const { strip, label, round } of stripDescriptors) {
    if (!strip.sections || !strip.sections.length) continue;
    const rowEls = buildStripRowEls(strip, label, round, notchesPerRow);
    // A caption costs ~half a row of vertical space; budget it as 1 row so the
    // packing stays conservative and nothing clips.
    const blockRows = rowEls.length + 1;
    if (blocksOnSheet > 0 && rowsOnSheet + blockRows > rowsPerPage) {
      sheets.push(sheet);
      sheet = h('div', { class: 'strip-sheet' });
      rowsOnSheet = 0; blocksOnSheet = 0;
    }
    sheet.appendChild(h('div', { class: 'tile-strip-block' }, [
      h('div', { class: 'tile-strip-cap' }, `RND_${round} · ${label}`),
      ...rowEls,
    ]));
    rowsOnSheet += blockRows;
    blocksOnSheet++;
  }
  if (blocksOnSheet > 0) sheets.push(sheet);
  return sheets;
}

// Tiled print of a single strip.
function printTiled(strip, stripIdLabel, roundNum, paper, orientation) {
  const root = $('#print-root');
  root.innerHTML = '';
  for (const sheet of buildTiledSheets(strip, stripIdLabel, roundNum, paper, orientation)) {
    root.appendChild(sheet);
  }
  printWithPageSize(`size: ${paper} ${orientation};`, 'strip', PRINT_MARGIN_MM + 'mm');
}

    if (mode === 'continuous') {

      return;
    }
    const dims = PAPER_SIZES[paper];
    const pageW = orientation === 'landscape' ? dims.h : dims.w;
    const pageH = orientation === 'landscape' ? dims.w : dims.h;
    const perRow = Math.max(1, Math.floor((pageW - 2 * PRINT_MARGIN_MM - 10) / NOTCH_MM));
    const perPage = Math.max(1, Math.floor((pageH - 2 * PRINT_MARGIN_MM) / ROW_BLOCK_MM));
    const total = stripNotchCount(strip);
    const pieces = Math.max(1, Math.ceil(total / perRow));
    const sheets = Math.max(1, Math.ceil(pieces / perPage));

// Collect every strip (sub-side) under a scope, in delivery order.
// scope: 'wcc' | 'round' | 'side'
function collectStrips(scope, wccCode, roundNum, sideLetter) {
  const out = [];
  const w = State.wccs[wccCode];
  if (!w) return out;
  const rounds = scope === 'wcc'
    ? Object.keys(w.rounds).sort()
    : [roundNum];
  for (const rn of rounds) {
    const r = w.rounds[rn];
    if (!r) continue;
    const sides = (scope === 'side') ? [sideLetter] : ['A', 'B', 'C', 'D'].filter(l => r.sides[l]);
    for (const sl of sides) {
      const side = r.sides[sl];
      if (!side) continue;
      const subs = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
      for (const sn of subs) {
        const strip = side.subSides[String(sn)];
        out.push({ strip, label: sl + sn, round: rn });
      }
    }
  }
  return out;
}

// Bulk-print every strip in a scope as one tiled document. Strips are packed
// several-per-page (each kept whole) to save paper. Empty strips are skipped.
function printBulk(strips, paper, orientation) {
  const root = $('#print-root');
  root.innerHTML = '';
  const withContent = strips.filter(s => s.strip.sections && s.strip.sections.length);
  if (!withContent.length) { toast('No strips with content in that selection', 'warn'); return; }
  for (const sheet of buildPackedSheets(withContent, paper, orientation)) {
    root.appendChild(sheet);
  }
  printWithPageSize(`size: ${paper} ${orientation};`, 'strip', PRINT_MARGIN_MM + 'mm');
}

  const scopeToggle = h('div', { class: 'toggle-group' }, [

    h('button', { onClick: (e) => setScope('side', e) }, 'One side'),

  function setScope(s, e) {

    Array.from(scopeToggle.children).forEach(b => b.classList.remove('active'));

  const paperToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => { paper = 'A4'; mark(paperToggle, e); } }, 'A4'),
    h('button', { onClick: (e) => { paper = 'A3'; mark(paperToggle, e); } }, 'A3'),

    h('h2', {}, 'Advanced print'),
    h('p', { class: 'subtle' }, 'Bulk-print cut-section strips for a whole WCC, a single round, or one side. Several strips are packed onto each sheet (each kept whole, with a caption) to save paper.'),
    h('div', { class: 'field', style: { marginBottom: '12px' } }, [h('label', {}, 'Scope'), scopeToggle]),
    // WCC on its own row - its label can be long and was clipping next to Round.
    h('div', { class: 'field', style: { marginBottom: '12px' } }, [h('label', {}, 'WCC'), wccSel]),
    h('div', { class: 'form-row' }, [

      sideField,

    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [h('label', {}, 'Paper'), paperToggle]),
      h('div', { class: 'field' }, [h('label', {}, 'Orientation'), orientToggle]),
    ]),
    hint,
    h('div', { class: 'modal-actions' }, [

      h('button', { class: 'tbtn primary', onClick: go }, '⎙ Print all'),

  ]));

// ============== REPORT (load-balance) ==============

// Walk the round and produce per-side and per-sub-side counts.
//
// Flag accounting (v0.3, with per-unit flags):
//   • Non-unit address contributes 1 mail piece. It's commercial iff
//     a.isCommercial; gets junk mail iff !a.noJunkMail.
//   • Apartment address (with units) contributes N mail pieces, one per unit.
//     Each unit is commercial iff (a.isCommercial OR u.isCommercial), and
//     gets junk mail iff !(a.noJunkMail OR u.noJunkMail).  (Address-level
//     flags act as an inherited default; unit-level flags can opt in/out.)
//   • commercialAddresses = count of addresses with at least one commercial
//     piece (useful for the "how many businesses on the round" view).
function computeRoundStats(round) {
  const result = { sides: {}, sideLetters: [] };
  for (const letter of ['A', 'B', 'C', 'D']) {
    const side = round.sides[letter];
    if (!side) continue;
    result.sideLetters.push(letter);
    let addresses = 0, units = 0, apartmentBlocks = 0;
    let commercialAddresses = 0, commercialPieces = 0;
    let junkMailPieces = 0;
    let effectiveStops = 0;
    const subStats = {};
    const subNums = Object.keys(side.subSides).map(Number).sort((a,b)=>a-b);
    for (const sn of subNums) {
      const sub = side.subSides[String(sn)];
      let sAddr = 0, sUnits = 0, sBlocks = 0;
      let sComAddr = 0, sComPieces = 0;
      let sJM = 0, sEff = 0;
      for (const sec of sub.sections) {
        for (const a of sec.addresses) {
          sAddr++;
          sEff++; // one physical stop per address (apt block reached at one location)
          // Every sub-cell is a real delivery - including a "blank" cell, which
          // represents the house at the plain number (e.g. "4" alongside "4A").
          const hasUnits = a.units && a.units.length > 0;
          if (hasUnits) {
            sUnits += a.units.length;
            sBlocks++;
            let anyComOnThisAddr = false;
            for (const u of a.units) {
              const isCom = a.isCommercial || u.isCommercial;
              const noJM = a.noJunkMail   || u.noJunkMail;
              if (isCom) { sComPieces++; anyComOnThisAddr = true; }
              if (!noJM) sJM++;
            }
            if (anyComOnThisAddr) sComAddr++;
          } else {
            // Single non-unit address = 1 mail piece
            if (a.isCommercial) { sComPieces++; sComAddr++; }
            if (!a.noJunkMail)  sJM++;
          }
        }
      }
      subStats[sn] = {
        n: sn,
        addresses: sAddr, units: sUnits, apartmentBlocks: sBlocks,
        commercialAddresses: sComAddr, commercialPieces: sComPieces,
        junkMail: sJM, effectiveStops: sEff,
        sectionCount: sub.sections.length,
      };
      addresses += sAddr;
      units += sUnits;
      apartmentBlocks += sBlocks;
      commercialAddresses += sComAddr;
      commercialPieces += sComPieces;
      junkMailPieces += sJM;
      effectiveStops += sEff;
    }
    result.sides[letter] = {
      letter, label: side.label || '',
      addresses, units, apartmentBlocks,
      commercialAddresses, commercialPieces, commercial: commercialAddresses,
      junkMail: junkMailPieces,
      effectiveStops,
      // Mail pieces = one per non-unit address + one per unit at apt blocks
      mailPieces: addresses - apartmentBlocks + units,
      subStats,
    };
  }
  return result;
}

function fmtDelta(a, b) {
  const d = a - b;
  if (d === 0) return { text: '-', cls: 'even' };
  const cls = Math.abs(d) >= Math.max(5, Math.round(Math.max(a,b) * 0.15)) ? 'high' : '';
  return { text: (d > 0 ? '+' : '') + d, cls };
}

  const dateStr = new Date().toLocaleString('en-AU', {

    ]));
  }
  const team = round.teamId && wcc.teams ? wcc.teams[round.teamId] : null;
  if (team) {
    metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Team'), h('span', { class: 'v' }, team.name || '')]));
    if (team.leaderEmail) metaRows.push(h('div', { class: 'row' }, [
      h('span', { class: 'k' }, 'Team leader'),
      h('a', { class: 'v', href: 'mailto:' + team.leaderEmail, style: { textTransform: 'none', color: '#1f1d17', textDecoration: 'underline' } }, team.leaderEmail),

  }
  metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Generated'), h('span', { class: 'v', style: { textTransform: 'none' } }, dateStr)]));
  const auditStr = round.auditDate
    ? new Date(round.auditDate + 'T00:00:00').toLocaleDateString('en-AU', { year: 'numeric', month: 'short', day: '2-digit' })
    : 'Not recorded';
  metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Audit date'), h('span', { class: 'v', style: { textTransform: 'none' } }, auditStr)]));

  // Whole-of-round totals - the headline numbers a team leader needs.
  const tot = (key) => sides.reduce((acc, s) => acc + (s[key] || 0), 0);
  const summaryCards = h('div', { class: 'report-balance' }, [
    h('div', { class: 'card' }, [h('div', { class: 'label' }, 'Delivery stops'), h('div', { class: 'value' }, String(tot('effectiveStops'))), h('div', { class: 'sub' }, 'physical stops on the route')]),
    h('div', { class: 'card' }, [h('div', { class: 'label' }, 'Junk mail'), h('div', { class: 'value' }, String(tot('junkMail'))), h('div', { class: 'sub' }, 'unaddressed items to prepare')]),
    h('div', { class: 'card' }, [h('div', { class: 'label' }, 'Commercial mail'), h('div', { class: 'value' }, String(tot('commercialPieces'))), h('div', { class: 'sub' }, 'business deliveries')]),
  ]);
  // Visual side-balance bars (delivery stops per side) so the split is obvious.
  const maxStops = Math.max(1, ...sides.map(s => s.effectiveStops || 0));
  const balanceBars = h('div', { class: 'report-balbars' }, sides.map(s => h('div', { class: 'balbar-row' }, [
    h('span', { class: 'balbar-label' }, `Side ${s.letter}`),
    h('div', { class: 'balbar-track' }, [
      h('div', { class: 'balbar-fill', style: { width: Math.round((s.effectiveStops || 0) / maxStops * 100) + '%' } }, String(s.effectiveStops || 0)),
    ]),
  ])).concat(
    isPair ? [h('div', { class: 'balbar-note' }, (() => {
      const d = Math.abs(sides[0].effectiveStops - sides[1].effectiveStops);
      const p = Math.max(sides[0].effectiveStops, sides[1].effectiveStops) || 1;
      return `${d} stop${d === 1 ? '' : 's'} difference between sides (${Math.round(d / p * 100)}%)`;
    })())] : []
  ));
  const summaryBlock = h('div', {}, [summaryCards, balanceBars]);

  // Side comparison table
  const compareRows = [];
  const metrics = [
    { key: 'effectiveStops', label: 'Delivery stops' },
    { key: 'addresses', label: 'Addresses' },
    { key: 'apartmentBlocks', label: 'Apartment blocks' },
    { key: 'units', label: 'Apartment units' },
    { key: 'junkMail', label: 'Junk mail' },
    { key: 'commercialPieces', label: 'Commercial mail' },
    { key: 'commercialAddresses', label: 'Commercial stops' },
  ];
  for (const m of metrics) {
    const cells = [h('td', {}, m.label)];
    for (const s of sides) cells.push(h('td', { class: 'num' }, String(s[m.key] ?? 0)));
    if (isPair) {
      const d = fmtDelta(sides[0][m.key] ?? 0, sides[1][m.key] ?? 0);
      cells.push(h('td', { class: 'delta ' + d.cls }, d.text));
    }
    compareRows.push(h('tr', {}, cells));
  }
  const compareHeader = [h('th', {}, 'Metric')];
  for (const s of sides) compareHeader.push(h('th', { style: { textAlign: 'right' } }, `Side ${s.letter}${s.label ? ' (' + s.label + ')' : ''}`));
  if (isPair) compareHeader.push(h('th', { style: { textAlign: 'right' } }, 'Δ (A − B)'));

  const compareTable = h('table', { class: 'report-table' }, [
    h('thead', {}, h('tr', {}, compareHeader)),
    h('tbody', {}, compareRows),
  ]);

  return h('div', { class: 'report-page' }, [
    h('h1', { class: 'report-h1', style: { textAlign: 'center' } }, 'Load-Balance Report'),

    h('div', { class: 'report-meta' }, metaRows),

    h('div', { class: 'report-section-title' }, 'Route summary'),
    summaryBlock,

    h('div', { class: 'report-section-title' }, 'Side comparison'),
    compareTable,
  ]);
}

const ISSUE_META = {

  empty:      { label: 'EMPTY',      cls: 'empty' },

function renderReview() {
  const root = $('#app-root');
  root.innerHTML = '';

  const rounds = scanIssues();
  const totalIssues = rounds.reduce((n, r) => n + r.issues.length + (r.colorConflicts ? r.colorConflicts.length : 0), 0);

  const headerActions = h('div', { class: 'actions', style: { display: 'flex', gap: '8px' } }, [
    UndoSnapshot ? h('button', {
      class: 'tbtn',
      title: 'Undo the last auto-optimise / bulk-create (' + UndoSnapshot.desc + ')',
      onClick: () => rollbackUndo(() => renderReview()),
    }, '↶ Roll back last change') : null,
  ]);

  const page = h('div', { class: 'page' }, [
    h('div', { class: 'page-header' }, [
      h('div', {}, [
        h('h1', { class: 'page-title' }, 'Review'),
        h('p', { class: 'page-subtitle' }, totalIssues
          ? `${totalIssues} issue${totalIssues === 1 ? '' : 's'} across ${rounds.length} round${rounds.length === 1 ? '' : 's'}`
          : 'No outstanding issues'),
      ]),
      headerActions,
    ]),

    // The big, unmissable warning about the destructive tools on this page.
    h('div', { class: 'review-warning' }, [
      h('div', { class: 'rw-icon' }, '⚠'),
      h('div', {}, [
        h('strong', {}, 'Auto-optimise rewrites a whole side.'),
        h('div', { class: 'rw-body' }, 'It redistributes every address across the subs to fill each one to 60 notches (the last sub keeps the remainder), splitting streets across subs where needed, and renumbers the subs. This can drastically change your existing layout. A one-step roll back is offered after each run - but EXPORT A JSON BACKUP first (Menu → Export JSON) if this data matters.'),
      ]),
    ]),

    !rounds.length
      ? h('div', { class: 'browse-empty' }, [
          h('h2', {}, 'All clear'),
          h('p', {}, 'Every round is either complete or only has its last sub partially filled (which is fine). Nothing needs attention.'),
          h('button', { class: 'tbtn ghost', onClick: backToBrowse }, '← Back to library'),
        ])
      : h('div', { class: 'review-list' }, rounds.map(renderReviewRoundCard)),
  ]);

  root.appendChild(page);
}

function renderReviewRoundCard(rc) {
  const wcc = State.wccs[rc.wccCode];
  const round = wcc.rounds[rc.roundNum];

  // Group issues by side so we can offer a per-side "auto-optimise".
  const sidesWithIssues = [...new Set(rc.issues.map(i => i.side))].sort();

  const issueChips = h('div', { class: 'issue-chips' }, rc.issues.map(i => {
    const m = ISSUE_META[i.kind] || { label: i.kind.toUpperCase(), cls: '' };
    return h('span', { class: 'issue-chip ' + m.cls, title: i.label }, [
      h('span', { class: 'ic-tag' }, m.label),
      i.label,
    ]);
  }));

  const sideButtons = h('div', { class: 'review-side-actions' }, sidesWithIssues.map(sl =>
    h('button', {
      class: 'tbtn',
      title: `Auto-optimise side ${sl}: redistribute its addresses to fill each sub to 60 notches`,
      onClick: () => openOptimiseConfirm(rc.wccCode, rc.roundNum, sl),
    }, `⚙ Auto-optimise side ${sl}`)
  ));

  // Colour conflicts: same street name drawn in >1 colour within this round.
  const conflicts = rc.colorConflicts || [];
  const conflictBlock = conflicts.length ? h('div', { class: 'conflict-list' }, conflicts.map(cf =>
    h('div', { class: 'conflict-row' }, [
      h('span', { class: 'conflict-swatches' }, cf.colors.map(c =>
        h('span', { class: 'conflict-swatch', style: { background: c }, title: c }))),
      h('span', { class: 'conflict-text' }, [
        h('strong', {}, cf.label),
        ` - ${cf.colors.length} colours across ${cf.count} sections`,
      ]),
      h('button', {
        class: 'tbtn', style: { marginLeft: 'auto' },
        title: `Make every "${cf.label}" section one colour`,
        onClick: () => openColorFixModal(rc.wccCode, rc.roundNum, cf),
      }, '🎨 Unify colour'),
    ])
  )) : null;

  return h('div', { class: 'review-round-card' }, [
    h('div', { class: 'rr-head' }, [
      h('span', { class: 'rr-code' }, 'WCC ' + rc.wccCode),
      h('span', { class: 'rr-num' }, 'RND ' + rc.roundNum),
      rc.roundLabel ? h('span', { class: 'rr-label' }, rc.roundLabel) : null,
      h('button', {
        class: 'tbtn ghost', style: { marginLeft: 'auto' },
        title: 'Open this round in the library',
        onClick: () => { backToBrowse(); },
      }, 'Open in library'),
    ]),
    rc.issues.length ? issueChips : null,
    conflictBlock,
    h('div', { class: 'review-side-actions' }, [
      ...Array.from(sideButtons.children),
      h('button', {
        class: 'tbtn',
        title: 'Give every street a distinct colour and make sure adjacent streets contrast',
        onClick: () => openRecolorConfirm(rc.wccCode, rc.roundNum),
      }, '🎨 Auto-recolour streets'),
    ]),
  ]);

// Confirm + run the distinct/contrasting recolour for a whole round.
function openRecolorConfirm(wccCode, roundNum) {
  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, `Auto-recolour streets - RND ${roundNum}`),
    h('p', { class: 'subtle' }, 'Every street name in this round gets its own colour, and neighbouring streets are kept visually distinct (no two similar blues side-by-side, etc.). This round only - other rounds and WCCs are untouched. Roll back available.'),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: () => {
        const round = State.wccs[wccCode] && State.wccs[wccCode].rounds[roundNum];
        if (!round) { closeModal(); return; }
        snapshotUndo(`auto-recolour RND ${roundNum}`);
        const n = assignDistinctColors(round);
        saveState();
        closeModal();

        renderReview();
      } }, '🎨 Recolour'),
