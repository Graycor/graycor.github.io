// Parse a bulk address string into address numbers.
// Supports ranges like "1-9" (odd → 1,3,5,7,9), "12-18" (even), "33-25" (descending).
// Range parity comes from the start number; if start & end have different parity, step 1.
// Mixed with comma/whitespace-separated singles: "40-32, 30, 28A".
function parseBulkRanges(text) {
  const result = [];
  // Split on commas / newlines first. A comma-segment is further split on
  // whitespace ONLY when every space-separated piece is a "simple" token - a
  // number, a numeric range (1-9), or a single letter (A). Otherwise the
  // segment is kept whole (internal whitespace collapsed) so multi-word named
  // entries like "VET HOSPITAL" or "UNIT 5" become ONE entry, not two.
  const tokens = [];
  for (const seg of text.split(/[,\n]+/)) {
    const s = seg.trim();
    if (!s) continue;
    const pieces = s.split(/\s+/);
    const allSimple = pieces.every(p => /^\d/.test(p) || /^[A-Za-z]$/.test(p));
    if (allSimple) {
      for (const p of pieces) tokens.push(p);
    } else {
      tokens.push(s.replace(/\s+/g, ' '));
    }
  }
  for (const tok of tokens) {
    const m = tok.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) {
      const a = parseInt(m[1], 10);
      const b = parseInt(m[2], 10);
      if (isNaN(a) || isNaN(b)) { result.push(tok); continue; }
      const sameParity = (a % 2) === (b % 2);
      const step = sameParity ? 2 : 1;
      const dir = a <= b ? 1 : -1;
      const max = 500; // safety cap
      let count = 0;
      for (let n = a; (dir > 0 ? n <= b : n >= b) && count < max; n += dir * step) {
        result.push(String(n));
        count++;
      }
    } else {
      result.push(tok);
    }
  }
  return result;
}

function deleteSection(strip, sectionId) {
  const i = strip.sections.findIndex(s => s.id === sectionId);
  if (i >= 0) strip.sections.splice(i, 1);
  saveState();
}
function moveSection(strip, sectionId, dir) {
  const i = strip.sections.findIndex(s => s.id === sectionId);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= strip.sections.length) return;
  [strip.sections[i], strip.sections[j]] = [strip.sections[j], strip.sections[i]];
  saveState();
}
function duplicateSection(strip, sectionId) {
  const orig = strip.sections.find(s => s.id === sectionId);
  if (!orig) return;
  // v0.11: duplicate keeps only the look of the section (label, colour, text
  // colour, notch mode) - NOT its addresses. It's a quick way to start a new
  // run of the same street further along, empty and ready to fill.
  const copy = {
    id: uid('sec'),
    label: orig.label,
    color: orig.color,
    textColor: orig.textColor,
    notchMode: orig.notchMode,
    addresses: [],
  };
  // Duplicates go to the END of the strip, not adjacent to the source.
  strip.sections.push(copy);
  saveState();
  return copy;
}

// ============== LAYOUT ENGINE ==============
// Compute the notch layout for a section. Returns an array of "cells",
// each cell is one notch worth of width (= one --notch-w).
// An "empty" unit is a sub-cell with no unit letter - it represents the house
// at the plain street number (e.g. "4" sitting next to "4A"). It IS a real
// delivery and is counted in the report; "empty" only affects how it's drawn
// (a blank cell, matching the physical strip) and labelled in the editor.
function isEmptyUnit(u) {
  const l = (u && u.label != null) ? String(u.label).trim() : '';
  return u && (u._empty === true || l === '' || l === '_');
}

// Normalise a number for comparison ("4" === "4", " 4 " === "4").
function sameNumber(x, y) {
  return String(x || '').trim().toUpperCase() === String(y || '').trim().toUpperCase();
}

// v0.6 auto-merge: a bare number immediately followed by an apartment of the
// SAME number collapses into a single notch. The bare number's slot is kept
// visually by prepending one empty unit to the apartment (so "4" then unit "A"
// share one notch, matching the physical strip). Non-destructive: returns a new
// list with a shallow-cloned merged address; the stored data is untouched.
function mergeConsecutiveAddresses(addresses) {
  const src = addresses || [];
  const out = [];
  for (let i = 0; i < src.length; i++) {
    const a = src[i];
    const b = src[i + 1];
    const aBare = !(a.units && a.units.length);
    const bApt  = b && b.units && b.units.length;
    if (aBare && bApt && sameNumber(a.number, b.number)) {
      out.push(Object.assign({}, b, {
        units: [{ id: 'u_merge_' + (b.id || i), label: '_', _empty: true, noJunkMail: false, isCommercial: false }, ...b.units],
      }));
      i++; // consume the apartment we merged into
    } else {
      out.push(a);
    }
  }
  return out;
}

// Pick a font-size tier based on the max digit-count present in a cell, so that
// "1|3" can be larger than "33|35" can be larger than "122|124", with each
// number sitting comfortably inside its notch with clear separation.
function digitTier(maxLen) {
  if (maxLen <= 1) return 'tier-s';
  if (maxLen <= 2) return 'tier-m';
  if (maxLen <= 3) return 'tier-l';
  return 'tier-xl';
}

// Build the list of physical "cells" (notches) for a section.
// Each cell carries a `width` measured in standard notches.
// Apartment addresses are split into segments of up to 10 units each, so the
// parent house number can repeat along the strip (one "72" every ~10 units).
function layoutSection(section) {
  const cells = [];
  const mode = section.notchMode;            // 'double' | 'single'
  const perNotch = mode === 'double' ? 2 : 1;
  const MAX_UNITS_PER_SEG = 10;
  const addrs = mergeConsecutiveAddresses(section.addresses); // v0.4: merge consecutive duplicates
  let i = 0;
  while (i < addrs.length) {
    const a = addrs[i];
    const hasUnits = a.units && a.units.length > 0;
    if (hasUnits) {
      // Split into segments of <= MAX_UNITS_PER_SEG units so the address number
      // repeats roughly every 10 units along the strip.
      const numSegments = Math.max(1, Math.ceil(a.units.length / MAX_UNITS_PER_SEG));
      const baseSize = Math.ceil(a.units.length / numSegments);
      let consumed = 0;
      for (let seg = 0; seg < numSegments; seg++) {
        const segUnits = a.units.slice(consumed, consumed + baseSize);
        consumed += segUnits.length;
        if (!segUnits.length) break;
        const width = Math.max(1, Math.ceil(segUnits.length / perNotch));
        cells.push({
          kind: 'apt',
          address: a,
          units: segUnits,
          unitStartIndex: consumed - segUnits.length,
          width,
          segIndex: seg,
          segCount: numSegments,
          tier: digitTier(String(a.number || '').length),
        });
      }
      i++;
    } else {
      if (mode === 'double'
          && i + 1 < addrs.length
          && !(addrs[i+1].units && addrs[i+1].units.length > 0)) {
        const b = addrs[i+1];
        cells.push({
          kind: 'pair',
          addresses: [a, b],
          width: 1,
          tier: digitTier(Math.max(String(a.number || '').length, String(b.number || '').length)),
        });
        i += 2;
      } else {
        cells.push({
          kind: 'single',
          address: a,
          width: 1,
          tier: digitTier(String(a.number || '').length),
        });
        i++;
      }
    }
  }
  return cells;
}

function sectionNotchCount(section) {
  return layoutSection(section).reduce((sum, c) => sum + (c.width || 1), 0);
}

// Sum of notches across every section in a strip (sub-side). Used to enforce
// the 60-notch hard cap.
function stripNotchCount(strip) {
  if (!strip || !strip.sections) return 0;
  return strip.sections.reduce((sum, sec) => sum + sectionNotchCount(sec), 0);
}

// ============== PACK ENGINE (auto-optimise & bulk-create) ==============
// Notch count for an arbitrary list of addresses in a given mode (reuses the
// real layout engine so pairing / apartment segmentation / merge all match).
function notchesOfPart(mode, addrs) {
  return sectionNotchCount({ notchMode: mode || 'double', addresses: addrs });
}

// Deep-clone an address list, giving every address + unit a fresh id so split
// halves never share ids.
function cloneAddressesDeep(addrs) {
  return (addrs || []).map(a => ({
    id: uid('a'),
    number: a.number,
    noJunkMail: !!a.noJunkMail,
    isCommercial: !!a.isCommercial,
    units: (a.units || []).map(u => ({
      id: uid('u'),
      label: u.label,
      _empty: u._empty === true || undefined,
      noJunkMail: !!u.noJunkMail,
      isCommercial: !!u.isCommercial,
    })),
  }));
}

// Build a fresh section carrying part of a source section's addresses.
function makeSectionFromPart(src, addrs) {
  return {
    id: uid('sec'),
    label: src.label || '',
    color: src.color || (DEFAULT_PALETTE[0] && DEFAULT_PALETTE[0].bg) || '#888888',
    textColor: src.textColor || 'auto',
    notchMode: src.notchMode || 'double',
    addresses: cloneAddressesDeep(addrs),
  };
}

// Notch width of an apartment carrying just `units` (reuses the real layout so
// the 10-per-segment rule and per-notch packing match exactly).
function aptUnitNotches(mode, units) {
  return notchesOfPart(mode, [{ number: 'X', units: units }]);
}

// Split an apartment's units so the leading chunk fits in `room` notches, taken
// in whole-notch increments (perNotch units each). Returns { headUnits, tailUnits }
// or null if a clean split isn't possible / worthwhile.
function splitApartmentForRoom(a, mode, room) {
  const per = mode === 'double' ? 2 : 1;
  const units = a.units || [];
  if (room < 1 || units.length <= per) return null;
  let take = Math.min(units.length, room * per);
  if (take % per !== 0 && take < units.length) take -= (take % per);
  while (take >= per && aptUnitNotches(mode, units.slice(0, take)) > room) take -= per;
  if (take < per || take >= units.length) return null;
  return { headUnits: units.slice(0, take), tailUnits: units.slice(take) };
}

// Greedily pack an ordered list of source sections into sub-sides of <= cap
// notches, filling every sub EXCEPT the last to the cap. A section that doesn't
// fit is split at an address boundary; an apartment that still leaves the sub
// short is split at a UNIT boundary (whole notches) so subs fill to exactly the
// cap. Remainders continue as same-label / same-number entries in the next sub.
// Returns an array of { sections: [...] }.
function packSectionsIntoSubs(flatSections, cap = MAX_NOTCHES) {
  const subs = [];
  let cur = { sections: [] };
  let used = 0;
  const closeSub = () => { subs.push(cur); cur = { sections: [] }; used = 0; };
  const placeApt = (src, addr, units) => {
    const a2 = Object.assign({}, addr, { units });
    cur.sections.push(makeSectionFromPart(src, [a2]));
    used += notchesOfPart(src.notchMode, [a2]);
  };

  for (const src of flatSections) {
    let queue = (src.addresses || []).slice();
    while (queue.length) {
      const room = cap - used;
      if (room <= 0) { closeSub(); continue; }
      // Largest prefix of whole addresses that fits `room` notches.
      let k = 0;
      for (let t = 1; t <= queue.length; t++) {
        if (notchesOfPart(src.notchMode, queue.slice(0, t)) <= room) k = t;
        else break;
      }
      if (k > 0) {
        const part = queue.slice(0, k);
        cur.sections.push(makeSectionFromPart(src, part));
        used += notchesOfPart(src.notchMode, part);
        queue = queue.slice(k);
        if (!queue.length) break;               // section done; next src may share this sub
        // Leftover with room to spare: squeeze the next apartment in unit-wise.
        const room2 = cap - used;
        const next = queue[0];
        if (room2 >= 1 && next.units && next.units.length) {
          const sp = splitApartmentForRoom(next, src.notchMode, room2);
          if (sp) {
            placeApt(src, next, sp.headUnits);
            queue = [Object.assign({}, next, { units: sp.tailUnits })].concat(queue.slice(1));
          }
        }
        closeSub();
        continue;
      }
      // k === 0: the first address alone exceeds `room`.
      const a = queue[0];
      if (cur.sections.length > 0 && a.units && a.units.length) {
        const sp = splitApartmentForRoom(a, src.notchMode, room);
        if (sp) {
          placeApt(src, a, sp.headUnits);
          queue = [Object.assign({}, a, { units: sp.tailUnits })].concat(queue.slice(1));
          closeSub();
          continue;
        }
      }
      if (cur.sections.length === 0) {
        // Oversized single address (e.g. a huge apartment) - place it whole so
        // we always make progress, then start fresh.
        cur.sections.push(makeSectionFromPart(src, [a]));
        used += notchesOfPart(src.notchMode, [a]);
        queue = queue.slice(1);
        closeSub();
      } else {
        closeSub();
      }
    }
  }
  if (cur.sections.length) subs.push(cur);
  return subs;
}

// Merge consecutive addresses that are the SAME apartment number split into
// separate entries (e.g. "8" units 1–4 then "8" units 5–BC) into one apartment,
// so the optimiser sees the whole unit list and can split it cleanly at notch
// boundaries. Bare numbers and differing numbers are left untouched.
function mergeAdjacentApartments(addrs) {
  const out = [];
  for (const a of (addrs || [])) {
    const prev = out[out.length - 1];
    const aApt = a.units && a.units.length;
    const pApt = prev && prev.units && prev.units.length;
    if (prev && pApt && aApt && String(prev.number).trim().toUpperCase() === String(a.number).trim().toUpperCase()) {
      prev.units = prev.units.concat(a.units);
    } else {
      out.push(Object.assign({}, a, { units: (a.units || []).slice() }));
    }
  }
  return out;
}

// Ordered list of a side's sections, flattened across its subs (sub order, then
// section order within each sub). Consecutive sections that share a label AND
// notch mode are coalesced into one run - this fixes a street being split into
// two boxes with mismatched text colours after an optimise (the first section's
// colour / text colour / mode win). Returns fresh, mutable section objects.
function flattenSideSections(side) {
  const flat = [];
  const subNums = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
  for (const sn of subNums) {
    const sub = side.subSides[String(sn)];
    for (const sec of (sub.sections || [])) flat.push(sec);
  }
  const out = [];
  for (const sec of flat) {
    const prev = out[out.length - 1];
    if (prev && normLabel(prev.label) === normLabel(sec.label) && (prev.notchMode || 'double') === (sec.notchMode || 'double')) {
      prev.addresses = prev.addresses.concat(sec.addresses || []);
    } else {
      out.push({
        label: sec.label, color: sec.color, textColor: sec.textColor,
        notchMode: sec.notchMode, addresses: (sec.addresses || []).slice(),
      });
    }
  }
  // Within each coalesced run, fuse same-number apartment fragments.
  for (const sec of out) sec.addresses = mergeAdjacentApartments(sec.addresses);
  return out;
}

// Re-balance one side so every sub but the last is filled to the cap. Returns a
// summary { beforeSubs, afterSubs }. Caller is responsible for snapshotting undo.
function optimiseSide(wccCode, roundNum, sideLetter) {
  const side = ensureSide(wccCode, roundNum, sideLetter);
  const flat = flattenSideSections(side);
  const beforeSubs = Object.keys(side.subSides).length;
  const packed = packSectionsIntoSubs(flat);
  side.subSides = {};
  packed.forEach((sub, i) => {
    side.subSides[String(i + 1)] = { number: i + 1, sections: sub.sections };
  });
  saveState();
  return { beforeSubs, afterSubs: packed.length };
}

// ============== UNDO (single-level snapshot for risky bulk ops) ==============
let UndoSnapshot = null; // { json, desc, time }
function snapshotUndo(desc) {
  UndoSnapshot = { json: JSON.stringify(State), desc, time: Date.now() };
}
function rollbackUndo(onDone) {
  if (!UndoSnapshot) { toast('Nothing to roll back', 'warn'); return; }
  try {
    State = migrate(JSON.parse(UndoSnapshot.json));
  } catch (e) {
    toast('Roll back failed - the snapshot was unreadable', 'danger');
    return;
  }
  UndoSnapshot = null;
  saveState();
  toast('Rolled back to the state before the change', 'good');
  if (typeof onDone === 'function') onDone();
}

// ============== COLOUR CONSISTENCY (REVIEW page) ==============
// Normalise a street label for grouping ("Kiewa St " === "KIEWA ST").
function normLabel(s) { return String(s || '').trim().toUpperCase(); }

// Within ONE round, find street labels that are drawn in more than one colour.
// Scope is deliberately the round only - never global / across WCCs. Returns
// [{ label, colors: [hex…], count }].
function scanColorConflicts(round) {
  const map = {}; // label -> { colors:Set, count }
  for (const sl of ['A', 'B', 'C', 'D']) {
    const side = round.sides[sl];
    if (!side) continue;
    for (const sub of Object.values(side.subSides)) {
      for (const sec of (sub.sections || [])) {
        const lab = normLabel(sec.label);
        if (!lab || !(sec.addresses || []).length) continue;
        if (!map[lab]) map[lab] = { colors: new Set(), count: 0 };
        map[lab].colors.add(String(sec.color || '').toLowerCase());
        map[lab].count++;
      }
    }
  }
  const out = [];
  for (const [label, info] of Object.entries(map)) {
    if (info.colors.size > 1) out.push({ label, colors: [...info.colors], count: info.count });
  }
  return out;
}

// Paint every section whose label matches `label` (within this round) the same
// colour. Caller snapshots undo. Returns how many sections were changed.
function applyLabelColor(round, label, color) {
  let changed = 0;
  const target = normLabel(label);
  for (const sl of ['A', 'B', 'C', 'D']) {
    const side = round.sides[sl];
    if (!side) continue;
    for (const sub of Object.values(side.subSides)) {
      for (const sec of (sub.sections || [])) {
        if (normLabel(sec.label) === target && String(sec.color || '').toLowerCase() !== String(color).toLowerCase()) {
          sec.color = color;
          changed++;
        }
      }
    }
  }
  saveState();
  return changed;
}

// ============== COLOUR UTILITIES & WHEEL ==============
function hexToRgb(hex) {
  let c = String(hex || '').replace('#', '');
  if (c.length === 3) c = c.split('').map(x => x + x).join('');
  c = c.padEnd(6, '0').slice(0, 6);
  return [parseInt(c.slice(0, 2), 16), parseInt(c.slice(2, 4), 16), parseInt(c.slice(4, 6), 16)];
}
function rgbArrToHex(r, g, b) {
  const h2 = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
  return '#' + h2(r) + h2(g) + h2(b);
}
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let h = 0;
  if (d) {
    if (mx === r) h = ((g - b) / d) % 6;
    else if (mx === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60; if (h < 0) h += 360;
  }
  return { h, s: mx ? d / mx : 0, v: mx };
}
function hsvToRgb(h, s, v) {
  const c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
  let r = 0, g = 0, b = 0;
  if (h < 60)       { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else              { r = c; b = x; }
  return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
}
// Do two colours read as "too similar" side-by-side? Same hue family at any
// ---- Colour-blindness simulation (Coblis-style matrices on sRGB) ----
function simulateCB(rgb, type) {
  const [r, g, b] = rgb;
  let m;
  if (type === 'deut')      m = [0.625, 0.375, 0,    0.70, 0.30, 0,    0,    0.30, 0.70];
  else if (type === 'prot') m = [0.567, 0.433, 0,    0.558, 0.442, 0,   0,    0.242, 0.758];
  else if (type === 'trit') m = [0.95, 0.05, 0,      0,    0.433, 0.567, 0,   0.475, 0.525];
  else return [r, g, b];
  return [
    m[0]*r + m[1]*g + m[2]*b,
    m[3]*r + m[4]*g + m[5]*b,
    m[6]*r + m[7]*g + m[8]*b,
  ];
}
// Perceptual-ish distance between two hex colours that also accounts for how
// they look to people with deuteranopia / protanopia / tritanopia - we take the
// WORST (smallest) separation across normal + simulated vision, so a pair that
// collapses for any common colour-blindness type is treated as close. 0..~441.
function cbDistance(a, b) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  let worst = Infinity;
  for (const t of ['normal', 'deut', 'prot', 'trit']) {
    const sa = simulateCB(ra, t), sb = simulateCB(rb, t);
    const d = Math.hypot(sa[0]-sb[0], sa[1]-sb[1], sa[2]-sb[2]);
    if (d < worst) worst = d;
  }
  return worst;
}
// Two colours "clash" (read as the same) if they stay close under some common
// colour-blindness type - used for the review conflict warning.
function coloursClash(a, b) {
  if (!a || !b) return false;
  return cbDistance(a, b) < 70;
}

// A compact, colour-blind-friendly qualitative palette (Okabe–Ito + a few Paul
// Tol additions). Ordered so sequential picks are far apart. These are the
// colours the auto-recolour draws from; the manual swatch palette is unchanged.
const CB_PALETTE = [
  '#E69F00', // orange
  '#0072B2', // blue
  '#009E73', // bluish green
  '#CC79A7', // reddish purple
  '#F0E442', // yellow
  '#D55E00', // vermillion
  '#56B4E9', // sky blue
  '#117733', // dark green
  '#882255', // wine
  '#88CCEE', // light cyan
  '#DDCC77', // sand
  '#AA4499', // purple
  '#999999', // grey
  '#44AA99', // teal
];

// Auto-recolour every street in a round for MAXIMUM visual separation, including
// for colour-blind viewers. Walks the strip in delivery order; each new street
// takes the least-used palette colour that is most distinct (CB-aware) from its
// neighbours, so adjacent streets never look alike and colours spread widely
// across the whole round. Caller snapshots undo. Returns streets recoloured.
function assignDistinctColors(round) {
  const order = [];
  for (const sl of ['A', 'B', 'C', 'D']) {
    const side = round.sides[sl];
    if (!side) continue;
    const subNums = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
    for (const sn of subNums) {
      for (const sec of (side.subSides[String(sn)].sections || [])) {
        const lab = normLabel(sec.label);
        if (lab) order.push(lab);
      }
    }
  }
  const assigned = {};                       // label -> hex
  const useCount = {};                        // hex(lower) -> times used
  CB_PALETTE.forEach(c => useCount[c.toLowerCase()] = 0);
  let prev = null, prev2 = null;
  for (const lab of order) {
    let color = assigned[lab];
    if (!color) {
      // Lowest penalty wins. Re-using a colour costs some points, but sitting too
      // close to a neighbour (especially the immediate one) costs far more - so a
      // clear, well-separated colour beats a never-used-but-similar one.
      let best = null, bestPenalty = Infinity;
      for (const c of CB_PALETTE) {
        if (prev && c.toLowerCase() === prev.toLowerCase()) continue; // never repeat the immediate neighbour
        const used = useCount[c.toLowerCase()] || 0;
        let penalty = used * 400;
        if (prev)  penalty += Math.max(0, 95 - cbDistance(c, prev)) * 30;
        if (prev2) penalty += Math.max(0, 70 - cbDistance(c, prev2)) * 8;
        if (penalty < bestPenalty) { bestPenalty = penalty; best = c; }
      }
      color = best || CB_PALETTE[0];
      assigned[lab] = color;
    }
    useCount[color.toLowerCase()] = (useCount[color.toLowerCase()] || 0) + 1;
    prev2 = prev; prev = color;
  }
  let n = 0;
  for (const [label, color] of Object.entries(assigned)) {
    applyLabelColor(round, label, color);
    n++;
  }
  return n;
}

// A hexagon-masked HSV colour wheel + value slider + hex field. `onChange(hex)`
// fires live as the user picks. Returns the wrapper element.
function buildColorWheel(initialHex, onChange) {
  const SIZE = 168, R = SIZE / 2;
  const canvas = h('canvas', {
    width: String(SIZE), height: String(SIZE), class: 'cw-canvas',
    tabindex: '0', role: 'application',
    'aria-label': 'Colour wheel. Use left and right arrows to change hue, up and down to change saturation, and Page Up / Page Down for brightness.',
  });
  const ctx = canvas.getContext('2d');
  let { h: hue, s: sat, v: val } = rgbToHsv(...hexToRgb(initialHex || '#888888'));
  const marker = h('div', { class: 'cw-marker' });
  const swatch = h('div', { class: 'cw-swatch', 'aria-hidden': 'true' });
  const valInput = h('input', { type: 'range', min: '0', max: '100', value: String(Math.round(val * 100)), class: 'cw-val', 'aria-label': 'Brightness' });
  const hexInput = h('input', { class: 'input mono cw-hex', maxlength: '7', value: (initialHex || '#888888').toUpperCase(), 'aria-label': 'Hex colour value' });

  const drawWheel = () => {
    const img = ctx.createImageData(SIZE, SIZE);
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const dx = x - R, dy = y - R;
        const r = Math.min(1, Math.sqrt(dx * dx + dy * dy) / R);
        let hh = Math.atan2(dy, dx) * 180 / Math.PI; if (hh < 0) hh += 360;
        const [rr, gg, bb] = hsvToRgb(hh, r, val);
        const i = (y * SIZE + x) * 4;
        img.data[i] = rr; img.data[i + 1] = gg; img.data[i + 2] = bb; img.data[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  };
  const positionMarker = () => {
    const rad = sat * R, ang = hue * Math.PI / 180;
    marker.style.left = (R + rad * Math.cos(ang)) + 'px';
    marker.style.top  = (R + rad * Math.sin(ang)) + 'px';
  };
  const currentHex = () => rgbArrToHex(...hsvToRgb(hue, sat, val));
  const emit = () => {
    const hex = currentHex();
    swatch.style.background = hex;
    hexInput.value = hex.toUpperCase();
    canvas.setAttribute('aria-label',
      `Colour wheel, current colour ${hex.toUpperCase()}. Arrow keys change hue and saturation; Page Up / Page Down change brightness.`);
    if (typeof onChange === 'function') onChange(hex);
  };
  const refresh = (redraw) => { if (redraw) drawWheel(); positionMarker(); emit(); };

  const pick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const dx = (e.clientX - rect.left) - R, dy = (e.clientY - rect.top) - R;
    let hh = Math.atan2(dy, dx) * 180 / Math.PI; if (hh < 0) hh += 360;
    hue = hh; sat = Math.min(1, Math.sqrt(dx * dx + dy * dy) / R);
    refresh(false);
  };
  canvas.addEventListener('mousedown', (e) => {
    pick(e);
    const move = (ev) => pick(ev);
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  });
  // Keyboard operation (WCAG 2.1.1): arrows = hue/saturation, PageUp/Down = brightness.
  canvas.addEventListener('keydown', (e) => {
    let redraw = false, handled = true;
    if (e.key === 'ArrowLeft')       hue = (hue + 354) % 360;
    else if (e.key === 'ArrowRight') hue = (hue + 6) % 360;
    else if (e.key === 'ArrowUp')    sat = Math.min(1, sat + 0.06);
    else if (e.key === 'ArrowDown')  sat = Math.max(0, sat - 0.06);
    else if (e.key === 'PageUp')   { val = Math.min(1, val + 0.06); valInput.value = String(Math.round(val * 100)); redraw = true; }
    else if (e.key === 'PageDown') { val = Math.max(0, val - 0.06); valInput.value = String(Math.round(val * 100)); redraw = true; }
    else handled = false;
    if (handled) { e.preventDefault(); refresh(redraw); }
  });
  valInput.addEventListener('input', () => { val = (parseInt(valInput.value, 10) || 0) / 100; refresh(true); });
  hexInput.addEventListener('change', () => {
    if (/^#?[0-9a-fA-F]{6}$/.test(hexInput.value.trim())) {
      const hx = hexInput.value.trim().replace(/^#?/, '#');
      ({ h: hue, s: sat, v: val } = rgbToHsv(...hexToRgb(hx)));
      valInput.value = String(Math.round(val * 100));
      refresh(true);
    }
  });

  const wrap = h('div', { class: 'cw-wrap' }, [
    h('div', { class: 'cw-stage' }, [canvas, marker]),
    h('div', { class: 'cw-controls' }, [
      h('label', { class: 'cw-lab' }, 'Brightness'),
      valInput,
      h('div', { class: 'cw-hexrow' }, [swatch, hexInput]),
    ]),
  ]);
  setTimeout(() => refresh(true), 0); // canvas needs to be in the DOM-ish; draw next tick
  return wrap;
}

// ============== ISSUE SCANNER (REVIEW page) ==============
// Walk every WCC → round → side → sub and collect outstanding issues:
//   incomplete  - a non-last sub below the 60-notch cap
//   overcap     - a sub above the cap
//   empty       - a sub with no sections / addresses
//   untitled    - a section with no street label
// Each round entry also carries `colorConflicts` (same-name streets in clashing
// colours, round-scoped).
function scanIssues() {
  const rounds = [];
  const wccCodes = Object.keys(State.wccs).sort();
  for (const wc of wccCodes) {
    const w = State.wccs[wc];
    const roundNums = Object.keys(w.rounds).sort();
    for (const rn of roundNums) {
      const r = w.rounds[rn];
      const issues = [];
      // Team metadata checks (round-level).
      const team = r.teamId ? w.teams[r.teamId] : null;
      if (!team) {
        issues.push({ kind: 'noteam', side: '', sub: '', label: 'Round is not assigned to a team' });
      } else if (!String(team.leaderEmail || '').trim() && !String(team.leaderName || '').trim()) {
        issues.push({ kind: 'noteam', side: '', sub: '', label: `Team "${team.name}" has no leader set` });
      }
      const sideLetters = ['A', 'B', 'C', 'D'].filter(l => r.sides[l]);
      for (const sl of sideLetters) {
        const side = r.sides[sl];
        const subNums = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
        subNums.forEach((sn, idx) => {
          const sub = side.subSides[String(sn)];
          const isLast = idx === subNums.length - 1;
          const notches = stripNotchCount(sub);
          const hasContent = (sub.sections || []).some(s => (s.addresses || []).length);
          if (!hasContent) {
            issues.push({ kind: 'empty', side: sl, sub: sn, label: `Sub ${sl}${sn} is empty` });
          } else {
            if (notches > MAX_NOTCHES) {
              issues.push({ kind: 'overcap', side: sl, sub: sn, label: `Sub ${sl}${sn} is over the cap (${notches}/${MAX_NOTCHES})` });
            } else if (!isLast && notches < MAX_NOTCHES) {
              issues.push({ kind: 'incomplete', side: sl, sub: sn, label: `Sub ${sl}${sn} is incomplete (${notches}/${MAX_NOTCHES})` });
            }
          }
          for (const sec of (sub.sections || [])) {
            if ((sec.addresses || []).length && !String(sec.label || '').trim()) {
              issues.push({ kind: 'untitled', side: sl, sub: sn, label: `Sub ${sl}${sn} has an untitled section` });
            }
          }
        });
      }
      const colorConflicts = scanColorConflicts(r);
      if (issues.length || colorConflicts.length) {
        rounds.push({ wccCode: wc, roundNum: rn, roundLabel: r.label || '', issues, colorConflicts });
      }
    }
  }
  return rounds;
}

// ============== RENDER: BROWSE (search-first dashboard) ==============
// Does a round match the current search text? (round number, suburb, team name)
function roundMatches(wcc, r, q) {
  if (!q) return true;
  const team = (wcc.teams[r.teamId] && wcc.teams[r.teamId].name) || '';
  return [String(r.number), r.label || '', team].some(s => s.toUpperCase().includes(q));
}
function wccMatches(wcc, q) {
  if (!q) return true;
  if ((wcc.code + ' ' + (wcc.label || '')).toUpperCase().includes(q)) return true;
  return Object.values(wcc.rounds).some(r => roundMatches(wcc, r, q));
}

function renderBrowse() {
  const root = $('#app-root');
  root.innerHTML = '';
  if (!UI.browse) UI.browse = { search: '', expanded: {} };
  const q = (UI.browse.search || '').trim().toUpperCase();

  const wccCodes = Object.keys(State.wccs).sort();
  const stripCount = wccCodes.reduce((acc, c) => {
    for (const r of Object.values(State.wccs[c].rounds)) for (const s of Object.values(r.sides)) acc += Object.keys(s.subSides).length;
    return acc;
  }, 0);

  const visible = wccCodes.filter(c => wccMatches(State.wccs[c], q));

  const searchInput = h('input', {
    class: 'input', type: 'search', value: UI.browse.search || '',
    placeholder: 'Search by WCC code, name, or round number…', 'aria-label': 'Search WCCs and rounds',
    onInput: (e) => {
      UI.browse.search = e.target.value;
      const sl = document.activeElement === e.target;
      renderBrowseList();
      if (sl) { const ni = $('#browse-search'); if (ni) { ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); } }
    },
    id: 'browse-search',
  });

  const page = h('div', { class: 'page' }, [
    h('div', { class: 'page-header' }, [
      h('div', {}, [
        h('h1', { class: 'page-title' }, 'Library'),
        h('p', { class: 'page-subtitle' }, `${wccCodes.length} WCC · ${stripCount} strips`),
      ]),
      h('div', { class: 'actions', style: { display: 'flex', gap: '8px' } }, [
        h('button', { class: 'tbtn ghost', onClick: () => openManageWccModal() }, 'Manage WCCs'),
        h('button', { class: 'tbtn primary', onClick: () => openAddRoundModal() }, '+ New Round'),
      ]),
    ]),
    renderPinBar(),
    h('div', { class: 'browse-search' }, [searchInput]),
    h('div', { id: 'browse-list' }, renderBrowseListInner(visible, q)),
  ]);
  root.appendChild(page);
}

// Re-render only the WCC list + pin bar (used live while typing in search).
function renderBrowseList() {
  const q = (UI.browse.search || '').trim().toUpperCase();
  const visible = Object.keys(State.wccs).sort().filter(c => wccMatches(State.wccs[c], q));
  const listEl = $('#browse-list');
  if (listEl) { listEl.innerHTML = ''; renderBrowseListInner(visible, q).forEach(n => n && listEl.appendChild(n)); }
}

function renderBrowseListInner(visible, q) {
  if (!Object.keys(State.wccs).length) {
    return [h('div', { class: 'browse-empty' }, [
      h('h2', {}, 'Nothing here yet'),
      h('p', {}, 'Create your first round. You\'ll add WCC, Round number, sides and sub-sides.'),
      h('button', { class: 'tbtn primary', onClick: () => openAddRoundModal() }, '+ New Round'),
    ])];
  }
  if (!visible.length) {
    return [h('div', { class: 'browse-empty' }, [h('p', {}, 'No WCCs or rounds match your search.')])];
  }
  return [h('div', { class: 'wcc-list' }, visible.map(c => renderWccCard(State.wccs[c], q)))];
}

// Pinned favourites bar.
function renderPinBar() {

  if (!list.length) return h('div', { class: 'pin-bar empty' }, [h('span', { class: 'pin-hint' }, '☆ Pin a WCC or round for quick access')]);
  return h('div', { class: 'pin-bar' }, [

      return h('span', { class: 'pin-chip' }, [

          UI.browse.search = p.round != null ? String(p.round) : p.wcc;
          UI.browse.expanded[p.wcc] = true;
          renderBrowse();
        } }, label),
        h('button', { class: 'pin-x', title: 'Unpin', onClick: () => { togglePin(p.wcc, p.round); renderBrowse(); } }, '×'),

}

function renderWccCard(wcc, q = '') {
  const expanded = !!UI.browse.expanded[wcc.code] || !!q;   // searching auto-expands
  const roundCount = Object.keys(wcc.rounds).length;
  const teamCount = Object.keys(wcc.teams || {}).length;
  const overCap = Object.values(wcc.rounds).some(r => roundHasOvercap(r));

  const head = h('div', { class: 'wcc-head' }, [
    h('button', { class: 'wcc-caret', title: expanded ? 'Collapse' : 'Expand',
      onClick: () => { UI.browse.expanded[wcc.code] = !expanded; renderBrowse(); } }, expanded ? '▾' : '▸'),
    h('span', { class: 'wcc-code' }, 'WCC ' + wcc.code),
    wcc.label ? h('span', { class: 'wcc-label' }, '· ' + wcc.label) : null,
    h('span', { class: 'wcc-counts' }, `${teamCount} team${teamCount === 1 ? '' : 's'} · ${roundCount} round${roundCount === 1 ? '' : 's'}`),
    overCap ? h('span', { class: 'round-overcap-flag', title: 'A sub in this WCC is over the cap', style: { cursor: 'default' } }, ['⚠', ' OVER CAP']) : null,
    h('button', { class: 'pin-star', title: isPinned(wcc.code, null) ? 'Unpin WCC' : 'Pin WCC',
      onClick: (e) => { e.stopPropagation(); togglePin(wcc.code, null); renderBrowse(); } }, isPinned(wcc.code, null) ? '★' : '☆'),
    h('div', { class: 'actions' }, [
      h('button', { class: 'tbtn ghost', onClick: () => openManageTeamsModal(wcc.code) }, 'Teams'),
      h('button', { class: 'tbtn ghost', onClick: () => openAddRoundModal(wcc.code) }, '+ Round'),
      h('button', { class: 'tbtn ghost', onClick: () => openEditWccModal(wcc.code) }, 'Edit'),
      h('button', { class: 'tbtn ghost', onClick: () => confirmDelete('WCC ' + wcc.code, () => { delete State.wccs[wcc.code]; saveState(); renderBrowse(); }) }, 'Delete'),
    ]),
  ]);

  if (!expanded) return h('div', { class: 'wcc-card collapsed' }, [head]);

  // Group rounds by team (only teams that have matching rounds when searching).
  const teamIds = Object.keys(wcc.teams || {});
  const body = h('div', { class: 'wcc-body' }, teamIds.map(tid => {
    const team = wcc.teams[tid];
    const rounds = Object.values(wcc.rounds).filter(r => r.teamId === tid && roundMatches(wcc, r, q))
      .sort((a, b) => String(a.number).localeCompare(String(b.number)));
    if (!rounds.length) return null;
    return h('div', { class: 'team-group' }, [
      h('div', { class: 'team-head' }, [
        h('span', { class: 'team-name' }, team.name || 'TEAM'),

          team.leaderName ? team.leaderName : 'Leader',
          team.leaderEmail ? h('a', { class: 'team-link', href: 'mailto:' + team.leaderEmail, onClick: (e) => e.stopPropagation() }, ' ✉') : null,
          team.leaderMobile ? h('a', { class: 'team-link', href: 'tel:' + team.leaderMobile.replace(/\s/g, ''), onClick: (e) => e.stopPropagation() }, ' ☎ ' + team.leaderMobile) : null,
        ]) : h('span', { class: 'team-leader missing', title: 'No team leader set' }, '⚠ no leader set'),
        h('button', { class: 'tbtn ghost', style: { marginLeft: 'auto' }, onClick: () => openManageTeamsModal(wcc.code) }, 'Edit team'),
      ]),
      h('div', { class: 'round-list' }, rounds.map(r => renderRoundBlock(wcc, r))),
    ]);
  }));

  return h('div', { class: 'wcc-card' }, [head, body]);
}

// Does any sub anywhere in this round exceed the notch cap?
function roundHasOvercap(round) {
  for (const sl of ['A', 'B', 'C', 'D']) {
    const side = round.sides[sl];
    if (!side) continue;
    for (const sub of Object.values(side.subSides)) {
      if (stripNotchCount(sub) > MAX_NOTCHES) return true;
    }
  }
  return false;
}

function renderRoundBlock(wcc, round) {
