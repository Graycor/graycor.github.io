<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STRIPMAKER · Sequence Strip Builder · v0.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   STRIPMAKER · v0.5
   Single-file web app for building Australia Post sequence strips.
   ========================================================================= */

:root {
  --bg:           #0b0b0c;
  --surface:      #141416;
  --surface-2:    #1b1b1f;
  --surface-3:    #232328;
  --surface-4:    #2c2c32;
  --border:       #2a2a30;
  --border-strong:#3a3a42;
  --text:         #ececec;
  --text-muted:   #9396a0;
  --text-dim:     #5a5a64;
  --accent:       #e5302b;
  --accent-soft:  rgba(229,48,43,0.14);
  --accent-strong:#ff423c;
  --good:         #4ade80;
  --warn:         #f59e0b;
  --danger:       #ef4444;

  --paper:        #f3eee0;
  --paper-text:   #1d1a14;
  --paper-line:   #b8ad94;
  --paper-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.06);

  --ff-sans: 'Funnel Sans', system-ui, -apple-system, sans-serif;
  --ff-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

  --notch-w: 32px;
  --strip-h: 78px;
  --strip-num-h: 36px;
  --strip-unit-h: 18px;
  --strip-label-h: 24px;

  --radius: 6px;
  --radius-sm: 4px;
  --shadow: 0 4px 18px rgba(0,0,0,0.35);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--ff-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overflow-x: hidden;
}

button {
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* -------------------------------------------------------------------------
   TOPBAR
   ------------------------------------------------------------------------- */
.topbar {
  display: flex;
  align-items: center;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  gap: 22px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--ff-mono);
  user-select: none;
}
.brand-mark {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: -0.05em;
}
.brand-name {
  font-weight: 600;
  letter-spacing: 0.08em;
  font-size: 13px;
}
.brand-version {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.topnav {
  display: flex;
  gap: 2px;
  margin-left: 12px;
}
.topnav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: background 0.12s, color 0.12s;
}
.topnav button:hover {
  color: var(--text);
  background: var(--surface-2);
}
.topnav button.active {
  color: var(--text);
  background: var(--surface-3);
}

.topactions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.tbtn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.tbtn:hover {
  background: var(--surface-3);
  border-color: var(--border-strong);
}
.tbtn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.tbtn.primary:hover {
  background: var(--accent-strong);
  border-color: var(--accent-strong);
}
.tbtn.danger {
  background: transparent;
  border-color: var(--border);
  color: var(--danger);
}
.tbtn.danger:hover {
  background: rgba(239,68,68,0.1);
  border-color: var(--danger);
}
.tbtn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.tbtn.ghost:hover {
  color: var(--text);
  background: var(--surface-2);
}
.tbtn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* -------------------------------------------------------------------------
   PAGE LAYOUT
   ------------------------------------------------------------------------- */
.page {
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px 18px 64px;
}

.page-header {
  margin-bottom: 18px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.page-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
.page-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  margin: 2px 0 0;
  font-family: var(--ff-mono);
}

.section-eyebrow {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin: 0 0 10px;
}

/* -------------------------------------------------------------------------
   BROWSE VIEW
   ------------------------------------------------------------------------- */
.browse-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
}
.browse-toolbar .spacer { flex: 1; }

.browse-empty {
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 56px 24px;
  text-align: center;
  color: var(--text-muted);
}
.browse-empty h2 {
  color: var(--text);
  font-size: 18px;
  margin: 0 0 6px;
}
.browse-empty p { margin: 0 0 18px; }

.wcc-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.wcc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.wcc-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.wcc-code {
  font-family: var(--ff-mono);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
}
.wcc-label {
  color: var(--text-muted);
  font-size: 13px;
}
.wcc-head .actions { margin-left: auto; display: flex; gap: 6px; }

.round-list {
  display: flex;
  flex-direction: column;
}
.round-block {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.round-block:last-child { border-bottom: 0; }
.round-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.round-num {
  font-family: var(--ff-mono);
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.round-label { color: var(--text-muted); font-size: 13px; }
.round-head .actions { margin-left: auto; display: flex; gap: 4px; }

.sides-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}

.side-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.side-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.side-letter {
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-family: var(--ff-mono);
  font-weight: 700;
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.side-label {
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--ff-mono);
}
.side-head .actions { margin-left: auto; display: flex; gap: 4px; }

.subside-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.subside-pill-wrap {
  position: relative;
  display: inline-flex;
}
.sub-remove {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border-strong);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  z-index: 2;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.subside-pill-wrap:hover .sub-remove { display: inline-flex; }
.sub-remove:hover {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}
.subside-add {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.subside-add:hover {
  background: var(--surface-3);
  color: var(--text);
  border-color: var(--border-strong);
}
.subside-pill {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 9px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--text);
  transition: background 0.12s, border-color 0.12s;
}
.subside-pill:hover {
  background: var(--surface-4);
  border-color: var(--border-strong);
}
.subside-pill .sub-id {
  font-weight: 600;
  color: var(--text);
}
.subside-pill.empty {
  color: var(--text-dim);
  border-style: dashed;
}
.subside-pill .sub-empty {
  color: var(--text-dim);
  font-style: italic;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sub-dots {
  display: inline-flex;
  gap: 2px;
  align-items: center;
}
.sub-dot {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  border: 0.5px solid rgba(0,0,0,0.25);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
}
.sub-dot-more {
  font-size: 9px;
  color: var(--text-dim);
  margin-left: 2px;
}

.wcc-contact {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--ff-mono);
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: 11px;
  margin-left: 6px;
  text-decoration: none;
  border: 1px solid transparent;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
a.wcc-contact:hover {
  background: var(--surface-4);
  color: var(--text);
  border-color: var(--border);
}
.wcc-contact .mail-icon { color: var(--accent); font-size: 11px; }

.round-pdo {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--ff-mono);
  letter-spacing: 0.02em;
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: 11px;
  margin-left: 4px;
}
.round-pdo .pdo-icon { color: var(--accent); font-size: 9px; }

/* -------------------------------------------------------------------------
   EDITOR VIEW
   ------------------------------------------------------------------------- */
.editor-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--ff-mono);
  font-size: 13px;
  color: var(--text-muted);
}
.crumbs .sep { color: var(--text-dim); }
.sub-nav { display: inline-flex; gap: 4px; }
.crumbs .current { color: var(--text); font-weight: 600; }
.editor-header .actions { margin-left: auto; display: flex; gap: 6px; }

.zoom-control {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}
.zoom-control button {
  background: transparent;
  border: 0;
  color: var(--text-muted);
  width: 24px; height: 24px;
  border-radius: 3px;
  font-size: 14px;
}
.zoom-control button:hover { background: var(--surface-3); color: var(--text); }
.zoom-control .level {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--text-muted);
  padding: 0 6px;
  min-width: 42px;
  text-align: center;
}

/* -------------------------------------------------------------------------
   STRIP PREVIEW
   ------------------------------------------------------------------------- */
.preview-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 22px;
  overflow: hidden;
}
.preview-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.preview-bar .stats { display: flex; gap: 16px; }
.preview-bar .stat strong { color: var(--text); font-weight: 600; }
.preview-bar .stat.overflow strong { color: var(--danger); }
.preview-bar .stat.near strong { color: var(--warn); }
.preview-bar .over-badge {
  color: var(--danger);
  font-weight: 700;
  margin-left: 2px;
}
.preview-bar .near-badge {
  color: var(--warn);
  font-weight: 600;
  margin-left: 2px;
}
.preview-bar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

.preview-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 22px 18px;
  background:
    radial-gradient(ellipse at top, rgba(255,255,255,0.018), transparent 60%),
    var(--surface);
}

.strip {
  display: inline-flex;
  align-items: stretch;
  min-height: var(--strip-h);
  background: var(--paper);
  border-radius: 2px;
  box-shadow: var(--paper-shadow);
  color: var(--paper-text);
  position: relative;
  overflow: hidden;
}
.strip.is-empty {
  min-width: 600px;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: repeating-linear-gradient(
    45deg,
    var(--paper) 0,
    var(--paper) 12px,
    rgba(0,0,0,0.04) 12px,
    rgba(0,0,0,0.04) 24px
  );
}

.strip-section {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: outline-color 0.12s;
  outline: 2px solid transparent;
  outline-offset: -2px;
}
.strip-section:hover { outline-color: rgba(0,0,0,0.18); }
.strip-section.selected {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  z-index: 2;
}

.strip-section .num-row {
  display: flex;
  flex: 1;
  min-height: var(--strip-num-h);
  align-items: stretch;
}

.notch {
  width: var(--notch-w);
  border-right: 1px solid var(--paper-line);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  position: relative;
  font-family: var(--ff-mono);
  flex-shrink: 0;
  overflow: hidden;
}
.notch:last-child { border-right: 0; }
.notch-numbers {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  line-height: 1;
  padding: 4px 2px 0;
  letter-spacing: -0.01em;
  /* Anchor numbers near the TOP so non-unit notches align with unit-bearing notches' parent number */
  height: 22px;
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}
.notch-numbers .num {
  text-align: center;
  white-space: nowrap;
}

/* Single-address notch: font scales with digit count.
   1-digit "8" is large; 4-digit "1234" still legible. */
.notch-numbers.single.tier-s  { font-size: 16px; }
.notch-numbers.single.tier-m  { font-size: 14px; }
.notch-numbers.single.tier-l  { font-size: 11px; }
.notch-numbers.single.tier-xl { font-size: 9px;  }

/* Pair notch: two numbers side-by-side with a faint divider.
   Smaller font than singles since two numbers must fit. */
.notch-numbers.pair {
  justify-content: space-around;
  padding: 4px 2px 0;
  gap: 4px;
}
.notch-numbers.pair .num {
  position: relative;
}
/* faint vertical separator between paired numbers */
.notch-numbers.pair .num + .num::before {
  content: '';
  position: absolute;
  left: -3px;
  top: 5%;
  height: 90%;
  width: 1px;
  background: currentColor;
  opacity: 0.22;
}
.notch-numbers.pair.tier-s  .num { font-size: 13px; }
.notch-numbers.pair.tier-m  .num { font-size: 11px; }

/* v0.6: paired numbers ALWAYS stay on one line (never stacked/layered).
   These tiers are conservative starting sizes; fitNotchNumbers() then shrinks
   the font further at runtime if a notch is still too narrow, guaranteeing
   both numbers fit side-by-side without overlap. Digits must never clip. */
.notch-numbers.pair {
  flex-wrap: nowrap;
  overflow: hidden;
}
.notch-numbers.pair.tier-l  .num { font-size: 9px; letter-spacing: -0.02em; }
.notch-numbers.pair.tier-xl .num { font-size: 7px; letter-spacing: -0.04em; }

/* Apartment parent number: matches pair-tier sizes so it visually harmonises
   with nearby paired numbers on the strip rather than appearing oversized. */
.notch-numbers.apt {
  font-weight: 700;
}
.notch-numbers.apt.tier-s  { font-size: 13px; }
.notch-numbers.apt.tier-m  { font-size: 11px; }
.notch-numbers.apt.tier-l  { font-size: 9px;  }
.notch-numbers.apt.tier-xl { font-size: 8px;  }

.notch-units {
  display: flex;
  align-items: center;
  height: var(--strip-unit-h);
  border-top: 1px solid rgba(0,0,0,0.18);
  /* No row-level fill: each real unit paints its own light cell, so a blank
     "house number" cell shows the section colour through (matching the strip). */
  background: transparent;
  color: #000;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.01em;
  margin-top: auto;
}
.notch-units .unit {
  flex: 1;
  text-align: center;
  border-right: 1px solid rgba(0,0,0,0.18);
  padding: 1px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  position: relative;
  background: rgba(255,255,255,0.42);
}
.notch-units .unit:last-child { border-right: 0; }
/* Blank "house number" cell — plain, shows the section colour, no fill/hatch. */
.notch-units .unit.empty { background: transparent; }
/* per-unit flag indicators: thin top stripe on the unit cell */
.notch-units .unit.com { box-shadow: inset 0 2px 0 #1e88e5; }
.notch-units .unit.njm { box-shadow: inset 0 2px 0 #424242; }
.notch-units .unit.com.njm {
  box-shadow: inset 2px 2px 0 0 #1e88e5, inset -2px 2px 0 0 #424242;
}

/* Wide notch for an apartment block segment */
.notch-apt {
  /* width set inline */
  border-right: 1px solid var(--paper-line);
}

/* tiny corner flags on a notch (address-level summary) */
.notch-flags {
  position: absolute;
  top: 2px;
  left: 2px;
  display: flex;
  gap: 2px;
  z-index: 1;
}
.notch-flag {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  border: 0.5px solid rgba(0,0,0,0.35);
}
.notch-flag.com { background: #1e88e5; }
.notch-flag.njm { background: #424242; }

.strip-section .label-row {
  height: var(--strip-label-h);
  border-top: 1px solid rgba(0,0,0,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 0 6px;
  overflow: hidden;
  /* min-width:0 lets flex children shrink so the section stays at its natural notch-count width */
  min-width: 0;
}
.strip-section .label-row .label-text {
  /* Centers when it fits; clamps to 100% and shows left side first when overflowing. */
  min-width: 0;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-align: left;
}

.strip-end {
  width: 70px;
  background: var(--paper);
  border-left: 2px solid var(--paper-line);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--paper-text);
  padding: 4px;
  flex-shrink: 0;
}
.strip-end .rnd { font-weight: 600; letter-spacing: 0.04em; }
.strip-end .id  { font-size: 12px; font-weight: 700; margin-top: 2px; color: var(--accent); }

/* -------------------------------------------------------------------------
   INSPECTOR (section editor + addresses)
   ------------------------------------------------------------------------- */
.inspector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.inspector h3 {
  margin: 0 0 4px;
  font-size: 16px;
  font-weight: 600;
}
.inspector .subtitle {
  color: var(--text-muted);
  font-size: 12px;
  margin-bottom: 16px;
  font-family: var(--ff-mono);
  letter-spacing: 0.02em;
}

.inspector-empty {
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  color: var(--text-muted);
}
.inspector-empty p { margin: 0 0 14px; }

.form-row {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.field.grow { flex: 1; min-width: 200px; }
.field label {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.input, .select, .textarea {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 10px;
  font-size: 14px;
  transition: border-color 0.12s, background 0.12s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: 0;
  border-color: var(--accent);
  background: var(--surface-3);
}
.input.mono { font-family: var(--ff-mono); letter-spacing: 0.02em; }
.input.small { padding: 4px 8px; font-size: 13px; }

.toggle-group {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}
.toggle-group button {
  background: transparent;
  border: 0;
  padding: 5px 12px;
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
}
.toggle-group button.active {
  background: var(--surface-4);
  color: var(--text);
}
.toggle-group button:hover:not(.active) {
  color: var(--text);
}

/* Color palette */
.palette {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.swatch {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.1s, border-color 0.12s;
  position: relative;
}
.swatch:hover { transform: scale(1.08); }
.swatch.selected {
  border-color: var(--text);
  box-shadow: 0 0 0 1px var(--bg);
}
.swatch .check {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
}

.hex-input {
  width: 88px;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  font-size: 12px;
}

/* Address list */
.addr-table-wrap {
  margin-top: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.addr-table {
  width: 100%;
  border-collapse: collapse;
}
.addr-table th {
  background: var(--surface-2);
  text-align: left;
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.addr-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.addr-table tr:last-child td { border-bottom: 0; }
.addr-table tr:hover td { background: rgba(255,255,255,0.015); }
.addr-table .col-drag { width: 28px; text-align: center; }
.addr-table .col-num { width: 110px; }
.addr-table .col-units { }
.addr-table .col-flags { width: 270px; }
.addr-table .col-actions { width: 96px; text-align: right; white-space: nowrap; }

.drag-handle {
  display: inline-flex;
  width: 22px;
  height: 22px;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  cursor: grab;
  font-size: 14px;
  letter-spacing: -2px;
  user-select: none;
  border-radius: 4px;
}
.drag-handle:hover { color: var(--text); background: var(--surface-3); }
.drag-handle:active { cursor: grabbing; }
.addr-row.dragging { opacity: 0.4; }
.addr-row.drag-over-above { box-shadow: inset 0 2px 0 var(--accent); }
.addr-row.drag-over-below { box-shadow: inset 0 -2px 0 var(--accent); }

.flag-toggle-row {
  display: inline-flex;
  gap: 4px;
}
.flag-toggle {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 4px 9px;
  border-radius: 11px;
  transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
}
.flag-toggle:hover { color: var(--text); border-color: var(--border-strong); }
.flag-toggle.active {
  background: #424242;
  border-color: #5a5a5a;
  color: #f8f8f8;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 12px rgba(150,150,150,0.18);
}
.flag-toggle.com.active {
  background: #1e88e5;
  border-color: #1976d2;
  color: white;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 14px rgba(30,136,229,0.45);
}
/* partial = some units have the flag, others don't */
.flag-toggle.partial {
  background: linear-gradient(135deg, var(--surface-2) 50%, #424242 50%);
  border-color: #5a5a5a;
  color: #e0e0e0;
}
.flag-toggle.com.partial {
  background: linear-gradient(135deg, var(--surface-2) 50%, #1e88e5 50%);
  border-color: #1976d2;
  color: white;
}

/* unit chips redesigned to hold per-unit flag toggles */
.unit-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.unit-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 4px 2px 9px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
}
.unit-chip.njm { border-color: #5a5a5a; box-shadow: inset 0 0 0 1px #424242; }
.unit-chip.com { border-color: #1976d2; box-shadow: inset 0 0 0 1px #1e88e5; }
.unit-chip.com.njm { box-shadow: inset 0 0 0 1px #1e88e5, inset 0 0 0 2px rgba(66,66,66,0.4); }
.unit-chip .unit-label {
  font-weight: 600;
  color: var(--text);
}
.unit-flag-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: var(--ff-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 4px;
  border-radius: 8px;
  height: 18px;
  line-height: 1;
}
.unit-flag-btn:hover { color: var(--text); background: var(--surface-4); }
.unit-flag-btn.njm-btn.active {
  background: #424242;
  border-color: #5a5a5a;
  color: white;
}
.unit-flag-btn.com-btn.active {
  background: #1e88e5;
  border-color: #1976d2;
  color: white;
}
.unit-remove {
  background: transparent;
  border: 0;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1;
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.unit-remove:hover { color: var(--danger); background: var(--surface-4); }

.addr-table input.input { background: var(--bg); }
.addr-table input.input:focus { background: var(--surface-2); }

.unit-add {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.unit-add .input { width: 50px; font-size: 11px; padding: 3px 6px; }

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.icon-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border); }
.icon-btn.danger:hover { color: var(--danger); border-color: rgba(239,68,68,0.4); }

.addr-add-row {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
}
.addr-add-row .input { background: var(--bg); }

.section-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.section-tab {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.section-tab .dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  border: 1px solid rgba(0,0,0,0.2);
}
.section-tab:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
.section-tab.active {
  background: var(--surface-4);
  color: var(--text);
  border-color: var(--accent);
}

/* -------------------------------------------------------------------------
   MODAL
   ------------------------------------------------------------------------- */
.modal-back {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.14s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 480px;
  width: 100%;
  padding: 22px;
  animation: pop 0.16s ease-out;
}
.modal.wide { max-width: 720px; }
@keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h2 {
  margin: 0 0 4px;
  font-size: 17px;
  font-weight: 600;
}
.modal .subtle {
  color: var(--text-muted);
  font-size: 13px;
  margin: 0 0 18px;
}
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* -------------------------------------------------------------------------
   TOAST
   ------------------------------------------------------------------------- */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  box-shadow: var(--shadow);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.good { border-color: var(--good); }
.toast.warn { border-color: var(--warn); }
.toast.danger { border-color: var(--danger); }
.toast::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  opacity: 0.6;
}
.toast.good::before { background: var(--good); opacity: 1; }
.toast.warn::before { background: var(--warn); opacity: 1; }
.toast.danger::before { background: var(--danger); opacity: 1; }

/* -------------------------------------------------------------------------
   PRINT
   ------------------------------------------------------------------------- */

/* Default @page; overridden dynamically at print time via injected style tag. */
@page {
  size: A4 portrait;
  margin: 15mm;
}

@media print {
  html, body { background: white; }
  /* Default: hide both print roots */
  body > *:not(.print-root):not(.report-root) { display: none !important; }
  .print-root, .report-root { display: none !important; }

  /* When printing a strip */
  body[data-printing="strip"] .print-root { display: block !important; }
  body[data-printing="strip"] .print-root .strip {
    box-shadow: none;
    border-radius: 0;
  }

  /* When printing a report */
  body[data-printing="report"] .report-root { display: block !important; }
}

.print-root, .report-root {
  display: none;
}

/* Print-only sizing (confirmed against physical strip 2026-05-28):
     each notch 14.5mm wide, strip 21mm tall, full strip holder 920mm wide,
     2-notch (29mm) round-end marker (may overhang the holder),
     MAX_NOTCHES = 60 sequence cells (user-imposed cap). */
.print-root .strip {
  --notch-w: 14.5mm;
  --strip-h: 21mm;
  --strip-num-h: 13.5mm;
  --strip-unit-h: 4.5mm;
  --strip-label-h: 7.5mm;
}
.print-root .strip .notch-numbers { height: 9mm; padding: 1mm 0.5mm 0; }
.print-root .strip .notch-numbers.single.tier-s  { font-size: 7mm;   }
.print-root .strip .notch-numbers.single.tier-m  { font-size: 6mm;   }
.print-root .strip .notch-numbers.single.tier-l  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.single.tier-xl { font-size: 4mm;   }
.print-root .strip .notch-numbers.pair.tier-s  .num { font-size: 5.6mm; }
.print-root .strip .notch-numbers.pair.tier-m  .num { font-size: 4.8mm; }
/* v0.6: one-line pairs — sized so two numbers + separator fit inside 14.5mm. */
.print-root .strip .notch-numbers.pair.tier-l  .num { font-size: 3.2mm; letter-spacing: -0.05mm; }
.print-root .strip .notch-numbers.pair.tier-xl .num { font-size: 2.5mm; letter-spacing: -0.1mm; }
.print-root .strip .notch-numbers.pair .num + .num::before { left: -1.5mm; width: 0.2mm; }
.print-root .strip .notch-numbers.apt.tier-s  { font-size: 5.6mm; }
.print-root .strip .notch-numbers.apt.tier-m  { font-size: 4.8mm; }
.print-root .strip .notch-numbers.apt.tier-l  { font-size: 4mm;   }
.print-root .strip .notch-numbers.apt.tier-xl { font-size: 3.4mm; }
.print-root .strip .notch-units { font-size: 3mm; }
.print-root .strip .label-row { font-size: 4mm; }
.print-root .strip-end { width: 29mm; font-size: 3mm; }
.print-root .strip-end .id { font-size: 4.4mm; }

/* v0.6: tiled (cut-section) printing for A4/A3. The strip is broken into
   page-width rows that stack tightly down each sheet, separated only by a thin
   black cut line (no gaps — saves paper and eases cutting). Each piece carries
   a 10mm blank tail at its end for overlap during physical installation. */
.print-root .strip-sheet { break-after: page; page-break-after: always; }
.print-root .strip-sheet:last-child { break-after: auto; page-break-after: auto; }
.print-root .tile-row {
  display: block;
  position: relative;
  margin: 0;
  padding: 0;
  border-bottom: 0.4mm solid #000;
}
.print-root .tile-row:last-child { border-bottom: 0; }
.print-root .tile-row .strip { box-shadow: none; border-radius: 0; }
/* fixed 10mm blank tail at the trailing end of every printed strip piece */
.print-root .tile-end-pad { flex: 0 0 10mm; width: 10mm; align-self: stretch; }

/* -------------------------------------------------------------------------
   REPORT (load-balance PDF)
   ------------------------------------------------------------------------- */
.report-root {
  background: white;
  color: #15140f;
  font-family: var(--ff-sans);
  padding: 0;
}
.report-page {
  background: white;
  color: #15140f;
  padding: 0;
}
.report-h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin: 0 0 4px;
  text-transform: uppercase;
}
.report-sub {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: #6a6962;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin: 0 0 18px;
}
.report-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 22px;
  margin: 14px 0 20px;
  padding: 12px 14px;
  background: #f5f1e6;
  border: 1px solid #ddd5c2;
  border-radius: 6px;
  font-size: 12px;
}
.report-meta .row { display: flex; gap: 8px; align-items: baseline; }
.report-meta .k {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8a8678;
  min-width: 90px;
}
.report-meta .v {
  font-weight: 600;
  color: #1f1d17;
  text-transform: uppercase;
}
.report-section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #6a6962;
  margin: 22px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #ddd5c2;
}
.report-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 14px;
  font-size: 12px;
}
.report-table th {
  text-align: left;
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8a8678;
  padding: 8px 10px;
  border-bottom: 1px solid #ddd5c2;
  background: #faf6ea;
}
.report-table td {
  padding: 8px 10px;
  border-bottom: 1px solid #ebe5d4;
}
.report-table .num {
  font-family: var(--ff-mono);
  text-align: right;
  font-weight: 600;
}
.report-table .delta {
  font-family: var(--ff-mono);
  text-align: right;
  font-size: 11px;
  color: #6a6962;
}
.report-table .delta.high { color: #b3631e; font-weight: 700; }
.report-table .delta.even { color: #4a7036; font-weight: 600; }
.report-table tr.total td {
  background: #f5f1e6;
  font-weight: 700;
  border-top: 1.5px solid #c4ba9e;
}
.report-balance {
  display: flex;
  gap: 12px;
  margin: 6px 0 18px;
}
.report-balance .card {
  flex: 1;
  background: #faf6ea;
  border: 1px solid #ddd5c2;
  border-radius: 6px;
  padding: 10px 12px;
}
.report-balance .card .label {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8a8678;
  margin-bottom: 2px;
}
.report-balance .card .value {
  font-family: var(--ff-mono);
  font-size: 22px;
  font-weight: 700;
  color: #1f1d17;
}
.report-balance .card .sub {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: #6a6962;
  margin-top: 2px;
}
.report-footnote {
  font-size: 10px;
  color: #8a8678;
  font-style: italic;
  margin-top: 14px;
  line-height: 1.5;
}

/* Report shown inside an in-app modal preview */
.report-modal {
  max-width: 880px;
  width: 92vw;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
}
.report-modal h2 { margin: 0; }
.report-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  gap: 12px;
}
.report-preview-scroll {
  flex: 1;
  overflow-y: auto;
  background: white;
  color: #15140f;
  border-radius: 6px;
  padding: 28px 32px;
  border: 1px solid var(--border);
}

/* -------------------------------------------------------------------------
   MISC
   ------------------------------------------------------------------------- */
.hidden { display: none !important; }
.muted { color: var(--text-muted); }
.dim   { color: var(--text-dim); }
.mono  { font-family: var(--ff-mono); }
.kbd {
  font-family: var(--ff-mono);
  font-size: 11px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--text-muted);
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--surface-4); }

/* tiny info banner */
.banner {
  background: linear-gradient(180deg, var(--accent-soft), transparent);
  border: 1px solid rgba(229,48,43,0.3);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 13px;
  margin-bottom: 18px;
  color: var(--text);
}
.banner .label {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-right: 8px;
}

/* -------------------------------------------------------------------------

const MAX_NOTCHES = 60;
const NEAR_LIMIT  = 55;
const STORAGE_KEY = 'stripmaker_db_v1';

const DEFAULT_PALETTE = [

  { name: 'Salmon',     bg: '#f6c8c2' },
  { name: 'Pink',       bg: '#f3b4b9' },

  { name: 'Steel',      bg: '#94b3cf' },
  { name: 'Denim',      bg: '#6b94b8' },

// Convert hex to HSL for color-distance calculations
function hexToHsl(hex) {
  if (!hex || hex[0] !== '#') return [0, 0, 0];
  const c = hex.replace('#', '');
  const fc = c.length === 3 ? c.split('').map(x => x + x).join('') : c.padEnd(6, '0').slice(0, 6);
  const r = parseInt(fc.slice(0,2), 16) / 255;
  const g = parseInt(fc.slice(2,4), 16) / 255;
  const b = parseInt(fc.slice(4,6), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const l = (max + min) / 2;
  let h, s;
  if (max === min) { h = 0; s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: h = ((b - r) / d + 2); break;
      case b: h = ((r - g) / d + 4); break;
    }
    h *= 60;
  }
  return [h, s, l];
}

function colorDistance(a, b) {
  const [h1, s1, l1] = hexToHsl(a);
  const [h2, s2, l2] = hexToHsl(b);
  // Hue is circular
  let dh = Math.abs(h1 - h2);
  if (dh > 180) dh = 360 - dh;
  return dh * 1.0 + Math.abs(s1 - s2) * 60 + Math.abs(l1 - l2) * 40;
}

// Pick a color for a new section: prefer something unused on the strip
// and visually distant from the previous section (so adjacent sections differ).
function pickColorForNewSection(strip) {
  const used = new Set(strip.sections.map(s => s.color.toLowerCase()));
  const prev = strip.sections.length ? strip.sections[strip.sections.length - 1].color : null;
  // First pass: prefer unused colors, ranked by distance from prev
  const unused = DEFAULT_PALETTE.filter(p => !used.has(p.bg.toLowerCase()));
  const pool = unused.length ? unused : DEFAULT_PALETTE;
  if (!prev) return pool[Math.floor(Math.random() * Math.min(8, pool.length))].bg;
  // Score each candidate
  const scored = pool.map(p => ({ bg: p.bg, dist: colorDistance(prev, p.bg) }));
  scored.sort((a, b) => b.dist - a.dist);
  // Pick from the top few most-distant to add a bit of variety
  const top = scored.slice(0, Math.min(5, scored.length));
  return top[Math.floor(Math.random() * top.length)].bg;
}

// ============== STATE ==============
let State = loadState();
let UI = {
  view: 'browse',       // 'browse' | 'editor'
  editor: {
    wccCode: null,
    roundNum: null,
    sideLetter: null,
    subNum: null,
    selectedSectionId: null,
    zoom: 1.0,
  },
  modal: null,
};

// ============== STORAGE ==============
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && typeof s === 'object' && s.wccs) return migrate(s);
    }
  } catch (e) { console.warn('load failed', e); }
  return { version: VERSION, wccs: {}, wccRegistry: {} };
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(State));
  } catch (e) {
    toast('Could not save — storage may be full', 'danger');
  }
}

// Migrate older state objects so newer fields exist with sensible defaults.
function migrate(s) {
  s.version = VERSION;
  // v0.6: standalone WCC registry (a local index of known WCCs, independent of
  // whether any rounds exist yet). Back-fill it from existing round data.
  if (!s.wccRegistry || typeof s.wccRegistry !== 'object') s.wccRegistry = {};
  for (const wcc of Object.values(s.wccs || {})) {
    if (wcc.contactEmail === undefined) wcc.contactEmail = '';
    if (!s.wccRegistry[wcc.code]) {
      s.wccRegistry[wcc.code] = { code: wcc.code, label: wcc.label || '', contactEmail: wcc.contactEmail || '' };
    }
    for (const r of Object.values(wcc.rounds || {})) {
      if (r.pdoName === undefined) r.pdoName = '';
      if (r.pdoAps === undefined)  r.pdoAps  = '';
      for (const side of Object.values(r.sides || {})) {
        for (const sub of Object.values(side.subSides || {})) {
          for (const sec of sub.sections || []) {
            for (const a of sec.addresses || []) {
              if (a.noJunkMail === undefined)  a.noJunkMail  = false;
              if (a.isCommercial === undefined) a.isCommercial = false;
              // v0.3: per-unit flags
              for (const u of a.units || []) {
                if (u.noJunkMail === undefined)  u.noJunkMail  = false;
                if (u.isCommercial === undefined) u.isCommercial = false;
              }
            }
          }
        }
      }
    }
  }
  return s;
}

// ============== HELPERS ==============
function uid(prefix='id') {
  return prefix + '_' + Math.random().toString(36).slice(2, 10);
}
function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return Array.from(root.querySelectorAll(sel)); }

function h(tag, attrs={}, children=[]) {
  if (typeof attrs === 'string' || Array.isArray(attrs) || attrs instanceof Node) {
    children = attrs; attrs = {};
  }
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v === null || v === undefined || v === false) continue;
    if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'dataset' && typeof v === 'object') Object.assign(el.dataset, v);
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), v);
    } else {
      el.setAttribute(k, v === true ? '' : String(v));
    }
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') {
      el.appendChild(document.createTextNode(String(c)));
    } else if (c instanceof Node) {
      el.appendChild(c);
    }
  }
  return el;
}

// Pick black or white text based on background luminance
function autoTextColor(hex) {
  if (!hex || hex[0] !== '#') return '#000';
  const c = hex.replace('#', '');
  const fc = c.length === 3
    ? c.split('').map(x => x + x).join('')
    : c.padEnd(6, '0').slice(0, 6);
  const r = parseInt(fc.slice(0,2), 16) / 255;
  const g = parseInt(fc.slice(2,4), 16) / 255;
  const b = parseInt(fc.slice(4,6), 16) / 255;
  const lin = (v) => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  const L = 0.2126*lin(r) + 0.7152*lin(g) + 0.0722*lin(b);
  return L > 0.55 ? '#000' : '#fff';
}

function getTextColor(section) {
  if (section.textColor && section.textColor !== 'auto') return section.textColor;
  return autoTextColor(section.color);
}

function toast(msg, kind='') {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast show ' + kind;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast ' + kind; }, 2200);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ============== DATA OPS ==============
// ---- WCC registry (local index of known WCCs) ----
function wccRegistry() {
  if (!State.wccRegistry) State.wccRegistry = {};
  return State.wccRegistry;
}
function registerWcc(code, label = '', contactEmail = '') {
  const reg = wccRegistry();
  if (!reg[code]) reg[code] = { code, label, contactEmail };
  else {
    if (label) reg[code].label = label;
    if (contactEmail) reg[code].contactEmail = contactEmail;
  }
  return reg[code];
}
function lookupWccByText(text) {
  const q = String(text || '').trim().toUpperCase();
  if (!q) return null;
  const reg = wccRegistry();
  if (reg[q]) return reg[q];                              // exact code
  const byLabel = Object.values(reg).find(w => (w.label || '').toUpperCase() === q);
  return byLabel || null;
}

function ensureWcc(code) {
  if (!State.wccs[code]) {
    // Pull label/email from the registry if this WCC is already known.
    const reg = wccRegistry()[code];
    State.wccs[code] = {
      code,
      label: reg ? (reg.label || '') : '',
      contactEmail: reg ? (reg.contactEmail || '') : '',
      rounds: {},
    };
  }
  // Keep the registry in sync.
  registerWcc(code, State.wccs[code].label, State.wccs[code].contactEmail);
  return State.wccs[code];
}
function ensureRound(wccCode, roundNum) {
  const w = ensureWcc(wccCode);
  if (!w.rounds[roundNum]) {
    w.rounds[roundNum] = { number: roundNum, label: '', pdoName: '', pdoAps: '', sides: {} };
  }
  return w.rounds[roundNum];
}
function ensureSide(wccCode, roundNum, letter) {
  const r = ensureRound(wccCode, roundNum);
  if (!r.sides[letter]) {
    r.sides[letter] = { letter, label: '', subSides: {} };
  }
  return r.sides[letter];
}
function ensureSubSide(wccCode, roundNum, letter, subNum) {
  const s = ensureSide(wccCode, roundNum, letter);
  const k = String(subNum);
  if (!s.subSides[k]) {
    s.subSides[k] = { number: subNum, sections: [] };
  }
  return s.subSides[k];
}

function getStrip(wcc, rnd, side, sub) {
  return State.wccs?.[wcc]?.rounds?.[rnd]?.sides?.[side]?.subSides?.[String(sub)];
}

function addSection(strip, opts={}) {
  const s = {
    id: uid('sec'),
    label: opts.label || '',
    color: opts.color || pickColorForNewSection(strip),
    textColor: opts.textColor || 'auto',
    notchMode: opts.notchMode || 'double',
    addresses: opts.addresses || [],
  };
  strip.sections.push(s);
  saveState();
  return s;
}

function addAddress(section, number, units=[]) {
  const a = {
    id: uid('a'),
    number: String(number || '').trim().toUpperCase(),
    units: units.map(u => ({ id: uid('u'), label: String(u).trim().toUpperCase(), noJunkMail: false, isCommercial: false })),
    noJunkMail: false,
    isCommercial: false,
  };
  section.addresses.push(a);
  saveState();
  return a;
}

// Parse a bulk address string into address numbers.
// Supports ranges like "1-9" (odd → 1,3,5,7,9), "12-18" (even), "33-25" (descending).
// Range parity comes from the start number; if start & end have different parity, step 1.
// Mixed with comma/whitespace-separated singles: "40-32, 30, 28A".
function parseBulkRanges(text) {
  const result = [];
  const tokens = text.split(/[,\n]+/).flatMap(p => p.split(/\s+/)).map(t => t.trim()).filter(Boolean);
  for (const tok of tokens) {
    const m = tok.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) {
      const a = parseInt(m[1], 10);
      const b = parseInt(m[2], 10);
      if (isNaN(a) || isNaN(b)) { result.push(tok); continue; }
      const sameParity = (a % 2) === (b % 2);
      const step = sameParity ? 2 : 1;
      const dir = a <= b ? 1 : -1;
      const max = 500; // safety cap
      let count = 0;
      for (let n = a; (dir > 0 ? n <= b : n >= b) && count < max; n += dir * step) {
        result.push(String(n));
        count++;
      }
    } else {
      result.push(tok);
    }
  }
  return result;
}

function deleteSection(strip, sectionId) {
  const i = strip.sections.findIndex(s => s.id === sectionId);
  if (i >= 0) strip.sections.splice(i, 1);
  saveState();
}
function moveSection(strip, sectionId, dir) {
  const i = strip.sections.findIndex(s => s.id === sectionId);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= strip.sections.length) return;
  [strip.sections[i], strip.sections[j]] = [strip.sections[j], strip.sections[i]];
  saveState();
}
function duplicateSection(strip, sectionId) {
  const orig = strip.sections.find(s => s.id === sectionId);
  if (!orig) return;
  const copy = JSON.parse(JSON.stringify(orig));
  copy.id = uid('sec');
  copy.addresses.forEach(a => {
    a.id = uid('a');
    a.units.forEach(u => u.id = uid('u'));
  });
  // v0.2: duplicates go to the END of the strip, not adjacent to the source
  strip.sections.push(copy);
  saveState();
  return copy;
}

// ============== LAYOUT ENGINE ==============
// Compute the notch layout for a section. Returns an array of "cells",
// each cell is one notch worth of width (= one --notch-w).
// An "empty" unit is a sub-cell with no unit letter — it represents the house
// at the plain street number (e.g. "4" sitting next to "4A"). It IS a real
// delivery and is counted in the report; "empty" only affects how it's drawn
// (a blank cell, matching the physical strip) and labelled in the editor.
function isEmptyUnit(u) {
  const l = (u && u.label != null) ? String(u.label).trim() : '';
  return u && (u._empty === true || l === '' || l === '_');
}

// Normalise a number for comparison ("4" === "4", " 4 " === "4").
function sameNumber(x, y) {
  return String(x || '').trim().toUpperCase() === String(y || '').trim().toUpperCase();
}

// v0.6 auto-merge: a bare number immediately followed by an apartment of the
// SAME number collapses into a single notch. The bare number's slot is kept
// visually by prepending one empty unit to the apartment (so "4" then unit "A"
// share one notch, matching the physical strip). Non-destructive: returns a new
// list with a shallow-cloned merged address; the stored data is untouched.
function mergeConsecutiveAddresses(addresses) {
  const src = addresses || [];
  const out = [];
  for (let i = 0; i < src.length; i++) {
    const a = src[i];
    const b = src[i + 1];
    const aBare = !(a.units && a.units.length);
    const bApt  = b && b.units && b.units.length;
    if (aBare && bApt && sameNumber(a.number, b.number)) {
      out.push(Object.assign({}, b, {
        units: [{ id: 'u_merge_' + (b.id || i), label: '_', _empty: true, noJunkMail: false, isCommercial: false }, ...b.units],
      }));
      i++; // consume the apartment we merged into
    } else {
      out.push(a);
    }
  }
  return out;
}

// Pick a font-size tier based on the max digit-count present in a cell, so that
// "1|3" can be larger than "33|35" can be larger than "122|124", with each
// number sitting comfortably inside its notch with clear separation.
function digitTier(maxLen) {
  if (maxLen <= 1) return 'tier-s';
  if (maxLen <= 2) return 'tier-m';
  if (maxLen <= 3) return 'tier-l';
  return 'tier-xl';
}

// Build the list of physical "cells" (notches) for a section.
// Each cell carries a `width` measured in standard notches.
// Apartment addresses are split into segments of up to 10 units each, so the
// parent house number can repeat along the strip (one "72" every ~10 units).
function layoutSection(section) {
  const cells = [];
  const mode = section.notchMode;            // 'double' | 'single'
  const perNotch = mode === 'double' ? 2 : 1;
  const MAX_UNITS_PER_SEG = 10;
  const addrs = mergeConsecutiveAddresses(section.addresses); // v0.4: merge consecutive duplicates
  let i = 0;
  while (i < addrs.length) {
    const a = addrs[i];
    const hasUnits = a.units && a.units.length > 0;
    if (hasUnits) {
      // Split into segments of <= MAX_UNITS_PER_SEG units so the address number
      // repeats roughly every 10 units along the strip.
      const numSegments = Math.max(1, Math.ceil(a.units.length / MAX_UNITS_PER_SEG));
      const baseSize = Math.ceil(a.units.length / numSegments);
      let consumed = 0;
      for (let seg = 0; seg < numSegments; seg++) {
        const segUnits = a.units.slice(consumed, consumed + baseSize);
        consumed += segUnits.length;
        if (!segUnits.length) break;
        const width = Math.max(1, Math.ceil(segUnits.length / perNotch));
        cells.push({
          kind: 'apt',
          address: a,
          units: segUnits,
          unitStartIndex: consumed - segUnits.length,
          width,
          segIndex: seg,
          segCount: numSegments,
          tier: digitTier(String(a.number || '').length),
        });
      }
      i++;
    } else {
      if (mode === 'double'
          && i + 1 < addrs.length
          && !(addrs[i+1].units && addrs[i+1].units.length > 0)) {
        const b = addrs[i+1];
        cells.push({
          kind: 'pair',
          addresses: [a, b],
          width: 1,
          tier: digitTier(Math.max(String(a.number || '').length, String(b.number || '').length)),
        });
        i += 2;
      } else {
        cells.push({
          kind: 'single',
          address: a,
          width: 1,
          tier: digitTier(String(a.number || '').length),
        });
        i++;
      }
    }
  }
  return cells;
}

function sectionNotchCount(section) {
  return layoutSection(section).reduce((sum, c) => sum + (c.width || 1), 0);
}

// Sum of notches across every section in a strip (sub-side). Used to enforce
// the 60-notch hard cap.
function stripNotchCount(strip) {
  if (!strip || !strip.sections) return 0;
  return strip.sections.reduce((sum, sec) => sum + sectionNotchCount(sec), 0);
}

// ============== RENDER: BROWSE ==============
function renderBrowse() {
  const root = $('#app-root');
  root.innerHTML = '';

  const wccCodes = Object.keys(State.wccs).sort();
  const stripCount = wccCodes.reduce((acc, c) => {
    const w = State.wccs[c];
    for (const r of Object.values(w.rounds)) {
      for (const s of Object.values(r.sides)) {
        acc += Object.keys(s.subSides).length;
      }
    }
    return acc;
  }, 0);

  const page = h('div', { class: 'page' }, [
    h('div', { class: 'page-header' }, [
      h('div', {}, [
        h('h1', { class: 'page-title' }, 'Library'),
        h('p', { class: 'page-subtitle' }, `${wccCodes.length} WCC · ${stripCount} strips`),
      ]),
      h('div', { class: 'actions', style: { display: 'flex', gap: '8px' } }, [
        h('button', { class: 'tbtn ghost', onClick: () => openManageWccModal() }, 'Manage WCCs'),

    ]),

    !wccCodes.length
      ? h('div', { class: 'browse-empty' }, [

function renderWccCard(wcc) {
  const roundNums = Object.keys(wcc.rounds).sort();
  return h('div', { class: 'wcc-card' }, [
    h('div', { class: 'wcc-head' }, [
      h('span', { class: 'wcc-code' }, 'WCC ' + wcc.code),
      wcc.label ? h('span', { class: 'wcc-label' }, '· ' + wcc.label) : null,

}

function renderRoundBlock(wcc, round) {
  const sideLetters = ['A', 'B', 'C', 'D'].filter(l => round.sides[l]);
  const pdoLine = (round.pdoName || round.pdoAps)
    ? h('span', { class: 'round-pdo', title: 'Postal Delivery Officer' }, [
        h('span', { class: 'pdo-icon' }, '◉'),
        [round.pdoName, round.pdoAps].filter(Boolean).join(' · '),
      ])
    : null;
  return h('div', { class: 'round-block' }, [
    h('div', { class: 'round-head' }, [
      h('span', { class: 'round-num' }, 'RND ' + round.number),
      round.label ? h('span', { class: 'round-label' }, round.label) : null,
      pdoLine,
      h('div', { class: 'actions' }, [
        h('button', { class: 'tbtn ghost', onClick: () => openReportModal(wcc, round) }, '⏍ Report'),
        h('button', { class: 'tbtn ghost', onClick: () => openAddSideModal(wcc.code, round.number) }, '+ Side'),
        h('button', { class: 'tbtn ghost', onClick: () => openEditRoundModal(wcc.code, round.number) }, 'Edit'),
