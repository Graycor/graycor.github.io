function openCopyStripModal(strip, srcWcc, srcRnd, srcSide, srcSub) {
  // Pick a section, then pick a destination
  if (!strip.sections.length) { toast('No sections to copy', 'warn'); return; }
  let selectedSectionId = strip.sections[0].id;
  let destWcc, destRnd, destSide, destSub;

  const sectionPicker = h('select', { class: 'select input', onChange: (e) => { selectedSectionId = e.target.value; } },
    strip.sections.map(s => h('option', { value: s.id }, `${s.label || 'untitled'} — ${s.addresses.length} addr`))
  );

  // Build destination options
  const allStrips = [];
  for (const w of Object.values(State.wccs)) {
    for (const r of Object.values(w.rounds)) {
      for (const sd of Object.values(r.sides)) {
        for (const su of Object.values(sd.subSides)) {
          if (w.code === srcWcc && r.number === srcRnd && sd.letter === srcSide && su.number === srcSub) continue;
          allStrips.push({ wcc: w.code, rnd: r.number, side: sd.letter, sub: su.number });
        }
      }
    }
  }

  const destPicker = h('select', { class: 'select input', onChange: (e) => {
    const [w, r, sd, su] = e.target.value.split('|');
    destWcc = w; destRnd = r; destSide = sd; destSub = parseInt(su, 10);
  } },
    [h('option', { value: '' }, '— pick destination —')].concat(
      allStrips.map(s => h('option', { value: `${s.wcc}|${s.rnd}|${s.side}|${s.sub}` }, `WCC ${s.wcc} / RND ${s.rnd} / ${s.side}${s.sub}`))
    )
  );

  const submit = () => {
    if (!destWcc) { toast('Pick a destination strip', 'warn'); return; }
    const section = strip.sections.find(s => s.id === selectedSectionId);
    if (!section) return;
    const destStrip = ensureSubSide(destWcc, destRnd, destSide, destSub);
    const copySectionNotches = sectionNotchCount(section);
    if (stripNotchCount(destStrip) + copySectionNotches > MAX_NOTCHES) {
      toast(`Destination ${destSide}${destSub} has ${stripNotchCount(destStrip)} notches; adding this section (${copySectionNotches}) would exceed the 60-notch limit.`, 'danger');
      return;
    }
    const copy = JSON.parse(JSON.stringify(section));
    copy.id = uid('sec');
    copy.addresses.forEach(a => { a.id = uid('a'); a.units.forEach(u => u.id = uid('u')); });
    destStrip.sections.push(copy);
    saveState();
    closeModal();
    toast(`Copied to ${destSide}${destSub}`, 'good');
  };

  openModal(h('div', { class: 'modal wide' }, [
    h('h2', {}, 'Copy section to another strip'),
    h('p', { class: 'subtle' }, 'For rebalancing routes. The section (including all addresses and units) is duplicated to the destination — the source remains intact.'),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Section'),
        sectionPicker,
      ]),
      h('div', { class: 'field grow' }, [
        h('label', {}, 'Destination'),
        destPicker,
      ]),
    ]),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: submit }, 'Copy'),
    ]),
  ]));
}

// ============== EXPORT / IMPORT ==============
function exportJSON() {
  const blob = new Blob([JSON.stringify(State, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
  a.href = url;
  a.download = `stripmaker_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  toast('Exported JSON backup', 'good');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.wccs || typeof data.wccs !== 'object') throw new Error('Not a valid Stripmaker JSON');
      migrate(data); // ensure new v0.2 fields exist before merge/replace
      openModal(h('div', { class: 'modal' }, [
        h('h2', {}, 'Import database'),
        h('p', { class: 'subtle' }, 'How would you like to import? Replace wipes your current data; merge appends sections.'),
        h('div', { class: 'modal-actions' }, [
          h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
          h('button', { class: 'tbtn', onClick: () => { mergeImport(data); closeModal(); } }, 'Merge'),
          h('button', { class: 'tbtn danger', onClick: () => { State = data; saveState(); closeModal(); renderBrowse(); toast('Replaced from file', 'good'); } }, 'Replace'),
        ]),
      ]));
    } catch (e) {
      toast('Bad file: ' + e.message, 'danger');
    }
  };
  reader.readAsText(file);
}
function mergeImport(data) {
  // Merge the WCC registry first so labels/emails are available.
  for (const [code, w] of Object.entries(data.wccRegistry || {})) {
    registerWcc(code, w.label || '', w.contactEmail || '');
  }
  for (const [code, wcc] of Object.entries(data.wccs || {})) {
    const dest = ensureWcc(code);
    if (wcc.label) dest.label = wcc.label;
    if (wcc.contactEmail) dest.contactEmail = wcc.contactEmail;
    for (const [rn, r] of Object.entries(wcc.rounds || {})) {
      const dr = ensureRound(code, rn);
      if (r.label) dr.label = r.label;
      if (r.pdoName) dr.pdoName = r.pdoName;
      if (r.pdoAps)  dr.pdoAps  = r.pdoAps;
      for (const [letter, side] of Object.entries(r.sides || {})) {
        const ds = ensureSide(code, rn, letter);
        if (side.label) ds.label = side.label;
        for (const [k, sub] of Object.entries(side.subSides || {})) {
          const dsub = ensureSubSide(code, rn, letter, parseInt(k, 10));
          // Append sections rather than overwrite (safer for merges)
          for (const sec of sub.sections || []) {
            const copy = JSON.parse(JSON.stringify(sec));
            copy.id = uid('sec');
            (copy.addresses || []).forEach(a => {
              a.id = uid('a');
              if (a.noJunkMail === undefined) a.noJunkMail = false;
              if (a.isCommercial === undefined) a.isCommercial = false;
              (a.units || []).forEach(u => u.id = uid('u'));
            });
            dsub.sections.push(copy);
          }
        }
      }
    }
  }
  saveState();
  renderBrowse();
  toast('Merged from file', 'good');
}

// ============== PRINT ==============
// Dynamic page-size injection so we can support different paper sizes
// (920mm × 23mm for strips — fits the 60-notch cap (60 × 14.5mm) plus the
// 29mm round-end marker, which is allowed to overhang the physical strip
// holder — and A4 portrait for reports) from one app.
function printWithPageSize(sizeRule, mode, marginCss) {
  // Remove any prior dynamic style
  const existing = document.getElementById('dynamic-page-style');
  if (existing) existing.remove();
  const style = document.createElement('style');
  style.id = 'dynamic-page-style';
  const margin = marginCss != null ? marginCss : (mode === 'report' ? '15mm' : '0');
  style.textContent = `@page { ${sizeRule} margin: ${margin}; }`;
  document.head.appendChild(style);
  document.body.setAttribute('data-printing', mode);
  // Give the layout a tick before firing the print dialog
  setTimeout(() => window.print(), 60);
}

const NOTCH_MM = 14.5;      // physical notch width
const ROW_BLOCK_MM = 22;    // vertical space one strip row consumes (21mm strip + cut line)
const PRINT_MARGIN_MM = 8;  // page margin used for tiling maths
const END_MARKER_MM = 29;   // round-end marker width

const PAPER_SIZES = {
  A4: { w: 210, h: 297 },
  A3: { w: 297, h: 420 },
};

// Flatten the whole strip into a single sequence of {sec, cell} notches so we
// can re-chunk it into page-width rows regardless of section boundaries.
function buildStripCells(strip) {
  const flat = [];
  for (const sec of strip.sections) {
    for (const cell of layoutSection(sec)) flat.push({ sec, cell });
  }
  return flat;
}

// Render one page-width row from a list of {sec, cell}, grouping consecutive
// cells of the same section so colour + label render correctly.
function renderRowStrip(items, endMarker) {
  const stripEl = h('div', { class: 'strip' });
  let i = 0;
  while (i < items.length) {
    const sec = items[i].sec;
    const group = [];
    while (i < items.length && items[i].sec === sec) { group.push(items[i].cell); i++; }
    const txt = getTextColor(sec);
    const notchCount = group.reduce((s, c) => s + (c.width || 1), 0);
    const numRow = h('div', { class: 'num-row' });
    for (const c of group) numRow.appendChild(renderCellDOM(c, txt));
    const labelRow = h('div', { class: 'label-row' }, [h('span', { class: 'label-text' }, sec.label || ' ')]);
    stripEl.appendChild(h('div', {
      class: 'strip-section',
      style: { background: sec.color, color: txt, width: `calc(var(--notch-w) * ${notchCount})`, flex: `0 0 calc(var(--notch-w) * ${notchCount})` },
    }, [numRow, labelRow]));
  }
  if (endMarker) {
    stripEl.appendChild(h('div', { class: 'strip-end' }, [
      h('div', { class: 'rnd' }, endMarker.rnd),
      h('div', { class: 'id' }, endMarker.id),
    ]));
  }
  // 10mm blank tail at the end of every piece, for overlap on install.
  stripEl.appendChild(h('div', { class: 'tile-end-pad' }));
  return stripEl;
}

// Continuous single-strip print (original behaviour): one 920mm-wide page.
function printContinuous(strip, stripIdLabel, roundNum) {
  const root = $('#print-root');
  root.innerHTML = '';
  const printStripEl = h('div', { class: 'strip' });
  for (const sec of strip.sections) printStripEl.appendChild(renderSectionDOM(sec, false));
  printStripEl.appendChild(h('div', { class: 'strip-end' }, [
    h('div', { class: 'rnd' }, 'RND_' + roundNum),
    h('div', { class: 'id' }, stripIdLabel),
  ]));
  printStripEl.appendChild(h('div', { class: 'tile-end-pad' })); // 10mm install tail
  root.appendChild(printStripEl);
  printWithPageSize('size: 930mm 23mm;', 'strip');
}

// Build the A4/A3 sheets for one strip: break it into page-width rows stacked
// tightly down each sheet (separated by a black cut line). Returns an array of
// .strip-sheet elements (each is one printed page).
function buildTiledSheets(strip, stripIdLabel, roundNum, paper, orientation) {
  const dims = PAPER_SIZES[paper] || PAPER_SIZES.A4;
  const pageW = orientation === 'landscape' ? dims.h : dims.w;
  const pageH = orientation === 'landscape' ? dims.w : dims.h;
  const usableW = pageW - 2 * PRINT_MARGIN_MM;
  const usableH = pageH - 2 * PRINT_MARGIN_MM;
  // Reserve the 10mm end tail so a row never exceeds the printable width.
  const notchesPerRow = Math.max(1, Math.floor((usableW - 10) / NOTCH_MM));
  const rowsPerPage = Math.max(1, Math.floor(usableH / ROW_BLOCK_MM));

  const flat = buildStripCells(strip);
  const rows = [];
  let cur = [], curN = 0;
  for (const it of flat) {
    const w = it.cell.width || 1;
    if (curN + w > notchesPerRow && cur.length) { rows.push(cur); cur = []; curN = 0; }
    cur.push(it); curN += w;
  }
  if (cur.length) rows.push(cur);
  if (!rows.length) rows.push([]); // always emit at least one (for the end marker)

  // The last piece also carries the round-end marker (~2 notches) plus the 10mm
  // tail (~1 notch). If the final row is too full to fit them, give the marker
  // its own final row so nothing clips.
  const lastCount = rows[rows.length - 1].reduce((s, it) => s + (it.cell.width || 1), 0);
  if (lastCount + 3 > notchesPerRow) rows.push([]);

  const totalRows = rows.length;
  const sheets = [];
  let sheet = h('div', { class: 'strip-sheet' });
  rows.forEach((rowItems, idx) => {
    if (idx > 0 && idx % rowsPerPage === 0) {
      sheets.push(sheet);
      sheet = h('div', { class: 'strip-sheet' });
    }
    const isLast = idx === totalRows - 1;
    const endMarker = isLast ? { rnd: 'RND_' + roundNum, id: stripIdLabel } : null;
    sheet.appendChild(h('div', { class: 'tile-row' }, [renderRowStrip(rowItems, endMarker)]));
  });
  sheets.push(sheet);
  return sheets;
}

// Tiled print of a single strip.
function printTiled(strip, stripIdLabel, roundNum, paper, orientation) {
  const root = $('#print-root');
  root.innerHTML = '';
  for (const sheet of buildTiledSheets(strip, stripIdLabel, roundNum, paper, orientation)) {
    root.appendChild(sheet);
  }
  printWithPageSize(`size: ${paper} ${orientation};`, 'strip', PRINT_MARGIN_MM + 'mm');
}

// Print options chooser.
function openPrintModal(strip, stripIdLabel, roundNum) {
  let paper = 'A4';
  let orientation = 'landscape';
  let mode = 'tiled'; // 'tiled' | 'continuous'

  const orientToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => setOrient('landscape', e) }, 'Landscape'),
    h('button', { onClick: (e) => setOrient('portrait', e) }, 'Portrait'),
  ]);
  function setOrient(o, e) {
    orientation = o;
    Array.from(orientToggle.children).forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    updateHint();
  }

  const paperToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => setPaper('A4', e) }, 'A4'),
    h('button', { onClick: (e) => setPaper('A3', e) }, 'A3'),
  ]);
  function setPaper(p, e) {
    paper = p;
    Array.from(paperToggle.children).forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    updateHint();
  }

  const modeToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => setMode('tiled', e) }, 'Cut sections (A4/A3)'),
    h('button', { onClick: (e) => setMode('continuous', e) }, 'Continuous (920mm)'),
  ]);
  function setMode(m, e) {
    mode = m;
    Array.from(modeToggle.children).forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    paperToggle.style.opacity = orientToggle.style.opacity = (m === 'tiled') ? '1' : '0.4';
    paperToggle.style.pointerEvents = orientToggle.style.pointerEvents = (m === 'tiled') ? 'auto' : 'none';
    updateHint();
  }

  const hint = h('p', { class: 'subtle', style: { marginTop: '10px' } }, '');
  function updateHint() {
    if (mode === 'continuous') {
      hint.textContent = 'Prints one continuous 920mm-wide strip — needs a wide-format / roll printer.';
      return;
    }
    const dims = PAPER_SIZES[paper];
    const pageW = orientation === 'landscape' ? dims.h : dims.w;
    const pageH = orientation === 'landscape' ? dims.w : dims.h;
    const perRow = Math.max(1, Math.floor((pageW - 2 * PRINT_MARGIN_MM - 10) / NOTCH_MM));
    const perPage = Math.max(1, Math.floor((pageH - 2 * PRINT_MARGIN_MM) / ROW_BLOCK_MM));
    const total = stripNotchCount(strip);
    const pieces = Math.max(1, Math.ceil(total / perRow));
    const sheets = Math.max(1, Math.ceil(pieces / perPage));
    hint.textContent = `${paper} ${orientation}: ~${perRow} notches per piece, ${perPage} pieces per sheet. ${total} notches → ${pieces} pieces on ${sheets} sheet${sheets === 1 ? '' : 's'}. Cut along the dashed lines and lay the pieces end-to-end.`;
  }
  updateHint();

  const go = () => {
    closeModal();
    setTimeout(() => {
      if (mode === 'continuous') printContinuous(strip, stripIdLabel, roundNum);
      else printTiled(strip, stripIdLabel, roundNum, paper, orientation);
    }, 30);
  };

  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, 'Print strip'),
    h('p', { class: 'subtle' }, 'Cut-section printing tiles the strip across ordinary A4/A3 sheets so it works on small printers and wastes less paper.'),
    h('div', { class: 'field', style: { marginBottom: '12px' } }, [h('label', {}, 'Layout'), modeToggle]),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [h('label', {}, 'Paper'), paperToggle]),
      h('div', { class: 'field' }, [h('label', {}, 'Orientation'), orientToggle]),
    ]),
    hint,
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: go }, '⎙ Print'),
    ]),
  ]));
}

// Collect every strip (sub-side) under a scope, in delivery order.
// scope: 'wcc' | 'round' | 'side'
function collectStrips(scope, wccCode, roundNum, sideLetter) {
  const out = [];
  const w = State.wccs[wccCode];
  if (!w) return out;
  const rounds = scope === 'wcc'
    ? Object.keys(w.rounds).sort()
    : [roundNum];
  for (const rn of rounds) {
    const r = w.rounds[rn];
    if (!r) continue;
    const sides = (scope === 'side') ? [sideLetter] : ['A', 'B', 'C', 'D'].filter(l => r.sides[l]);
    for (const sl of sides) {
      const side = r.sides[sl];
      if (!side) continue;
      const subs = Object.keys(side.subSides).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
      for (const sn of subs) {
        const strip = side.subSides[String(sn)];
        out.push({ strip, label: sl + sn, round: rn });
      }
    }
  }
  return out;
}

// Bulk-print every strip in a scope as one tiled document (each strip starts on
// a fresh sheet). Empty strips are skipped.
function printBulk(strips, paper, orientation) {
  const root = $('#print-root');
  root.innerHTML = '';
  let printed = 0;
  for (const { strip, label, round } of strips) {
    if (!strip.sections || !strip.sections.length) continue;
    for (const sheet of buildTiledSheets(strip, label, round, paper, orientation)) {
      root.appendChild(sheet);
    }
    printed++;
  }
  if (!printed) { toast('No strips with content in that selection', 'warn'); return; }
  printWithPageSize(`size: ${paper} ${orientation};`, 'strip', PRINT_MARGIN_MM + 'mm');
}

// Advanced print: choose a scope (whole WCC / one round / one side) and bulk
// print all its strips as cut sections.
function openAdvancedPrintModal() {
  const wccCodes = Object.keys(State.wccs).sort();
  if (!wccCodes.length) { toast('No WCCs with data to print', 'warn'); return; }

  let scope = 'round';
  let wccCode = wccCodes[0];
  let roundNum = null, sideLetter = null;
  let paper = 'A4', orientation = 'landscape';

  const roundSel = h('select', { class: 'select input' });
  const sideSel = h('select', { class: 'select input' });
  const sideField = h('div', { class: 'field grow' }, [h('label', {}, 'Side'), sideSel]);
  const roundField = h('div', { class: 'field grow' }, [h('label', {}, 'Round'), roundSel]);
  const hint = h('p', { class: 'subtle', style: { marginTop: '8px' } }, '');

  const fillRounds = () => {
    const w = State.wccs[wccCode];
    const rns = Object.keys(w.rounds).sort();
    roundSel.innerHTML = '';
    rns.forEach(rn => roundSel.appendChild(h('option', { value: rn }, 'RND ' + rn)));
    roundNum = rns[0] || null;
    roundSel.value = roundNum || '';
  };
  const fillSides = () => {
    const r = State.wccs[wccCode]?.rounds?.[roundNum];
    sideSel.innerHTML = '';
    const letters = r ? ['A', 'B', 'C', 'D'].filter(l => r.sides[l]) : [];
    letters.forEach(l => sideSel.appendChild(h('option', { value: l }, 'Side ' + l)));
    sideLetter = letters[0] || null;
    sideSel.value = sideLetter || '';
  };
  const updateVisibility = () => {
    roundField.style.display = (scope === 'wcc') ? 'none' : '';
    sideField.style.display = (scope === 'side') ? '' : 'none';
  };
  const updateHint = () => {
    const strips = collectStrips(scope, wccCode, roundNum, sideLetter)
      .filter(s => s.strip.sections && s.strip.sections.length);
    const labels = strips.map(s => s.label);
    hint.textContent = strips.length
      ? `${strips.length} strip${strips.length === 1 ? '' : 's'} will print: ${labels.join(', ')}.`
      : 'No strips with content in this selection.';
  };
  const refresh = () => { updateVisibility(); updateHint(); };

  const wccSel = h('select', { class: 'select input', onChange: (e) => { wccCode = e.target.value; fillRounds(); fillSides(); refresh(); } },
    wccCodes.map(c => h('option', { value: c }, 'WCC ' + c + (State.wccs[c].label ? ' — ' + State.wccs[c].label : ''))));
  roundSel.onchange = (e) => { roundNum = e.target.value; fillSides(); refresh(); };
  sideSel.onchange = (e) => { sideLetter = e.target.value; refresh(); };

  const scopeToggle = h('div', { class: 'toggle-group' }, [
    h('button', { onClick: (e) => setScope('wcc', e) }, 'Whole WCC'),
    h('button', { class: 'active', onClick: (e) => setScope('round', e) }, 'One round'),
    h('button', { onClick: (e) => setScope('side', e) }, 'One side'),
  ]);
  function setScope(s, e) {
    scope = s;
    Array.from(scopeToggle.children).forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    refresh();
  }

  const paperToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => { paper = 'A4'; mark(paperToggle, e); } }, 'A4'),
    h('button', { onClick: (e) => { paper = 'A3'; mark(paperToggle, e); } }, 'A3'),
  ]);
  const orientToggle = h('div', { class: 'toggle-group' }, [
    h('button', { class: 'active', onClick: (e) => { orientation = 'landscape'; mark(orientToggle, e); } }, 'Landscape'),
    h('button', { onClick: (e) => { orientation = 'portrait'; mark(orientToggle, e); } }, 'Portrait'),
  ]);
  function mark(group, e) {
    Array.from(group.children).forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
  }

  fillRounds(); fillSides(); refresh();

  const go = () => {
    const strips = collectStrips(scope, wccCode, roundNum, sideLetter);
    closeModal();
    setTimeout(() => printBulk(strips, paper, orientation), 30);
  };

  openModal(h('div', { class: 'modal' }, [
    h('h2', {}, 'Advanced print'),
    h('p', { class: 'subtle' }, 'Bulk-print cut-section strips for a whole WCC, a single round, or one side. Each strip starts on a fresh sheet.'),
    h('div', { class: 'field', style: { marginBottom: '12px' } }, [h('label', {}, 'Scope'), scopeToggle]),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field grow' }, [h('label', {}, 'WCC'), wccSel]),
      roundField,
      sideField,
    ]),
    h('div', { class: 'form-row' }, [
      h('div', { class: 'field' }, [h('label', {}, 'Paper'), paperToggle]),
      h('div', { class: 'field' }, [h('label', {}, 'Orientation'), orientToggle]),
    ]),
    hint,
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Cancel'),
      h('button', { class: 'tbtn primary', onClick: go }, '⎙ Print all'),
    ]),
  ]));
}

// ============== REPORT (load-balance) ==============

// Walk the round and produce per-side and per-sub-side counts.
//
// Flag accounting (v0.3, with per-unit flags):
//   • Non-unit address contributes 1 mail piece. It's commercial iff
//     a.isCommercial; gets junk mail iff !a.noJunkMail.
//   • Apartment address (with units) contributes N mail pieces, one per unit.
//     Each unit is commercial iff (a.isCommercial OR u.isCommercial), and
//     gets junk mail iff !(a.noJunkMail OR u.noJunkMail).  (Address-level
//     flags act as an inherited default; unit-level flags can opt in/out.)
//   • commercialAddresses = count of addresses with at least one commercial
//     piece (useful for the "how many businesses on the round" view).
function computeRoundStats(round) {
  const result = { sides: {}, sideLetters: [] };
  for (const letter of ['A', 'B', 'C', 'D']) {
    const side = round.sides[letter];
    if (!side) continue;
    result.sideLetters.push(letter);
    let addresses = 0, units = 0, apartmentBlocks = 0;
    let commercialAddresses = 0, commercialPieces = 0;
    let junkMailPieces = 0;
    let effectiveStops = 0;
    const subStats = {};
    const subNums = Object.keys(side.subSides).map(Number).sort((a,b)=>a-b);
    for (const sn of subNums) {
      const sub = side.subSides[String(sn)];
      let sAddr = 0, sUnits = 0, sBlocks = 0;
      let sComAddr = 0, sComPieces = 0;
      let sJM = 0, sEff = 0;
      for (const sec of sub.sections) {
        for (const a of sec.addresses) {
          sAddr++;
          sEff++; // one physical stop per address (apt block reached at one location)
          // Every sub-cell is a real delivery — including a "blank" cell, which
          // represents the house at the plain number (e.g. "4" alongside "4A").
          const hasUnits = a.units && a.units.length > 0;
          if (hasUnits) {
            sUnits += a.units.length;
            sBlocks++;
            let anyComOnThisAddr = false;
            for (const u of a.units) {
              const isCom = a.isCommercial || u.isCommercial;
              const noJM = a.noJunkMail   || u.noJunkMail;
              if (isCom) { sComPieces++; anyComOnThisAddr = true; }
              if (!noJM) sJM++;
            }
            if (anyComOnThisAddr) sComAddr++;
          } else {
            // Single non-unit address = 1 mail piece
            if (a.isCommercial) { sComPieces++; sComAddr++; }
            if (!a.noJunkMail)  sJM++;
          }
        }
      }
      subStats[sn] = {
        n: sn,
        addresses: sAddr, units: sUnits, apartmentBlocks: sBlocks,
        commercialAddresses: sComAddr, commercialPieces: sComPieces,
        junkMail: sJM, effectiveStops: sEff,
        sectionCount: sub.sections.length,
      };
      addresses += sAddr;
      units += sUnits;
      apartmentBlocks += sBlocks;
      commercialAddresses += sComAddr;
      commercialPieces += sComPieces;
      junkMailPieces += sJM;
      effectiveStops += sEff;
    }
    result.sides[letter] = {
      letter, label: side.label || '',
      addresses, units, apartmentBlocks,
      commercialAddresses, commercialPieces, commercial: commercialAddresses,
      junkMail: junkMailPieces,
      effectiveStops,
      // Mail pieces = one per non-unit address + one per unit at apt blocks
      mailPieces: addresses - apartmentBlocks + units,
      subStats,
    };
  }
  return result;
}

function fmtDelta(a, b) {
  const d = a - b;
  if (d === 0) return { text: '—', cls: 'even' };
  const cls = Math.abs(d) >= Math.max(5, Math.round(Math.max(a,b) * 0.15)) ? 'high' : '';
  return { text: (d > 0 ? '+' : '') + d, cls };
}

function buildReportDom(wcc, round) {
  const stats = computeRoundStats(round);
  const sides = stats.sideLetters.map(l => stats.sides[l]);
  const isPair = sides.length === 2; // Most common case: A vs B
  const dateStr = new Date().toLocaleString('en-AU', {
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });

  // Header / metadata
  const metaRows = [
    h('div', { class: 'row' }, [h('span', { class: 'k' }, 'WCC'), h('span', { class: 'v' }, wcc.code + (wcc.label ? ' · ' + wcc.label : ''))]),
    h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Round'), h('span', { class: 'v' }, round.number + (round.label ? ' · ' + round.label : ''))]),
  ];
  if (wcc.contactEmail) {
    metaRows.push(h('div', { class: 'row' }, [
      h('span', { class: 'k' }, 'WCC Contact'),
      h('a', { class: 'v', href: 'mailto:' + wcc.contactEmail, style: { textTransform: 'none', color: '#1f1d17', textDecoration: 'underline' } }, wcc.contactEmail),
    ]));
  }
  if (round.pdoName || round.pdoAps) {
    metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'PDO'), h('span', { class: 'v' }, [round.pdoName, round.pdoAps].filter(Boolean).join(' · '))]));
  }
  metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Generated'), h('span', { class: 'v', style: { textTransform: 'none' } }, dateStr)]));
  metaRows.push(h('div', { class: 'row' }, [h('span', { class: 'k' }, 'Sides'), h('span', { class: 'v' }, sides.map(s => s.letter + (s.label ? ' (' + s.label + ')' : '')).join(', '))]));

  // Top-line balance cards (only meaningful when there are 2 sides — the typical A/B day pair)
  let balanceBlock = null;
  if (isPair) {
    const a = sides[0], b = sides[1];
    const totalA = a.effectiveStops, totalB = b.effectiveStops;
    const diff = totalA - totalB;
    const pctDiff = Math.max(totalA, totalB) === 0 ? 0 : Math.round((Math.abs(diff) / Math.max(totalA, totalB)) * 100);
    balanceBlock = h('div', { class: 'report-balance' }, [
      h('div', { class: 'card' }, [
        h('div', { class: 'label' }, `Side ${a.letter}${a.label ? ' · ' + a.label : ''}`),
        h('div', { class: 'value' }, String(totalA)),
        h('div', { class: 'sub' }, `${a.mailPieces} mail pieces · ${a.apartmentBlocks} apt block${a.apartmentBlocks===1?'':'s'}`),
      ]),
      h('div', { class: 'card' }, [
        h('div', { class: 'label' }, `Side ${b.letter}${b.label ? ' · ' + b.label : ''}`),
        h('div', { class: 'value' }, String(totalB)),
        h('div', { class: 'sub' }, `${b.mailPieces} mail pieces · ${b.apartmentBlocks} apt block${b.apartmentBlocks===1?'':'s'}`),
      ]),
      h('div', { class: 'card' }, [
        h('div', { class: 'label' }, 'Load Δ (A − B)'),
        h('div', { class: 'value' }, (diff > 0 ? '+' : '') + String(diff)),
        h('div', { class: 'sub' }, pctDiff + '% imbalance'),
      ]),
    ]);
  }

  // Side comparison table
  const compareRows = [];
  const metrics = [
    { key: 'addresses', label: 'Total addresses (stops on strip)' },
    { key: 'apartmentBlocks', label: 'Apartment blocks (≥1 unit)' },
    { key: 'units', label: 'Total apartment units' },
    { key: 'mailPieces', label: 'Estimated mail pieces (1 per non-apt addr + 1 per unit)' },
    { key: 'commercialAddresses', label: 'Commercial addresses' },
    { key: 'commercialPieces', label: 'Commercial mail pieces (incl. per-unit)' },
    { key: 'junkMail', label: 'Junk-mail pieces (per-unit aware)' },
    { key: 'effectiveStops', label: 'Effective stops (apt block = 1)' },
  ];
  for (const m of metrics) {
    const cells = [h('td', {}, m.label)];
    for (const s of sides) cells.push(h('td', { class: 'num' }, String(s[m.key] ?? 0)));
    if (isPair) {
      const d = fmtDelta(sides[0][m.key] ?? 0, sides[1][m.key] ?? 0);
      cells.push(h('td', { class: 'delta ' + d.cls }, d.text));
    }
    compareRows.push(h('tr', {}, cells));
  }
  const compareHeader = [h('th', {}, 'Metric')];
  for (const s of sides) compareHeader.push(h('th', { style: { textAlign: 'right' } }, `Side ${s.letter}${s.label ? ' (' + s.label + ')' : ''}`));
  if (isPair) compareHeader.push(h('th', { style: { textAlign: 'right' } }, 'Δ (A − B)'));

  const compareTable = h('table', { class: 'report-table' }, [
    h('thead', {}, h('tr', {}, compareHeader)),
    h('tbody', {}, compareRows),
  ]);

  // Per-sub-side breakdown
  const subRows = [];
  for (const s of sides) {
    const subNums = Object.keys(s.subStats).map(Number).sort((a,b)=>a-b);
    for (const sn of subNums) {
      const ss = s.subStats[sn];
      subRows.push(h('tr', {}, [
        h('td', {}, `${s.letter}${sn}${s.label ? ' (' + s.label + ')' : ''}`),
        h('td', { class: 'num' }, String(ss.sectionCount)),
        h('td', { class: 'num' }, String(ss.addresses)),
        h('td', { class: 'num' }, String(ss.apartmentBlocks)),
        h('td', { class: 'num' }, String(ss.units)),
        h('td', { class: 'num' }, String(ss.commercialPieces)),
        h('td', { class: 'num' }, String(ss.junkMail)),
      ]));
    }
    // Side total row
    subRows.push(h('tr', { class: 'total' }, [
      h('td', {}, `Side ${s.letter} total`),
      h('td', { class: 'num' }, String(s.subStats ? Object.values(s.subStats).reduce((a,ss)=>a+ss.sectionCount,0) : 0)),
      h('td', { class: 'num' }, String(s.addresses)),
      h('td', { class: 'num' }, String(s.apartmentBlocks)),
      h('td', { class: 'num' }, String(s.units)),
      h('td', { class: 'num' }, String(s.commercialPieces)),
      h('td', { class: 'num' }, String(s.junkMail)),
    ]));
  }
  const subTable = h('table', { class: 'report-table' }, [
    h('thead', {}, h('tr', {}, [
      h('th', {}, 'Strip'),
      h('th', { style: { textAlign: 'right' } }, 'Sections'),
      h('th', { style: { textAlign: 'right' } }, 'Addresses'),
      h('th', { style: { textAlign: 'right' } }, 'Apt blocks'),
      h('th', { style: { textAlign: 'right' } }, 'Apt units'),
      h('th', { style: { textAlign: 'right' } }, 'Commercial pieces'),
      h('th', { style: { textAlign: 'right' } }, 'Junk mail'),
    ])),
    h('tbody', {}, subRows),
  ]);

  return h('div', { class: 'report-page' }, [
    h('h1', { class: 'report-h1' }, `Load-Balance Report — RND ${round.number}`),
    h('p', { class: 'report-sub' }, `WCC ${wcc.code}${wcc.label ? ' · ' + wcc.label : ''}`),

    h('div', { class: 'report-meta' }, metaRows),

    balanceBlock ? h('div', { class: 'report-section-title' }, 'Side balance snapshot') : null,
    balanceBlock,

    h('div', { class: 'report-section-title' }, 'Side comparison'),
    compareTable,

    h('div', { class: 'report-section-title' }, 'Per-strip breakdown'),
    subTable,

    h('p', { class: 'report-footnote' }, [
      'Notes: "Apartment blocks" counts each address with one or more units (a single building stop). ',
      '"Mail pieces" estimates physical mail = 1 per non-apt address + 1 per apartment unit. ',
      '"Effective stops" treats each apartment block as one physical stop, since all units are reached at one location — useful for comparing driving/walking effort vs raw mail volume. ',
      '"Commercial pieces" and "Junk mail" both account for per-unit flags: a unit inherits its address\'s flags by default, and can override them.',
    ]),
  ]);
}

function openReportModal(wcc, round) {
  const reportEl = buildReportDom(wcc, round);
  const modal = h('div', { class: 'modal wide report-modal' }, [
    h('div', { class: 'report-modal-head' }, [
      h('h2', {}, `Report · WCC ${wcc.code} · RND ${round.number}`),
      h('div', { style: { display: 'flex', gap: '8px' } }, [
        h('button', { class: 'tbtn ghost', onClick: closeModal }, 'Close'),
        h('button', { class: 'tbtn primary', onClick: () => printReport(wcc, round) }, '⎙ Print to PDF'),
      ]),
    ]),
    h('div', { class: 'report-preview-scroll' }, reportEl),
  ]);
  openModal(modal);
}

function printReport(wcc, round) {
  const root = $('#report-root');
  root.innerHTML = '';
  root.appendChild(buildReportDom(wcc, round));
  printWithPageSize('size: A4 portrait;', 'report');
}

// ============== CHANGELOG ==============
function openChangelogModal() {
  const timeline = h('div', { class: 'timeline' },
    CHANGELOG.map((entry, i) => h('div', { class: 'tl-entry' + (i === 0 ? ' latest' : '') }, [
      h('div', { class: 'tl-head' }, [
        h('span', { class: 'tl-ver' }, 'v' + entry.version),
        h('span', { class: 'tl-date' }, entry.date),
        i === 0 ? h('span', { class: 'tl-tag' }, 'Latest') : null,
      ]),
      h('ul', { class: 'tl-list' }, entry.notes.map(n => h('li', {}, n))),
    ]))
  );
  openModal(h('div', { class: 'modal wide' }, [
    h('h2', {}, 'What\'s new'),
    h('p', { class: 'subtle' }, 'Release history — most recent first.'),
    h('div', { class: 'changelog-scroll' }, timeline),
    h('div', { class: 'modal-actions' }, [
      h('button', { class: 'tbtn primary', onClick: closeModal }, 'Close'),
    ]),
  ]));
}

// ============== NAV ==============
function openEditor(wcc, rnd, side, sub) {
  UI.view = 'editor';
  UI.editor.wccCode = wcc;
  UI.editor.roundNum = rnd;
  UI.editor.sideLetter = side;
  UI.editor.subNum = sub;
  UI.editor.selectedSectionId = null;
  ensureSubSide(wcc, rnd, side, sub);
  saveState();
  renderEditor();
}

function backToBrowse() {
  UI.view = 'browse';
  renderBrowse();
}

// ============== INIT ==============
function init() {
  // Home button + brand both return to the library / dashboard.
  $('#btn-browse').addEventListener('click', backToBrowse);
  $('#btn-home-brand').addEventListener('click', backToBrowse);

  // Top-right kebab menu
  const menu = $('#menu-dropdown');
  const menuBtn = $('#btn-menu');
  const closeMenu = () => { menu.hidden = true; menuBtn.setAttribute('aria-expanded', 'false'); };
  const toggleMenu = () => {
    const willOpen = menu.hidden;
    menu.hidden = !willOpen;
    menuBtn.setAttribute('aria-expanded', String(willOpen));
  };
  menuBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
  document.addEventListener('click', (e) => {
    if (!menu.hidden && !menu.contains(e.target) && e.target !== menuBtn) closeMenu();
  });
  $('#mi-export').addEventListener('click', () => { closeMenu(); exportJSON(); });
  $('#mi-import').addEventListener('click', () => { closeMenu(); $('#file-import').click(); });
  $('#mi-advprint').addEventListener('click', () => { closeMenu(); openAdvancedPrintModal(); });
  $('#mi-changelog').addEventListener('click', () => { closeMenu(); openChangelogModal(); });
  $('#file-import').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importJSON(f);
    e.target.value = '';
  });

  // Escape closes modals
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && UI.modal) closeModal();
  });

  // After every print, clean up the dynamic page-size CSS and printing-mode attr
  // so the next print doesn't inherit the wrong page size or visible root.
  window.addEventListener('afterprint', () => {
    document.body.removeAttribute('data-printing');
    const dyn = document.getElementById('dynamic-page-style');
    if (dyn) dyn.remove();
    const pr = $('#print-root');   if (pr) pr.innerHTML = '';
    const rr = $('#report-root');  if (rr) rr.innerHTML = '';
  });

  renderBrowse();
}

// ============== AUTH GATE ==============
// IMPORTANT: this is a client-side DETERRENT, not real security. The whole app
// and this hash ship to the browser, so anyone who views source or opens
// devtools can bypass it. It only stops casual visitors from using the tool on
// a public URL (e.g. GitHub Pages). Your actual data never leaves the browser —
// it lives in localStorage and in the JSON you export/import.
//
// To change the password: open the page, open the browser console, run
//   setStripmakerPassword('your-new-password')
// then paste the printed hash in below as AUTH_HASH and re-upload the file.
const AUTH_HASH = '9efcb7b58b6f42f76534ac72e1b1b12055f901c103e16a80063c5134241c9e99';

async function sha256hex(str) {
  const bytes = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}
// Console helper to generate a new hash.
window.setStripmakerPassword = async (pw) => {
  const hex = await sha256hex(pw);
  console.log('Set AUTH_HASH to:\n' + hex);
  return hex;
};

function revealApp() {
  const gate = document.getElementById('auth-gate');
  if (gate) gate.remove();
  init();
}

function startApp() {
  // Already unlocked this browser session?
  if (sessionStorage.getItem('sm_authed') === '1') { revealApp(); return; }
  const form = document.getElementById('auth-form');
  const input = document.getElementById('auth-input');
  const err = document.getElementById('auth-err');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    const hex = await sha256hex(input.value);
    if (hex === AUTH_HASH) {
      sessionStorage.setItem('sm_authed', '1');
      revealApp();
    } else {
      err.textContent = 'Incorrect password.';
      input.select();
    }
  });
  setTimeout(() => input && input.focus(), 50);
}

startApp();
</script>
